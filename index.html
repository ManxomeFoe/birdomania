/* One-shot GPS pin for a bird just logged on a trip (spots gain an optional
   tripId so trips and the Field Map know about each other). */
function pinBirdHere(tripId,birdId){
  if(!navigator.geolocation){toast("Location isn't available here");return;}
  toast("Getting a fix…");
  navigator.geolocation.getCurrentPosition(p=>{
    const t=state.trips.find(x=>x.id===tripId);
    if(!state.spots)state.spots=[];
    state.spots.push({id:uid(),birdId,lat:+p.coords.latitude.toFixed(6),lng:+p.coords.longitude.toFixed(6),
      note:"",date:(t&&!t.active)?(t.endedAt||t.startedAt):Date.now(),tripId});
    save();
    toast(`📍 Pin dropped for ${BIRDS[birdId]?BIRDS[birdId].name:"bird"}`);
  },()=>toast("Couldn't get a location fix"),{enableHighAccuracy:true,timeout:12000,maximumAge:15000});
}

/* Shareable trip summary: species + counts + pin links, plain text. */
function tripShareText(t){
  const ss=state.sightings.filter(s=>s.tripId===t.id);
  const ind=ss.reduce((a,s)=>a+(s.count>0?s.count:1),0);
  const lines=[`🐦 ${t.name} — ${fmtDate(t.startedAt)}`,
               `🕐 ${fmtDur(t.durationMs||0)} afield · ${regionName(t.region)}`,
               `Species (${t.birds.length}${ind>t.birds.length?`, ${ind} individuals`:""}):`];
  t.birds.forEach(id=>{
    const b=BIRDS[id];if(!b)return;
    const s=ss.filter(x=>x.birdId===id).pop();
    lines.push(`• ${b.name}${s&&s.count>1?` ×${s.count}`:""}`);
  });
  const sp=(state.spots||[]).filter(s=>s.tripId===t.id);
  if(sp.length){
    lines.push("📍 Pins:");
    sp.forEach(s=>{const b=BIRDS[s.birdId];lines.push(`• ${b?b.name:"Spot"} — ${gmapsLink(s.lat,s.lng)}`);});
  }
  lines.push("— shared from Birdomania");
  return lines.join("\n");
}
/* ---- "You found a lifer!" celebration: confetti + cheerful chime ---- */
function playLiferChime(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
    const ctx=new AC();const now=ctx.currentTime;
    [523.25,659.25,783.99,1046.5].forEach((f,i)=>{        // C5 E5 G5 C6 — bright major arpeggio
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type="triangle";o.frequency.value=f;
      const t=now+i*0.12;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.22,t+0.03);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
      o.connect(g).connect(ctx.destination);o.start(t);o.stop(t+0.5);
    });
    setTimeout(()=>{try{ctx.close();}catch(e){}},1300);
  }catch(e){}
}
function startConfetti(cv){
  if(!cv||!cv.getContext||!window.requestAnimationFrame)return;
  const ctx=cv.getContext("2d");if(!ctx)return;
  const W=cv.width=window.innerWidth,H=cv.height=window.innerHeight;
  const colors=["#c0612f","#3c7a4a","#9a7327","#9c3a2f","#d8b24a","#4a6b8a"];
  const parts=[];
  for(let i=0;i<150;i++)parts.push({x:Math.random()*W,y:-20-Math.random()*H*0.6,r:5+Math.random()*7,c:colors[i%colors.length],vy:2+Math.random()*3.5,vx:-1.5+Math.random()*3,rot:Math.random()*6.28,vr:-0.2+Math.random()*0.4,sh:Math.random()<0.5});
  const start=performance.now();
  (function frame(t){
    ctx.clearRect(0,0,W,H);
    parts.forEach(p=>{
      p.y+=p.vy;p.x+=p.vx;p.rot+=p.vr;p.vx+=Math.sin((t+p.y)/240)*0.03;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;
      if(p.sh)ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6);
      else{ctx.beginPath();ctx.arc(0,0,p.r/2,0,6.28);ctx.fill();}
      ctx.restore();
      if(p.y>H+30){p.y=-20;p.x=Math.random()*W;}
    });
    if(t-start<4200)requestAnimationFrame(frame);else ctx.clearRect(0,0,W,H);
  })(start);
}
function celebrateLifer(birdId){
  const b=BIRDS[birdId];if(!b)return;
  try{
    const wc=state.wikiCache[birdId],gc=state.galleryCache[birdId],up=state.birdPhotos[birdId];
    let imgHtml;
    if(up)imgHtml=`<img data-userphoto="${up}">`;
    else if(gc&&gc.ok&&gc.photos[0])imgHtml=`<img src="${esc(gc.photos[0].src)}" onerror="this.outerHTML=birdSVG('${birdId}')">`;
    else if(wc&&wc.ok&&wc.thumb)imgHtml=`<img src="${esc(wc.thumb)}" onerror="this.outerHTML=birdSVG('${birdId}')">`;
    else imgHtml=birdSVG(birdId);
    const lifeCount=new Set(state.sightings.map(s=>s.birdId)).size;
    const ov=el(`<div class="lifer-ov">
      <canvas class="lifer-confetti"></canvas>
      <div class="lifer-card">
        <div class="lifer-burst">🎉</div>
        <div class="lifer-h">You found a lifer!</div>
        <div class="lifer-img">${imgHtml}</div>
        <div class="lifer-name">${esc(dispName(b))}</div>
        ${dispSubHTML(b,"lifer-sci")}
        <div class="lifer-sub">Added to your life list — species #${lifeCount}</div>
      </div></div>`);
    document.body.appendChild(ov);
    hydrateUserPhotos(ov);
    playLiferChime();
    startConfetti(ov.querySelector(".lifer-confetti"));
    let closed=false;
    const close=()=>{if(closed)return;closed=true;ov.classList.add("out");setTimeout(()=>{if(ov.parentNode)ov.remove();},360);};
    ov.addEventListener("click",close);
    setTimeout(close,4200);
  }catch(e){}
}

/* ============================================================
   MILESTONES — badges for life-list size and region completion.
   Earned once, kept forever (state.milestones: key -> timestamp); deleting
   sightings never revokes a badge. New installs with an existing life list
   are seeded SILENTLY at boot so users aren't buried in retroactive confetti.
   ============================================================ */
const LIFE_TIERS=[
  {n:10,emoji:"🐣",title:"First Flock",sub:"10 species on your life list"},
  {n:25,emoji:"🪶",title:"Twenty-Five",sub:"25 species on your life list"},
  {n:50,emoji:"🌿",title:"Half Hundred",sub:"50 species on your life list"},
  {n:100,emoji:"💯",title:"The Century",sub:"100 species on your life list"},
  {n:150,emoji:"🦅",title:"One-Fifty",sub:"150 species on your life list"},
  {n:200,emoji:"🌟",title:"Double Century",sub:"200 species on your life list"},
  {n:250,emoji:"👑",title:"Two-Fifty",sub:"250 species on your life list"},
  {n:300,emoji:"🏆",title:"Three Hundred",sub:"300 species on your life list"},
  {n:400,emoji:"🌍",title:"Four Hundred",sub:"400 species on your life list"},
  {n:500,emoji:"🎇",title:"The Big 500",sub:"500 species on your life list"}
];
const REGION_TIERS=[25,50,75,100];
function lifeListIds(){return [...new Set(state.sightings.map(s=>s.birdId))].filter(id=>BIRDS[id]);}
// Milestone overlays are serialized through a queue and wait for any active
// lifer/milestone overlay to clear first — so they never stack on the lifer
// celebration that usually precedes them, nor on each other.
let _celebQueue=[],_celebRunning=false;
function celebrateMilestone(emoji,title,sub){_celebQueue.push({emoji,title,sub});runCelebQueue();}
function runCelebQueue(){
  if(_celebRunning||!_celebQueue.length)return;
  if(document.querySelector(".lifer-ov")){setTimeout(runCelebQueue,700);return;} // a celebration is on screen
  _celebRunning=true;
  const m=_celebQueue.shift();
  try{
    const ov=el(`<div class="lifer-ov">
      <canvas class="lifer-confetti"></canvas>
      <div class="lifer-card">
        <div class="lifer-burst">${m.emoji}</div>
        <div class="lifer-h">Milestone!</div>
        <div class="lifer-name">${esc(m.title)}</div>
        <div class="lifer-sub">${esc(m.sub)}</div>
      </div></div>`);
    document.body.appendChild(ov);
    playLiferChime();
    startConfetti(ov.querySelector(".lifer-confetti"));
    let closed=false;
    const close=()=>{if(closed)return;closed=true;ov.classList.add("out");
      setTimeout(()=>{if(ov.parentNode)ov.remove();_celebRunning=false;runCelebQueue();},360);};
    ov.addEventListener("click",close);
    setTimeout(close,4200);
  }catch(e){_celebRunning=false;runCelebQueue();}
}
/* Checks every milestone; records newly-earned ones and (unless silent)
   celebrates them one at a time, staggered so they never collide with the
   lifer overlay that usually precedes this. */
function checkMilestones(silent){
  if(!state.milestones)state.milestones={};
  const earned=[];
  const life=lifeListIds().length;
  LIFE_TIERS.forEach(t=>{
    const key="life-"+t.n;
    if(life>=t.n&&!state.milestones[key]){state.milestones[key]=Date.now();earned.push(t);}
  });
  const seen=new Set(lifeListIds());
  (state.loadedRegions||[]).forEach(code=>{
    const pool=regionBirds(code);if(!pool.length)return;
    const got=pool.filter(id=>seen.has(id)).length;
    const pct=Math.floor(got/pool.length*100);
    REGION_TIERS.forEach(p=>{
      const key="reg-"+code+"-"+p;
      if(pct>=p&&!state.milestones[key]){
        state.milestones[key]=Date.now();
        earned.push({emoji:p===100?"🏅":"📍",title:`${regionName(code)} ${p===100?"complete!":p+"%"}`,
                     sub:`${got} of ${pool.length} ${regionName(code)} species seen`});
      }
    });
  });
  if(earned.length)save();
  if(!silent)earned.forEach(m=>celebrateMilestone(m.emoji,m.title,m.sub));   // queue serializes + waits out the lifer
  return earned.length;
}
function unlogBirdFromTrip(tripId,birdId){
  const t=state.trips.find(x=>x.id===tripId);if(!t)return;
  t.birds=t.birds.filter(b=>b!==birdId);
  state.sightings=state.sightings.filter(s=>!(s.tripId===tripId&&s.birdId===birdId));

}
// Delete a single sighting record; if it was the last of its species on its trip, prune the trip's logged list too.
function deleteSighting(sightingId){
  const s=state.sightings.find(x=>x.id===sightingId);if(!s)return;
  state.sightings=state.sightings.filter(x=>x.id!==sightingId);
  if(s.tripId){

  save();
}

/* ============================================================
   Custom ordering — shared by Seen Birds and Portfolio.
   Custom arrangements persist as id arrays (state.seenOrder /
   state.portfolioOrder) that self-heal: ids that vanished are dropped,
   new ids are prepended (newest-first, matching the app's convention).
   ============================================================ */
// Rewrite only the visible ids' slots in the full order — reordering a
// filtered/searched subset must leave every hidden item exactly in place.
function applySubsetOrder(full,visibleNew){
  const known=new Set(full);
  visibleNew=visibleNew.filter(id=>known.has(id));   // ignore cards the order doesn't track
  const vis=new Set(visibleNew);
  const pos=[];
  full.forEach((id,i)=>{if(vis.has(id))pos.push(i);});
  visibleNew.forEach((id,k)=>{full[pos[k]]=id;});
}
function reconcileOrder(orderKey,allIds){
  const cur=(Array.isArray(state[orderKey])?state[orderKey]:[]).filter(id=>allIds.includes(id));
  const have=new Set(cur);
  const next=allIds.filter(id=>!have.has(id)).concat(cur);
  if(next.length!==(state[orderKey]||[]).length||next.some((id,i)=>id!==state[orderKey][i])){state[orderKey]=next;save();}
  return next;
}
/* Pointer-based drag-to-reorder for a card grid (works on touch — HTML5
   drag-and-drop doesn't). Active only while the grid has .reordering.
   The dragged card keeps pointer capture but loses hit-testing, so
   elementFromPoint sees the card underneath; near the viewport edges an
   rAF loop auto-scrolls the page so long lists stay reachable. */
function makeGridReorderable(grid,onDrop){
  let drag=null,rafId=null,lastX=0,lastY=0;
  const autoscroll=()=>{
    if(!drag)return;
    const m=90,vh=window.innerHeight;
    if(lastY<m)window.scrollBy(0,-Math.ceil((m-lastY)/5));
    else if(lastY>vh-m)window.scrollBy(0,Math.ceil((lastY-(vh-m))/5));
    rafId=requestAnimationFrame(autoscroll);
  };
  grid.addEventListener("pointerdown",e=>{
    if(!grid.classList.contains("reordering"))return;
    const card=e.target.closest(".card");
    if(!card||card.parentElement!==grid)return;
    e.preventDefault();
    drag=card;card.classList.add("dragging");card.style.pointerEvents="none";
    try{card.setPointerCapture(e.pointerId);}catch(err){}
    lastX=e.clientX;lastY=e.clientY;
    rafId=requestAnimationFrame(autoscroll);
  });
  grid.addEventListener("pointermove",e=>{
    if(!drag)return;
    e.preventDefault();
    lastX=e.clientX;lastY=e.clientY;
    const over=document.elementFromPoint(e.clientX,e.clientY);
    const target=over&&over.closest(".card");
    if(!target||target===drag||target.parentElement!==grid)return;
    const r=target.getBoundingClientRect();
    // same row → decide by X; different row → decide by Y
    const inRow=e.clientY>=r.top&&e.clientY<=r.bottom;
    const after=inRow?e.clientX>r.left+r.width/2:e.clientY>r.top+r.height/2;
    grid.insertBefore(drag,after?target.nextSibling:target);
  });
  const end=()=>{
    if(!drag)return;
    drag.classList.remove("dragging");drag.style.pointerEvents="";
    drag=null;
    if(rafId){cancelAnimationFrame(rafId);rafId=null;}
    onDrop([...grid.children]);
  };
  grid.addEventListener("pointerup",end);
  grid.addEventListener("pointercancel",end);
}

function seenFullOrderIds(sortMode){

function seenCard(g){
  const b=BIRDS[g.birdId];if(!b)return el(`<div></div>`);
  const hasPhoto=!!state.birdPhotos[g.birdId];
  const latest=g.sightings[0];
  const count=g.sightings.length;
  const total=g.sightings.reduce((a,s)=>a+(s.count>0?s.count:1),0);
  // distinct regions across this species' sightings (in current scope)
  const regions=[...new Set(g.sightings.map(s=>s.region))];
  const regionPill=regions.length===1
    ? `<span class="pill region">${regionIcon(regions[0])} ${esc(regionName(regions[0]))}</span>`
    : `<span class="pill region">📍 ${regions.length} regions</span>`;
  const card=el(`<div class="card">

    <div class="thumb-wrap" data-birdimg="${g.birdId}">${birdImageHTML(g.birdId)}</div>

        <span class="pill ${hasPhoto?"photo":"outline"}">${hasPhoto?"📷 Your photo":"No photo"}</span>
      </div>
      <div class="meta" style="margin-top:7px">
        ${count>1?`<span class="pill trip">Seen ${count}×${total>count?` · ${total} birds`:""}</span>`:`<span class="pill trip">${esc(latest.tripName||"Manually added")}${total>1?` · ${total} birds`:""}</span>`}
        <span class="tiny" style="align-self:center">${count>1?"Latest "+fmtDate(latest.date):fmtDate(latest.date)}</span>
      </div>
    </div>
  </div>`);
  card.querySelector(".thumb-wrap").style.cursor="pointer";
  card.querySelector(".thumb-wrap").onclick=()=>openBirdDetail(g.birdId);
  card.querySelector(".name").style.cursor="pointer";
  card.querySelector(".name").onclick=()=>openBirdDetail(g.birdId);

    e.stopPropagation();
    const scope=seenState.region!=="ALL"?` in ${regionName(seenState.region)}`:"";
    const msg=count>1
      ? `Are you sure you want to delete all ${count} ${b.name} sightings${scope}? This cannot be undone.`
      : `Are you sure you want to delete this ${b.name} sighting from ${latest.tripName||"your catalogue"}? This cannot be undone.`;
    confirmDialog("Remove this bird?",msg,()=>{
      const ids=new Set(g.sightings.map(s=>s.id));
      state.sightings=state.sightings.filter(x=>!ids.has(x.id));
      // also prune each affected trip's logged list if no sightings of that bird remain
      const affected=[...new Set(g.sightings.map(s=>s.tripId).filter(Boolean))];
      affected.forEach(tid=>{
        const t=state.trips.find(t=>t.id===tid);
        if(t)t.birds=t.birds.filter(bid=>bid!==g.birdId||state.sightings.some(x=>x.tripId===t.id&&x.birdId===bid));
      });
      save();render();toast(count>1?`${count} sightings removed`:"Sighting removed");
    });
  };
  return card;
}

// Find a freely-licensed recording of a species on Wikimedia Commons and play
// it inline. (The old xeno-canto API v2 was retired — v3 now requires a key —
// so we search Commons' audio files, which are CORS-enabled and CC-licensed.)
const _audioCache={};
function stripTags(s){return (s||"").replace(/<[^>]*>/g,"").replace(/\s+/g," ").trim();}
/* Resolve a bird's recording metadata from Wikimedia Commons (one API call:
   File-namespace search + imageinfo). Resolves to {src,by,license,page} or
   null (cached either way for the session); rejects only on network failure.
   Shared by the bird-detail player and the sound quiz. */
async function fetchBirdAudioMeta(id){
  if(id in _audioCache)return _audioCache[id];
  const b=BIRDS[id];if(!b)return null;
  const q=encodeURIComponent('filetype:audio "'+b.sci+'"');
  const url=`https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*`+
    `&generator=search&gsrnamespace=6&gsrlimit=8&gsrsearch=${q}`+
    `&prop=imageinfo&iiprop=url|mime|extmetadata`;
  const r=await fetch(url,{headers:{Accept:"application/json"}});
  const j=await r.json();
  const pages=(j.query&&j.query.pages)?Object.values(j.query.pages):[];
  pages.sort((a,b)=>(a.index||0)-(b.index||0));   // preserve search relevance order
  let meta=null;
  for(const pg of pages){
    const ii=pg.imageinfo&&pg.imageinfo[0];
    if(!ii||!ii.url||!/audio|ogg/i.test(ii.mime||""))continue;
    const em=ii.extmetadata||{};
    meta={src:ii.url,
          by:stripTags(em.Artist&&em.Artist.value)||"unknown",
          license:stripTags(em.LicenseShortName&&em.LicenseShortName.value),
          page:pg.title?"https://commons.wikimedia.org/wiki/"+encodeURIComponent(pg.title.replace(/ /g,"_")):""};
    break;
  }
  _audioCache[id]=meta;   // null = definitive "none found" for this session
  return meta;
}
async function loadBirdAudio(ov,id,btn){
  const box=ov.querySelector("#audioBox");if(!box)return;
  box.style.display="";
  if(_audioCache[id]===null){box.innerHTML=`<p class="tiny" style="padding:10px">No recording found. Try xeno-canto directly.</p>`;return;}
  if(_audioCache[id]){box.innerHTML="";box.appendChild(buildAudioPlayer(_audioCache[id]));return;}
  box.innerHTML=`<p class="tiny" style="padding:10px">Finding a recording…</p>`;
  btn.disabled=true;
  try{
    const meta=await fetchBirdAudioMeta(id);
    btn.disabled=false;
    if(!meta){box.innerHTML=`<p class="tiny" style="padding:10px">No recording found. Try xeno-canto directly.</p>`;return;}
    box.innerHTML="";box.appendChild(buildAudioPlayer(meta));
  }catch(e){
    btn.disabled=false;
    box.innerHTML=`<p class="tiny" style="padding:10px">Couldn't load audio (offline?). Try xeno-canto directly.</p>`;
  }
}
function buildAudioPlayer(meta){
  const wrap=el(`<div style="padding:10px">
    <audio controls preload="none" src="${esc(meta.src)}" style="width:100%"></audio>
    <p class="tiny" style="margin-top:6px">Recorded by ${esc(meta.by||"unknown")}${meta.license?" · "+esc(meta.license):""} · ${meta.page?`<a target="_blank" rel="noopener" href="${esc(meta.page)}">Wikimedia Commons</a>`:"Wikimedia Commons"}</p>
  </div>`);
  return wrap;
}

function buildGallery(ov,id){
  const b=BIRDS[id];const g=ov.querySelector("#gallery");const wc=state.wikiCache[id];const up=state.birdPhotos[id];
  const cache=state.galleryCache[id];
  const note=ov.querySelector("#galNote");
  const main=ov.querySelector("#mainImg");
  const cap=ov.querySelector("#mainCap");
  const items=[];
  if(up)items.push({type:"user",ref:up,caption:"Your photo",credit:""});
  if(cache&&cache.ok){cache.photos.forEach(p=>items.push({type:"id",src:p.src,full:p.full,caption:p.caption,credit:p.credit,page:p.page}));}
  else if(wc&&wc.ok&&wc.thumb)items.push({type:"wiki",src:wc.thumb,full:wc.thumb,caption:"Identification photo",credit:""});
  items.push({type:"svg",caption:"Illustration plate"});
  let cur=0;
  function setMain(it){
    if(it.type==="svg"){main.innerHTML=birdSVG(id);main.dataset.full="";}
    else if(it.type==="user"){main.innerHTML=`<img data-userphoto="${it.ref}">`;hydrateUserPhotos(main);main.dataset.full="";}
    else{main.innerHTML=`<img src="${esc(it.full||it.src)}" onerror="this.outerHTML=birdSVG('${id}')">`;main.dataset.full=it.full||it.src||"";}
    main.dataset.cap=it.caption||"";
    cap.innerHTML=`<b>${esc(it.caption||"Identification photo")}</b>${it.credit?`<span class="credit">© ${esc(it.credit)}</span>`:""}`;
  }
  function thumbForItem(it){
    if(it.type==="svg")return {kind:"svg"};
    if(it.type==="user")return {kind:"user",ref:it.ref};
    return {kind:"url",src:it.full||it.src};
  }
  function isCurrentThumb(it){
    const t=state.birdThumb&&state.birdThumb[id];if(!t)return false;
    const w=thumbForItem(it);
    return t.kind===w.kind&&(w.kind==="svg"||t.ref===w.ref||t.src===w.src);
  }
  const setThumbBtn=ov.querySelector("#setThumb");
  function selectIndex(i){
    if(!items.length)return;
    cur=(i%items.length+items.length)%items.length;
    const thumbs=g.querySelectorAll(".g-thumb");
    thumbs.forEach((x,idx)=>x.classList.toggle("active",idx===cur));
    setMain(items[cur]);
    const act=thumbs[cur];
    if(act&&act.scrollIntoView)act.scrollIntoView({block:"nearest",inline:"nearest"});
    if(setThumbBtn)setThumbBtn.textContent=isCurrentThumb(items[cur])?"★ Current thumbnail":"★ Use this photo as thumbnail";
  }
  if(setThumbBtn)setThumbBtn.onclick=()=>{
    const it=items[cur];if(!it)return;
    if(!state.birdThumb)state.birdThumb={};
    state.birdThumb[id]=thumbForItem(it);save();
    selectIndex(cur);render();toast("Thumbnail updated");
  };
  g.innerHTML="";
  items.forEach((it,i)=>{
    const inner=it.type==="user"?`<img data-userphoto="${it.ref}">`
      :it.type==="svg"?birdSVG(id)
      :`<img src="${esc(it.src)}" onerror="this.outerHTML=birdSVG('${id}')">`;
    const badge=(it.type==="id"&&it.caption&&it.caption!=="Identification photo")?`<span class="tag-badge">${esc(it.caption)}</span>`:"";
    const t=el(`<div class="g-thumb${i===0?" active":""}">${inner}${badge}</div>`);
    t.onclick=()=>selectIndex(i);
    g.appendChild(t);
  });
  hydrateUserPhotos(g);
  if(items.length)selectIndex(0);
  // arrow-key navigation through the portfolio (left/right or up/down)
  if(ov._galKey)document.removeEventListener("keydown",ov._galKey);
  ov._galKey=function(e){
    if(!document.body.contains(ov)){document.removeEventListener("keydown",ov._galKey);ov._galKey=null;return;}
    if(document.querySelector(".lightbox"))return;           // don't hijack while enlarged view is open
    const tg=e.target;if(tg&&/^(INPUT|TEXTAREA|SELECT)$/.test(tg.tagName))return;
    if(e.key==="ArrowRight"||e.key==="ArrowDown"){e.preventDefault();selectIndex(cur+1);}
    else if(e.key==="ArrowLeft"||e.key==="ArrowUp"){e.preventDefault();selectIndex(cur-1);}
  };
  document.addEventListener("keydown",ov._galKey);
  if(cache&&cache.ok){
    const n=cache.photos.length;
    note.textContent=`${n} identification photo${n!==1?"s":""} from Wikimedia Commons — captions (sex / age / plumage) derived from each photo's source. Click a thumbnail, or use the ← / → arrow keys, to switch photos.`;
  }else if(cache&&!cache.ok){
    note.textContent="No additional identification photos were found for this species.";
  }else{
    note.textContent="Loading identification photos from Wikimedia Commons…";
    fetchBirdImages(id).then(()=>{if(document.body.contains(ov))buildGallery(ov,id);});
  }
}

/* ---------- Import bird profiles from a .csv file ----------
   Expected header columns (any order, case-insensitive):
   name, scientific, family, rarity, size, seasons, color, features, voice
   (only "name" is required; "seasons" may be separated by ; or |). */
function parseCSV(text){
  const rows=[];let row=[],val="",inQ=false;
  text=text.replace(/^\uFEFF/,"");
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(inQ){
      if(c==='"'){ if(text[i+1]==='"'){val+='"';i++;} else inQ=false; }
      else val+=c;
    }else{
      if(c==='"')inQ=true;
      else if(c===','){row.push(val);val="";}
      else if(c==='\n'){row.push(val);rows.push(row);row=[];val="";}
      else if(c==='\r'){/* skip */}
      else val+=c;
    }
  }
  if(val!==""||row.length){row.push(val);rows.push(row);}
  return rows.filter(r=>r.some(c=>String(c).trim()!==""));
}
const CSV_COLOR_HEX={red:"#c41e2a",orange:"#e8631a",yellow:"#e8c33a",green:"#2e6b4f",blue:"#3a6ea5",purple:"#6a4a8a",brown:"#8a6d4f",gray:"#8f8f8f",grey:"#8f8f8f",black:"#1a1a1a",white:"#e8e4d8"};
function csvSlug(s){return String(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||("bird-"+uid());}
document.getElementById("csvPicker").addEventListener("change",function(e){
  const file=e.target.files[0];this.value="";if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const rows=parseCSV(r.result);
      if(rows.length<2){toast("CSV needs a header row and at least one bird");return;}
      const header=rows[0].map(h=>h.trim().toLowerCase());
      const col=names=>{for(const n of names){const i=header.indexOf(n);if(i>=0)return i;}return -1;};
      const iName=col(["name","common name","bird","common"]);
      if(iName<0){toast("CSV must have a 'name' column");return;}
      const iSci=col(["scientific","sci","scientific name","latin"]);
      const iFam=col(["family","fam"]);
      const iRar=col(["rarity","r","status"]);
      const iSz=col(["size","sz","length"]);
      const iSea=col(["seasons","season","sea","when"]);
      const iCol=col(["color","colour","col"]);
      const iFeat=col(["features","feat","description","notes","identification"]);
      const iVoice=col(["voice","sounds","call","song"]);
      const birdIds=[];let added=0;
      rows.slice(1).forEach(cells=>{
        const name=(cells[iName]||"").trim();if(!name)return;
        let id=csvSlug(name);
        // reuse an existing matching species, else create a fresh (uniquely-keyed) profile
        if(BIRDS[id]&&BIRDS[id].name.toLowerCase()!==name.toLowerCase()){id=id+"-"+uid().slice(-4);}
        if(!BIRDS[id]){
          let colVal=(iCol>=0?(cells[iCol]||""):"").trim();
          if(colVal&&!/^#?[0-9a-f]{6}$/i.test(colVal))colVal=CSV_COLOR_HEX[colVal.toLowerCase()]||"";
          if(colVal&&colVal[0]!=="#")colVal="#"+colVal;
          const seaRaw=(iSea>=0?(cells[iSea]||""):"").trim();
          const sea=seaRaw?seaRaw.split(/[;|]/).map(s=>s.trim()).filter(Boolean):["Year-round"];
          BIRDS[id]={
            name,
            sci:(iSci>=0?cells[iSci]:"")?.trim()||"",
            fam:(iFam>=0?cells[iFam]:"")?.trim()||"Imported",
            r:(iRar>=0?cells[iRar]:"")?.trim()||"Uncommon",
            sz:(iSz>=0?cells[iSz]:"")?.trim()||"",
            sea:sea.length?sea:["Year-round"],
            reg:[],
            col:colVal||"#6b7a8f",
            feat:(iFeat>=0?cells[iFeat]:"")?.trim()||"",
            voice:(iVoice>=0?cells[iVoice]:"")?.trim()||""
          };
          added++;
        }
        birdIds.push(id);
      });
      const ids=[...new Set(birdIds)];
      if(ids.length===0){toast("No valid birds found in CSV");return;}
      const listName=(file.name||"Imported list").replace(/\.csv$/i,"").trim()||"Imported list";
      const lid=uid();
      state.customLists.push({id:lid,name:listName,baseRegion:null,birdIds:ids});
      save();closeModal();listState.region="custom:"+lid;listState.sub=null;switchTab("lists");render();
      toast(`Imported ${ids.length} bird${ids.length===1?"":"s"}${added?` (${added} new)`:""}`);
    }catch(err){toast("Could not read that CSV file");}
  };
  r.readAsText(file);
});

// read a file's intrinsic pixel dimensions (best-effort, never rejects)
function imageDims(file){
  return new Promise(res=>{
    try{
      const url=URL.createObjectURL(file),im=new Image();
      im.onload=()=>{res({w:im.naturalWidth,h:im.naturalHeight});URL.revokeObjectURL(url);};
      im.onerror=()=>{res({w:0,h:0});URL.revokeObjectURL(url);};
      im.src=url;
    }catch(e){res({w:0,h:0});}
  });
}

document.getElementById("dataPicker").addEventListener("change",function(e){
  const file=e.target.files[0];this.value="";if(!file)return;
  confirmDialog("Restore from backup?","This will replace all current data with the contents of the backup file.",async()=>{
    const r=new FileReader();
    r.onload=async()=>{
      try{
        const j=JSON.parse(r.result);
        if(!j.state)throw new Error("bad");
        // restore images first
        if(j.images){for(const[id,durl]of Object.entries(j.images)){const blob=await dataURLToBlob(durl);await new Promise(async res=>{const db=await idb();const tx=db.transaction("imgs","readwrite");tx.objectStore("imgs").put(blob,id);tx.oncomplete=res;tx.onerror=res;});}}
        state=Object.assign(structuredClone(DEFAULT_STATE),j.state);
        // Import doesn't reload, so reconcile badges here (silently) — an old
        // backup's milestones may be missing/stale; otherwise the next lifer
        // would retroactively celebrate every tier at once.
        if(!state.milestones)state.milestones={};
        checkMilestones(true);
        save();render();toast("Backup restored");
      }catch(err){toast("That doesn't look like a Birdmania backup");}
    };
    r.readAsText(file);
  },"Restore");
});
function blobToDataURL(blob){return new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(blob);});}
async function dataURLToBlob(durl){const res=await fetch(durl);return res.blob();}

function targetCard(id,code){

  const famRows=Object.entries(perFam).sort((a,b)=>b[1]-a[1]).slice(0,8);
  if(famRows.length){

    famRows.forEach(([f,n])=>sec.appendChild(el(`<div class="bar-row"><span class="bl">${esc(f)}</span><span class="bt"><span class="bf" style="width:${Math.round(n/max*100)}%"></span></span><span class="bn">${n}</span></div>`)));

function buildHeatmap(){
  const weeks=26,days=weeks*7;
  const counts={};state.sightings.forEach(s=>{const k=new Date(s.date);k.setHours(0,0,0,0);counts[k.getTime()]=(counts[k.getTime()]||0)+1;});
  const today=new Date();today.setHours(0,0,0,0);
  // start on the Sunday of the earliest displayed week
  const start=new Date(today);start.setDate(start.getDate()-(days-1));start.setDate(start.getDate()-start.getDay());
  const wrap=el(`<div class="heatmap"></div>`);
  let cur=new Date(start);
  while(cur<=today){
    const col=el(`<div class="hm-col"></div>`);
    for(let d=0;d<7;d++){
      const n=counts[cur.getTime()]||0;
      const lvl=n===0?0:n<2?1:n<4?2:n<7?3:4;
      const future=cur>today;
      col.appendChild(el(`<div class="hm-cell ${future?"":("l"+lvl)}" title="${cur.toLocaleDateString()} — ${n} sighting${n===1?"":"s"}" style="${future?"visibility:hidden":""}"></div>`));
      cur.setDate(cur.getDate()+1);
    }
    wrap.appendChild(col);
  }
  const out=el(`<div></div>`);out.appendChild(wrap);
  out.appendChild(el(`<div class="heat-legend">Less <span class="hm-cell"></span><span class="hm-cell l1"></span><span class="hm-cell l2"></span><span class="hm-cell l3"></span><span class="hm-cell l4"></span> More</div>`));
  return out;
}
/* ----- day streaks: consecutive local-calendar days with ≥1 sighting -----
   Day keys are integers (20260713); stepping via new Date(y,m,d±1) keeps runs
   correct across DST shifts, unlike dividing timestamps by 86400000. */
function dayKey(d){return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}
function shiftDayKey(k,delta){return dayKey(new Date(Math.floor(k/10000),Math.floor(k/100)%100-1,k%100+delta));}
function streakStats(){
  const days=new Set();
  state.sightings.forEach(s=>days.add(dayKey(new Date(s.date))));
  let best=0;
  days.forEach(k=>{
    if(days.has(shiftDayKey(k,-1)))return;   // only measure from a run's first day
    let len=1,c=k;
    while(days.has(c=shiftDayKey(c,1)))len++;
    if(len>best)best=len;
  });
  // the current streak stays alive through today even before today's first bird
  const today=dayKey(new Date());
  const anchor=days.has(today)?today:(days.has(shiftDayKey(today,-1))?shiftDayKey(today,-1):null);
  let cur=0;
  if(anchor!=null){cur=1;let c=anchor;while(days.has(c=shiftDayKey(c,-1)))cur++;}
  return {cur,best,today:days.has(today)};
}
function exportLifeListCSV(){
  if(state.sightings.length===0){toast("No sightings to export");return;}
  const bySpecies={};
  state.sightings.forEach(s=>{
    const g=bySpecies[s.birdId]=bySpecies[s.birdId]||{first:s.date,n:0,ind:0,regions:new Set()};
    g.n++;g.ind+=s.count>0?s.count:1;g.first=Math.min(g.first,s.date);g.regions.add(regionName(s.region));
  });
  const esc2=v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`;
  const header=["Common name","Scientific name","Family","Rarity","First seen","Sightings","Individuals","Regions"];
  const lines=[header.map(esc2).join(",")];
  Object.entries(bySpecies).sort((a,b)=>a[1].first-b[1].first).forEach(([id,g])=>{
    const b=BIRDS[id];if(!b)return;
    lines.push([b.name,b.sci,b.fam,b.r,new Date(g.first).toISOString().slice(0,10),g.n,g.ind,[...g.regions].join("; ")].map(esc2).join(","));
  });
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`birdmania-lifelist-${new Date().toISOString().slice(0,10)}.csv`;a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast("Life list exported");
}

/* ============================================================
   VIEW: QUIZ  (identify the bird from 4 choices)
   ============================================================ */
let quizState={current:null,options:[],answered:false,score:0,total:0,region:"ALL",sub:null,
               mode:"photo",audioMeta:null,loadingSound:false,soundFail:false};
function quizRegions(){return state.loadedRegions.length?state.loadedRegions:Object.keys(REGION_NAMES);}
function quizPool(){
  const ids=new Set();
  if(quizState.region==="ALL"){
    quizRegions().forEach(c=>regionBirds(c).forEach(id=>{if(BIRDS[id])ids.add(id);}));
  }else if(quizState.sub){
    regionBirds(quizState.sub).forEach(id=>{if(BIRDS[id])ids.add(id);});
  }else{
    regionBirds(quizState.region).forEach(id=>{if(BIRDS[id])ids.add(id);});
  }
  return [...ids];
}
function newQuizQuestion(){
  const pool=quizPool();
  if(pool.length<4){quizState.current=null;return;}
  const correct=pool[Math.floor(Math.random()*pool.length)];
  const opts=new Set([correct]);
  while(opts.size<4)opts.add(pool[Math.floor(Math.random()*pool.length)]);
  quizState.current=correct;
  quizState.options=[...opts].sort(()=>Math.random()-0.5);
  quizState.answered=false;
}
/* Sound-mode question picker: not every species has a Commons recording, so
   candidates are vetted (fetchBirdAudioMeta) BEFORE the question is committed —
   no dead questions, no skip-flash. Async: views.quiz shows a loading card
   until this re-renders. */
let _soundPicking=false,_soundGen=0;
async function newSoundQuestion(){
  if(_soundPicking)return;
  _soundPicking=true;
  const gen=++_soundGen;   // invalidated if the user changes region/mode mid-fetch
  const pool=quizPool();
  quizState.current=null;quizState.audioMeta=null;quizState.answered=false;
  quizState.loadingSound=true;quizState.soundFail=false;
  try{
    const tried=new Set();
    for(let i=0;i<6&&tried.size<pool.length;i++){
      const cand=pool[Math.floor(Math.random()*pool.length)];
      if(tried.has(cand)){i--;continue;}
      tried.add(cand);
      let meta=null;
      try{meta=await fetchBirdAudioMeta(cand);}catch(e){quizState.soundFail=true;break;} // network down
      if(meta){
        const opts=new Set([cand]);
        while(opts.size<4)opts.add(pool[Math.floor(Math.random()*pool.length)]);
        quizState.current=cand;
        quizState.options=[...opts].sort(()=>Math.random()-0.5);
        quizState.audioMeta=meta;
        break;
      }
    }
    if(!quizState.current&&!quizState.soundFail)quizState.soundFail=true; // no audio in sample
  }finally{
    quizState.loadingSound=false;
    _soundPicking=false;
  }
  // If the scope changed while we were fetching, discard this result — a newer
  // pick (or a plain render) owns the view now.
  if(gen!==_soundGen)return;
  if(currentTab==="quiz")render();
}
views.quiz=function(root){
  const regions=quizRegions();
  // validate current scope against what's loaded
  if(quizState.region!=="ALL"&&!regions.includes(quizState.region)){quizState.region="ALL";quizState.sub=null;quizState.current=null;}
  if(quizState.sub&&SUBREGION_OF[quizState.sub]!==quizState.region){quizState.sub=null;quizState.current=null;}

  root.appendChild(el(`<div class="view-head"><h2>Bird ID Quiz</h2><p class="sub">${quizState.mode==="sound"?"Name the bird from its song or call.":"Name the bird from its picture."} Narrow the pool by region below.</p></div>`));

  // scope selector: region (+ subregion for states that have them, e.g. Alaska)
  const subs=quizState.region!=="ALL"?subregionsForState(quizState.region):[];
  const tb=el(`<div class="toolbar">
    <div><label class="fld">Quiz mode</label>
      <div class="seg" id="qMode">
        <button data-m="photo" class="${quizState.mode==="photo"?"active":""}">📷 Photos</button>
        <button data-m="sound" class="${quizState.mode==="sound"?"active":""}">🔊 Sounds</button>
      </div></div>
    <div class="spacer"></div>
    <div><label class="fld">Region</label>
      <select id="qRegion">
        <option value="ALL" ${quizState.region==="ALL"?"selected":""}>🌎 All loaded regions</option>
        ${regions.map(c=>`<option value="${c}" ${quizState.region===c?"selected":""}>${regionIcon(c)} ${esc(regionName(c))}</option>`).join("")}
      </select></div>
    ${subs.length?`<div><label class="fld">City / area</label>
      <select id="qSub">
        <option value="">🗺️ All of ${esc(regionName(quizState.region))}</option>
        ${subs.map(sc=>`<option value="${sc}" ${quizState.sub===sc?"selected":""}>🏘️ ${esc(regionName(sc))}</option>`).join("")}
      </select></div>`:""}
  </div>`);
  // Any scope/mode change invalidates an in-flight sound pick and clears the
  // loading flag so views.quiz starts a fresh pick instead of waiting on stale one.
  const resetSound=()=>{_soundGen++;quizState.current=null;quizState.audioMeta=null;quizState.soundFail=false;quizState.loadingSound=false;quizState.answered=false;};
  tb.querySelectorAll("#qMode button").forEach(btn=>btn.onclick=()=>{
    if(quizState.mode===btn.dataset.m)return;
    quizState.mode=btn.dataset.m;resetSound();render();
  });
  tb.querySelector("#qRegion").onchange=e=>{quizState.region=e.target.value;quizState.sub=null;resetSound();render();};
  const qSub=tb.querySelector("#qSub");
  if(qSub)qSub.onchange=e=>{quizState.sub=e.target.value||null;resetSound();render();};
  root.appendChild(tb);

  const pool=quizPool();
  const scopeName=quizState.region==="ALL"?"your loaded regions":(quizState.sub?regionName(quizState.sub):regionName(quizState.region));
  if(pool.length<4){
    root.appendChild(emptyState("🧠","Not enough birds",`This pool (${esc(scopeName)}) has too few species to play. Pick a broader region.`,null));
    return;
  }
  root.appendChild(el(`<div class="target-tip" style="text-align:center">Drawing from <b>${pool.length}</b> species in ${esc(scopeName)}.</div>`));

  if(quizState.mode==="sound"){
    // Async pipeline: the picker vets candidates for available recordings and
    // re-renders when a question is ready; until then show a holding card.
    if(!quizState.current&&!quizState.loadingSound&&!quizState.soundFail)newSoundQuestion();
    if(quizState.loadingSound||(!quizState.current&&!quizState.soundFail)){
      root.appendChild(el(`<div class="quiz-wrap"><div class="quiz-score">Score: <b>${quizState.score}</b> / ${quizState.total}</div>
        <p class="tiny" style="padding:26px;text-align:center">🔊 Finding a recording…</p></div>`));
      return;
    }
    if(quizState.soundFail){
      const failWrap=el(`<div class="quiz-wrap">
        <p class="tiny" style="padding:22px;text-align:center">Couldn't load recordings — you may be offline, or the birds drawn from this pool lack recordings on Wikimedia Commons.</p>
        <div style="text-align:center;margin-bottom:14px"><button class="btn" id="soundRetry">Try again</button></div></div>`);
      failWrap.querySelector("#soundRetry").onclick=()=>{quizState.soundFail=false;render();};
      root.appendChild(failWrap);
      return;
    }
  }else{
    if(!quizState.current)newQuizQuestion();
  }
  const cur=quizState.current,b=BIRDS[cur];
  const media=quizState.mode==="sound"
    ?`<div class="quiz-audio" style="padding:20px 12px 8px"></div>`
    :`<div class="quiz-imgwrap">
      <div class="quiz-img" data-birdimg="${cur}"></div>
      <button class="quiz-nav prev" aria-label="Previous photo">‹</button>
      <button class="quiz-nav next" aria-label="Next photo">›</button>
      <div class="quiz-imgcount"></div>
    </div>`;
  const wrap=el(`<div class="quiz-wrap">
    <div class="quiz-score">Score: <b>${quizState.score}</b> / ${quizState.total}</div>
    ${media}
    <div class="quiz-opts"></div>
    <div id="quizMsg" style="min-height:24px;margin-bottom:8px"></div>
    <button class="btn" id="nextQ" style="display:${quizState.answered?"inline-flex":"none"}">Next bird →</button>
  </div>`);
  if(quizState.mode==="sound"){
    // Plain controls, no filename/caption anywhere the answer could leak.
    wrap.querySelector(".quiz-audio").appendChild(el(`<audio controls preload="auto" src="${esc(quizState.audioMeta.src)}" style="width:100%"></audio>`));
  }else{
    buildQuizImages(wrap,cur);
  }
  const opts=wrap.querySelector(".quiz-opts");
  quizState.options.forEach(id=>{
    const btn=el(`<button class="quiz-opt" data-id="${id}">${esc(dispName(BIRDS[id]))}</button>`);
    if(quizState.answered){
      btn.disabled=true;
      if(id===cur)btn.classList.add("correct");
    }
    btn.onclick=()=>{
      if(quizState.answered)return;
      quizState.answered=true;quizState.total++;
      const correct=id===cur;
      if(correct)quizState.score++;
      opts.querySelectorAll(".quiz-opt").forEach(o=>{o.disabled=true;if(o.dataset.id===cur)o.classList.add("correct");else if(o===btn)o.classList.add("wrong");});
      // In sound mode the reveal also carries the recording's CC attribution.
      const credit=quizState.mode==="sound"&&quizState.audioMeta
        ?`<div class="tiny" style="margin-top:4px">Recording by ${esc(quizState.audioMeta.by)}${quizState.audioMeta.license?" · "+esc(quizState.audioMeta.license):""} · ${quizState.audioMeta.page?`<a target="_blank" rel="noopener" href="${esc(quizState.audioMeta.page)}">Wikimedia Commons</a>`:"Wikimedia Commons"}</div>`
        :"";
      wrap.querySelector("#quizMsg").innerHTML=(correct?`<span style="color:var(--forest);font-weight:600">✓ Correct!</span>`:`<span style="color:var(--rare);font-weight:600">✗ It's the ${esc(dispName(b))}</span>${dispSub(b)?` <span class="tiny">(${esc(dispSub(b))})</span>`:""}`)+credit;
      wrap.querySelector("#nextQ").style.display="inline-flex";
      const qi=wrap.querySelector(".quiz-img");
      if(qi){qi.style.cursor="pointer";qi.title="Open bird profile";qi.onclick=()=>openBirdDetail(cur);}
    };
    opts.appendChild(btn);
  });
  wrap.querySelector("#nextQ").onclick=()=>{
    if(quizState.mode==="sound"){newSoundQuestion();render();}   // async picker; render shows the holding card
    else{newQuizQuestion();render();}
  };
  root.appendChild(wrap);
};
// Image carousel for the quiz — scrolls through every photo available on the
// bird's profile (user photo, Wikimedia gallery, wiki thumbnail, SVG plate)
// WITHOUT captions/credits so the species name isn't revealed before answering.
function buildQuizImages(wrap,id){
  const img=wrap.querySelector(".quiz-img");
  const counter=wrap.querySelector(".quiz-imgcount");
  const prev=wrap.querySelector(".quiz-nav.prev");
  const next=wrap.querySelector(".quiz-nav.next");
  const up=state.birdPhotos[id],wc=state.wikiCache[id],cache=state.galleryCache[id];
  const items=[];
  if(up)items.push({type:"user",ref:up});
  if(cache&&cache.ok){cache.photos.forEach(p=>items.push({type:"url",src:p.full||p.src}));}
  else if(wc&&wc.ok&&wc.thumb)items.push({type:"url",src:wc.thumb});
  items.push({type:"svg"});
  let ci=0;
  function show(i){
    ci=(i%items.length+items.length)%items.length;
    const it=items[ci];
    if(it.type==="svg")img.innerHTML=birdSVG(id);
    else if(it.type==="user"){img.innerHTML=`<img data-userphoto="${it.ref}">`;hydrateUserPhotos(img);}
    else img.innerHTML=`<img src="${esc(it.src)}" onerror="this.outerHTML=birdSVG('${id}')">`;
    counter.textContent=`${ci+1} / ${items.length}`;
  }
  const multi=items.length>1;
  prev.style.display=next.style.display=multi?"flex":"none";
  counter.style.display=multi?"block":"none";
  prev.onclick=e=>{e.stopPropagation();show(ci-1);};
  next.onclick=e=>{e.stopPropagation();show(ci+1);};
  show(0);
  if(!cache){ // gallery not fetched yet — load it, then rebuild if still on this question
    fetchBirdImages(id).then(()=>{if(quizState.current===id&&document.body.contains(wrap))buildQuizImages(wrap,id);});
  }
}

/* ============================================================
   VIEW: FIELD MAP — bird spots on a real road map (Leaflet + OSM).
   leaflet.js/.css are self-hosted next to index.html and lazy-loaded on the
   first visit to this tab (the service worker precaches them, so the map UI
   works offline; tiles need network unless previously viewed).
   ============================================================ */
let _spotMap=null,_spotMarkers={},_leafletLoad=null;
// Live tracking + compass state.
let _geoWatch=null,_youMarker=null,_accCircle=null,_follow=false,_orientHandler=null,_heading=null,_searchMarker=null,_gotFirstFix=false,_geoDenied=false;
let _pendingMapFocus=null;   // tripId handoff from a trip card's 🗺️ button

function ensureLeaflet(){
  if(window.L&&window.L.map)return Promise.resolve(true);
  if(_leafletLoad)return _leafletLoad;
  _leafletLoad=new Promise(res=>{
    if(!document.getElementById("leaflet-css")){
      const l=document.createElement("link");l.id="leaflet-css";l.rel="stylesheet";l.href="leaflet.css";
      document.head.appendChild(l);
    }
    const s=document.createElement("script");s.src="leaflet.js";
    s.onload=()=>res(true);
    s.onerror=()=>{s.remove();_leafletLoad=null;res(false);}; // allow retry next visit
    document.body.appendChild(s);
  });
  return _leafletLoad;
}

function spotBird(s){return BIRDS[s.birdId]||null;}
function spotName(s){const b=spotBird(s);return b?dispName(b):"Bird spot";}
// Only ever emit a validated hex colour into marker inline styles (BIRDS.col is
// developer-authored hex today; this keeps the style-attribute sink safe even
// if that ever changes).
function spotCol(b){const c=b&&b.col;return (typeof c==="string"&&/^#[0-9a-fA-F]{3,8}$/.test(c))?c:"#2f4a3c";}
function gmapsLink(lat,lng){return `https://maps.google.com/?q=${lat.toFixed(5)},${lng.toFixed(5)}`;}

function spotShareText(s){
  const b=spotBird(s);
  const lines=[`🐦 ${b?b.name:"Bird spot"}`,`📍 ${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}`,`🗓️ ${fmtDate(s.date)}`];
  if(s.note)lines.push(`📝 ${s.note}`);
  lines.push(`🗺️ ${gmapsLink(s.lat,s.lng)}`);
  return lines.join("\n");
}
function allSpotsShareText(){
  const spots=state.spots.slice().sort((a,b)=>b.date-a.date);
  return `🗺️ My bird spots (${spots.length})\n\n`+spots.map(spotShareText).join("\n\n")+"\n\n— shared from Birdomania";
}

/* Share plain text: native share sheet in the Android shell, Web Share API in
   capable browsers, clipboard copy as the universal fallback. */
function shareTextOut(text){
  try{if(window.AndroidShell&&AndroidShell.shareText){AndroidShell.shareText(text);return;}}catch(e){}
  if(navigator.share){navigator.share({text}).catch(()=>{});return;}
  copyTextOut(text);
}
function copyTextOut(t){
  const done=()=>toast("Copied — paste it to a friend");
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(done,()=>legacyCopy(t,done));}
  else legacyCopy(t,done);
}
function legacyCopy(t,done){
  const ta=document.createElement("textarea");ta.value=t;
  ta.style.cssText="position:fixed;top:0;left:0;opacity:0";
  document.body.appendChild(ta);ta.select();
  let ok=false;try{ok=document.execCommand("copy");}catch(e){}
  ta.remove();if(ok)done();else toast("Couldn't copy automatically");
}

/* Accept "64.751, -155.493", geo: URIs, Google-Maps links, or a spot shared
   from Birdomania (uses its 🐦 line to pre-fill the species search). */
function parseCoordsFrom(text){
  if(!text)return null;
  const valid=(la,ln)=>isFinite(la)&&isFinite(ln)&&Math.abs(la)<=90&&Math.abs(ln)<=180;
  // Prefer a structured match (geo: URI, Google-Maps ?q=, or @lat,lng) — these
  // are unambiguous, so they win over any decimal pair sitting in prose.
  const s=text.match(/geo:(-?\d{1,3}(?:\.\d+)?),\s*(-?\d{1,3}(?:\.\d+)?)/i)
    ||text.match(/[?&]q(?:uery)?=(-?\d{1,3}(?:\.\d+)?)(?:,|%2C)(-?\d{1,3}(?:\.\d+)?)/i)
    ||text.match(/@(-?\d{1,3}(?:\.\d+)?),(-?\d{1,3}(?:\.\d+)?)/);
  if(s){const la=parseFloat(s[1]),ln=parseFloat(s[2]);if(valid(la,ln))return {lat:la,lng:ln};}
  // Plain "lat, lng": scan ALL decimal pairs and take the first in valid range
  // (so a leading out-of-range pair doesn't abort the whole parse).
  const re=/(-?\d{1,3}\.\d+)\s*,\s*(-?\d{1,3}\.\d+)/g;let mm;
  while((mm=re.exec(text))){const la=parseFloat(mm[1]),ln=parseFloat(mm[2]);if(valid(la,ln))return {lat:la,lng:ln};}
  return null;
}

function spotPopupHTML(s){
  const b=spotBird(s);
  return `<div class="spot-pop"><b>${esc(b?dispName(b):"Bird spot")}</b>`+
    (s.note?`<div class="spot-pop-note">${esc(s.note)}</div>`:"")+
    `<div class="tiny">${fmtDate(s.date)} · ${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}</div>`+
    `<div class="spot-pop-actions">`+
    `<button class="btn sm" data-spot-share="${esc(s.id)}">Share</button>`+
    (b?`<button class="btn sm ghost" data-spot-bird="${esc(s.birdId)}">Bird</button>`:"")+
    `<button class="btn sm danger" data-spot-del="${esc(s.id)}">Delete</button></div></div>`;
}

function addSpotMarker(s){
  if(!window.L||!_spotMap)return;
  const b=spotBird(s);
  const mk=L.marker([s.lat,s.lng],{icon:L.divIcon({
    className:"spot-pin-wrap",
    html:`<div class="spot-pin" style="--pin:${spotCol(b)}"></div>`,
    iconSize:[24,24],iconAnchor:[12,29],popupAnchor:[0,-30]
  })}).addTo(_spotMap);
  mk.bindPopup(spotPopupHTML(s));
  _spotMarkers[s.id]=mk;
}

function focusSpot(id){
  const mk=_spotMarkers[id];
  if(!_spotMap||!mk){toast("Map not loaded yet");return;}
  _spotMap.setView(mk.getLatLng(),Math.max(_spotMap.getZoom(),13));
  mk.openPopup();
  window.scrollTo({top:0,behavior:"smooth"});
}

function deleteSpot(id){
  const s=state.spots.find(x=>x.id===id);if(!s)return;
  confirmDialog("Delete this spot?",`${spotName(s)} — ${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}`,()=>{
    state.spots=state.spots.filter(x=>x.id!==id);save();
    if(_spotMarkers[id]){try{_spotMap.removeLayer(_spotMarkers[id]);}catch(e){}delete _spotMarkers[id];}
    refreshSpotList();toast("Spot deleted");
  });
}

function refreshSpotList(){
  const wrap=document.getElementById("spotList");if(!wrap)return;
  const badge=document.getElementById("spotCount");
  const spots=(state.spots||[]).slice().sort((a,b)=>b.date-a.date);
  if(badge)badge.textContent=spots.length?`(${spots.length})`:"";
  wrap.innerHTML="";
  if(!spots.length){
    wrap.appendChild(el(`<p class="tiny" style="padding:14px;text-align:center">No spots yet. Tap anywhere on the map to mark where you found a bird — then share the exact coordinates with friends.</p>`));
    return;
  }
  spots.forEach(s=>{
    const b=spotBird(s);
    const row=el(`<div class="spot-row">
      <span class="spot-dot" style="background:${spotCol(b)}"></span>
      <div class="spot-row-info">
        <div class="spot-row-name">${esc(spotName(s))}</div>
        <div class="spot-row-meta">${fmtDate(s.date)} · ${s.lat.toFixed(5)}, ${s.lng.toFixed(5)}${s.note?" · "+esc(s.note):""}</div>
      </div>
      <div class="spot-row-actions">
        <button class="btn sm ghost" data-a="view">View</button>
        <button class="btn sm ghost" data-a="share">Share</button>
        <button class="btn sm danger" data-a="del">✕</button>
      </div></div>`);
    row.querySelector('[data-a="view"]').onclick=()=>focusSpot(s.id);
    row.querySelector('[data-a="share"]').onclick=()=>shareTextOut(spotShareText(s));
    row.querySelector('[data-a="del"]').onclick=()=>deleteSpot(s.id);
    wrap.appendChild(row);
  });
}

function addSpotDialog(lat,lng,opts){
  lat=+lat;lng=+lng;
  if(!(isFinite(lat)&&isFinite(lng)&&Math.abs(lat)<=90&&Math.abs(lng)<=180)){toast("Those coordinates don't look valid");return;}
  let q=(opts&&opts.q)||"",chosen=null;
  const acc=opts&&opts.accuracy&&opts.accuracy>30?` · ±${Math.round(opts.accuracy)} m`:"";
  const body=el(`<div>
    <p class="tiny" style="margin:0 0 10px">📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}${acc}</p>
    <div class="form-row"><label class="fld">Which bird did you find?</label>
      <div class="search-wrap" style="max-width:none;margin-bottom:8px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5a4a37" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input type="search" id="spotQ" placeholder="Search all birds…"></div>
      <div class="scroll-list" id="spotBirdList" style="max-height:30vh"></div></div>
    <div class="form-row"><label class="fld">Note (optional)</label>
      <textarea id="spotNote" rows="2" style="width:100%" placeholder="e.g. singing male on the fence line"></textarea></div>
  </div>`);
  function draw(){
    const wrap=body.querySelector("#spotBirdList");wrap.innerHTML="";
    const ql=q.trim().toLowerCase();
    let ids=Object.keys(BIRDS);
    if(ql)ids=ids.filter(id=>{const b=BIRDS[id];return b.name.toLowerCase().includes(ql)||b.sci.toLowerCase().includes(ql);});
    ids.sort((a,b)=>BIRDS[a].name.localeCompare(BIRDS[b].name));
    ids=ids.slice(0,40);
    if(!ids.length){wrap.appendChild(el(`<p class="tiny" style="padding:12px;text-align:center">No matches.</p>`));return;}
    ids.forEach(id=>{
      const b=BIRDS[id];
      const row=el(`<div class="checkline" style="cursor:pointer${chosen===id?";background:rgba(47,74,60,.14);border-radius:8px":""}">
        <span style="flex:1"><b>${esc(dispName(b))}</b>${dispSubInline(b)}</span>
        <span class="pill rarity-${rsl(b.r)}">${b.r}</span></div>`);
      row.onclick=()=>{chosen=id;draw();};
      wrap.appendChild(row);
    });
  }
  draw();
  const foot=el(`<div style="display:flex;gap:8px"><button class="btn ghost" id="spotCancel">Cancel</button><button class="btn" id="spotSave">Save spot</button></div>`);
  openModal({title:"New bird spot",body,foot,onMount:ov=>{
    const qi=ov.querySelector("#spotQ");qi.value=q;qi.oninput=e=>{q=e.target.value;draw();};
    ov.querySelector("#spotCancel").onclick=closeModal;
    ov.querySelector("#spotSave").onclick=()=>{
      if(!chosen){toast("Pick which bird you found");return;}
      const note=ov.querySelector("#spotNote").value.trim();
      const s={id:uid(),birdId:chosen,lat:+lat.toFixed(6),lng:+lng.toFixed(6),note,date:Date.now()};
      state.spots.push(s);save();
      closeModal();
      toast(`${spotName(s)} spot saved`);
      if(_geoWatch!=null)pauseFollow();   // keep the view on the just-saved spot, not the next GPS fix
      if(_spotMap){addSpotMarker(s);focusSpot(s.id);}
      refreshSpotList();
    };
  }});
}

function pasteCoordsDialog(){
  const body=el(`<div>
    <p class="tiny" style="margin:0 0 8px">Paste coordinates ("64.751, -155.493"), a Google-Maps link, or a spot a friend shared from Birdomania.</p>
    <textarea id="pasteBox" rows="5" style="width:100%" placeholder="🐦 Willow Ptarmigan&#10;📍 64.75110, -155.49360"></textarea>
  </div>`);
  const foot=el(`<div><button class="btn" id="pasteGo">Find on map</button></div>`);
  openModal({title:"Add from coordinates",body,foot,onMount:ov=>{
    ov.querySelector("#pasteGo").onclick=()=>{
      const txt=ov.querySelector("#pasteBox").value;
      const c=parseCoordsFrom(txt);
      if(!c){toast("No valid coordinates found");return;}
      const hint=((txt.match(/🐦\s*([^\n]+)/)||[])[1]||"").trim();
      closeModal();
      if(_spotMap)_spotMap.setView([c.lat,c.lng],14);
      addSpotDialog(c.lat,c.lng,{q:hint});
    };
  }});
}

function locateMe(){
  if(!navigator.geolocation){toast("Location isn't available here — tap the map instead");return;}
  toast("Finding your location…");
  navigator.geolocation.getCurrentPosition(p=>{
    if(currentTab!=="map")return;   // fix arrived after the user left the tab
    const la=p.coords.latitude,ln=p.coords.longitude;
    if(_spotMap)_spotMap.setView([la,ln],15);
    addSpotDialog(la,ln,{accuracy:p.coords.accuracy});
  },err=>{
    toast(err&&err.code===1?"Location permission denied — tap the map instead":"Couldn't get a location fix — tap the map instead");
  },{enableHighAccuracy:true,timeout:12000,maximumAge:30000});
}

/* ---- Live location tracking (you-are-here dot + accuracy ring + follow) ---- */
function youIcon(){
  return L.divIcon({className:"you-dot-wrap"+(_heading==null?" no-heading":""),
    html:'<div class="you-beam" style="transform:rotate('+(_heading||0)+'deg)"></div><div class="you-dot"></div>',
    iconSize:[16,16],iconAnchor:[8,8]});
}
function updateYouHeading(){
  if(!_youMarker)return;
  const w=_youMarker.getElement();if(!w)return;
  w.classList.toggle("no-heading",_heading==null);
  const beam=w.querySelector(".you-beam");
  if(beam&&_heading!=null)beam.style.transform="rotate("+_heading+"deg)";
}
function onPositionFix(p){
  if(currentTab!=="map"||!_spotMap)return;
  const la=p.coords.latitude,ln=p.coords.longitude,acc=p.coords.accuracy||0;
  const ll=[la,ln];
  if(!_youMarker){_youMarker=L.marker(ll,{icon:youIcon(),zIndexOffset:1000,interactive:false}).addTo(_spotMap);}
  else _youMarker.setLatLng(ll);
  if(!_accCircle){_accCircle=L.circle(ll,{radius:acc,color:"#1a73e8",weight:1,fillColor:"#1a73e8",fillOpacity:.12,interactive:false}).addTo(_spotMap);}
  else{_accCircle.setLatLng(ll);_accCircle.setRadius(acc);}
  // GPS heading (course) is a decent fallback when the compass is unavailable.
  if(_heading==null&&typeof p.coords.heading==="number"&&!isNaN(p.coords.heading)&&p.coords.speed>0.5){_heading=p.coords.heading;updateYouHeading();}
  if(_follow)_spotMap.setView(ll,_gotFirstFix?_spotMap.getZoom():16);
  _gotFirstFix=true;
}
// Tracking starts automatically when the map opens (auto=true). auto softens
// the messaging: no "tracking…" toast, and after a denial we don't re-prompt on
// every visit (only an explicit action would).
function startTracking(auto){
  if(!navigator.geolocation){if(!auto)toast("Location isn't available here");return;}
  if(_geoWatch!=null)return;
  if(auto&&_geoDenied)return;
  _follow=true;_gotFirstFix=false;
  if(!auto)toast("Tracking your location…");
  _geoWatch=navigator.geolocation.watchPosition(onPositionFix,err=>{
    if(err&&err.code===1){_geoDenied=true;toast("Location is off — enable it for live tracking, or tap the map to add a spot");stopTracking();}
    else if(!auto)toast("Waiting for a GPS fix…");
  },{enableHighAccuracy:true,maximumAge:2000,timeout:20000});
  startCompass();
  // Following pauses the moment the user drags the map, so they can look around.
  if(_spotMap)_spotMap.on("dragstart",pauseFollow);
}
function pauseFollow(){if(_follow){_follow=false;const b=document.getElementById("spotRecenter");if(b)b.style.display="";}}
function recenter(){
  _follow=true;const b=document.getElementById("spotRecenter");if(b)b.style.display="none";
  if(_youMarker&&_spotMap)_spotMap.setView(_youMarker.getLatLng(),Math.max(_spotMap.getZoom(),16));
}
function stopTracking(){
  if(_geoWatch!=null){navigator.geolocation.clearWatch(_geoWatch);_geoWatch=null;}
  stopCompass();_follow=false;
  const rb=document.getElementById("spotRecenter");if(rb)rb.style.display="none";
  if(_spotMap)_spotMap.off("dragstart",pauseFollow);
  if(_youMarker){try{_spotMap.removeLayer(_youMarker);}catch(e){}_youMarker=null;}
  if(_accCircle){try{_spotMap.removeLayer(_accCircle);}catch(e){}_accCircle=null;}
  _heading=null;
}

/* ---- Compass heading (which way the phone is pointing) ---- */
function handleOrient(e){
  let h=null;
  if(typeof e.webkitCompassHeading==="number"&&!isNaN(e.webkitCompassHeading))h=e.webkitCompassHeading; // iOS: already clockwise from N
  else if(e.absolute&&typeof e.alpha==="number")h=360-e.alpha;                                          // standard: alpha is counter-clockwise
  if(h==null)return;
  // Compensate for device rotation so the beam stays true if the phone is held
  // in landscape (webkitCompassHeading is already screen-relative, so skip it).
  if(e.webkitCompassHeading==null){const a=(screen.orientation&&screen.orientation.angle)||window.orientation||0;h=h-a;}
  _heading=(h%360+360)%360;updateYouHeading();
}
function attachOrient(){
  _orientHandler=handleOrient;
  window.addEventListener("deviceorientationabsolute",_orientHandler,true);
  window.addEventListener("deviceorientation",_orientHandler,true);
}
function startCompass(){
  if(_orientHandler)return;
  const DOE=window.DeviceOrientationEvent;
  if(DOE&&typeof DOE.requestPermission==="function"){   // iOS 13+ gated on a gesture
    DOE.requestPermission().then(r=>{if(r==="granted")attachOrient();}).catch(()=>{});
  }else if(DOE){attachOrient();}
}
function stopCompass(){
  if(_orientHandler){
    window.removeEventListener("deviceorientationabsolute",_orientHandler,true);
    window.removeEventListener("deviceorientation",_orientHandler,true);
    _orientHandler=null;
  }
}

/* ---- Location search (coords first, then OSM Nominatim geocoding) ---- */
let _searchBusy=false,_lastSearchAt=0;
function clearSearchResults(){const ul=document.getElementById("spotResults");if(ul){ul.classList.remove("show");ul.innerHTML="";}}
function runSearch(q){
  q=(q||"").trim();if(!q)return;
  // A pasted coordinate / link jumps straight there — no network round-trip.
  const c=parseCoordsFrom(q);
  if(c){clearSearchResults();placeSearchResult(c.lat,c.lng,q);return;}
  if(_searchBusy)return;
  const now=Date.now();
  if(now-_lastSearchAt<1100){toast("One search per second, please");return;} // Nominatim usage policy
  _lastSearchAt=now;_searchBusy=true;
  const ul=document.getElementById("spotResults");
  if(ul){ul.classList.add("show");ul.innerHTML='<li class="tiny" style="cursor:default">Searching…</li>';}
  // email= identifies the app per OSM's Nominatim usage policy, so heavy use is
  // contacted rather than silently blocked. Browser fetch can't set User-Agent.
  const url="https://nominatim.openstreetmap.org/search?format=jsonv2&limit=6&addressdetails=0&email=casharrington06%40gmail.com&q="+encodeURIComponent(q);
  fetch(url,{headers:{Accept:"application/json"}}).then(r=>r.ok?r.json():Promise.reject(r.status)).then(list=>{
    _searchBusy=false;
    if(currentTab!=="map")return;
    showSearchResults(Array.isArray(list)?list:[]);
  }).catch(()=>{_searchBusy=false;if(ul){ul.innerHTML='<li class="tiny" style="cursor:default">Search unavailable (offline?). You can paste coordinates instead.</li>';}});
}
function showSearchResults(list){
  const ul=document.getElementById("spotResults");if(!ul)return;
  ul.innerHTML="";
  if(!list.length){ul.innerHTML='<li class="tiny" style="cursor:default">No matches. Try a nearby town, or paste coordinates.</li>';ul.classList.add("show");return;}
  list.forEach(r=>{
    const lat=parseFloat(r.lat),lng=parseFloat(r.lon);
    if(!isFinite(lat)||!isFinite(lng))return;
    const nm=r.display_name||"Result";
    const li=el(`<li><b>${esc(nm.split(",")[0])}</b><span class="tiny">${esc(nm)}</span></li>`);
    li.onclick=()=>{clearSearchResults();placeSearchResult(lat,lng,nm.split(",")[0]);};
    ul.appendChild(li);
  });
  ul.classList.add("show");
}
function placeSearchResult(lat,lng,label){
  if(!_spotMap)return;
  if(_searchMarker){try{_spotMap.removeLayer(_searchMarker);}catch(e){}_searchMarker=null;}
  _spotMap.setView([lat,lng],14);
  _searchMarker=L.marker([lat,lng],{icon:L.divIcon({className:"search-pin",html:"<div></div>",iconSize:[16,16],iconAnchor:[8,15]})}).addTo(_spotMap);
  _searchMarker.bindPopup(
    `<div class="spot-pop"><b>${esc(label||"Location")}</b>`+
    `<div class="tiny">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>`+
    `<div class="spot-pop-actions"><button class="btn sm" data-search-add="1">Add bird spot here</button></div></div>`
  ).openPopup();
}

/* ============================================================
   eBird — 🔭 Nearby: recent real-world sightings around the map centre.
   Uses the user's own free eBird API key (ebird.org/api/keygen), stored
   only in state.prefs.ebirdKey on this device; every fetch is a user tap.
   API responses are UNTRUSTED remote data — esc() at every HTML sink.
   ============================================================ */
const NEARBY_KM=30,NEARBY_DAYS=7;
let _sciIndex=null,_nearbyBusy=false;
function birdBySci(sci){
  if(!_sciIndex){_sciIndex={};Object.keys(BIRDS).forEach(id=>{_sciIndex[BIRDS[id].sci.toLowerCase()]=id;});}
  const id=_sciIndex[String(sci||"").trim().toLowerCase()];
  return id&&realBird(id)?id:null;
}
function ebirdKey(){return (state.prefs&&typeof state.prefs.ebirdKey==="string")?state.prefs.ebirdKey.trim():"";}
function kmBetween(la1,ln1,la2,ln2){
  const r=x=>x*Math.PI/180,R=6371;
  const h=Math.sin(r(la2-la1)/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(r(ln2-ln1)/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}
// eBird's obsDt is "2026-07-13 09:42" in the OBSERVER's local time, no offset;
// for sightings within 30 km, reading it as our local time is correct.
function nearbyWhen(dt){
  const m=/^(\d{4})-(\d{2})-(\d{2})(?:\s+(\d{2}:\d{2}))?/.exec(String(dt||""));
  if(!m)return "";
  const d=new Date(+m[1],+m[2]-1,+m[3]);
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.round((today-d)/86400000);
  if(diff<=0)return "Today"+(m[4]?" "+m[4]:"");
  if(diff===1)return "Yesterday";
  return d.toLocaleDateString(undefined,{month:"short",day:"numeric"});
}
function ebirdKeyDialog(then){
  const body=el(`<div>
    <p style="margin:0 0 10px">🔭 Nearby shows real recent sightings from <b>eBird</b>, reported by birders around wherever the map is centred.</p>
    <p style="margin:0 0 10px">It needs your own free eBird API key — a one-time setup:</p>
    <ol style="margin:0 0 12px;padding-left:20px;font-size:13px;line-height:1.6">
      <li>Sign in (or make a free account) at <a href="https://ebird.org/api/keygen" target="_blank" rel="noopener">ebird.org/api/keygen</a></li>
      <li>Copy the key it gives you</li>
      <li>Paste it below — it stays on this device only</li>
    </ol>
    <input type="text" id="ebKeyIn" placeholder="Paste your eBird API key" autocomplete="off" style="width:100%">
  </div>`);
  const foot=el(`<div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn ghost" id="ebKeyCancel">Cancel</button>
    <button class="btn" id="ebKeySave">Save &amp; search</button></div>`);
  openModal({title:"Connect eBird",body,foot,onMount:ov=>{

      closeModal();

}
function fetchNearby(){
  if(_nearbyBusy)return;
  const key=ebirdKey();
  if(!key){ebirdKeyDialog(fetchNearby);return;}
  if(!_spotMap){toast("Map still loading…");return;}
  const c=_spotMap.getCenter().wrap();
  // eBird accepts at most 2 decimal places — which also keeps a precise GPS
  // position out of the request URL (~1 km fuzz against a 30 km radius).
  const lat=c.lat.toFixed(2),lng=c.lng.toFixed(2);
  _nearbyBusy=true;
  const busy=on=>{const b=document.getElementById("spotNearby");if(b){b.disabled=on;b.textContent=on?"🔭 Searching…":"🔭 Nearby";}};
  busy(true);
  fetch(`https://api.ebird.org/v2/data/obs/geo/recent?lat=${lat}&lng=${lng}&dist=${NEARBY_KM}&back=${NEARBY_DAYS}&includeProvisional=true`,
    {headers:{"X-eBirdApiToken":key}})
    .then(r=>{if(r.status===401||r.status===403)throw "auth";if(!r.ok)throw r.status;return r.json();})
    .then(list=>{
      _nearbyBusy=false;busy(false);
      if(currentTab!=="map")return;
      showNearbyDialog(Array.isArray(list)?list:[],+lat,+lng);
    })
    .catch(e=>{
      _nearbyBusy=false;busy(false);
      if(e==="auth"){toast("eBird rejected that key");ebirdKeyDialog(fetchNearby);}
      else toast("Couldn't reach eBird — try again when you're online");
    });
}
function showNearbyDialog(list,lat,lng){
  const seen=seenBirdIds();
  const rows=list.filter(o=>o&&o.sciName&&isFinite(o.lat)&&isFinite(o.lng)).map(o=>{
    const id=birdBySci(o.sciName);
    return {id,name:String(o.comName||o.sciName),lat:o.lat,lng:o.lng,
      loc:String(o.locName||""),when:nearbyWhen(o.obsDt),n:+o.howMany||0,
      km:kmBetween(lat,lng,o.lat,o.lng),lifer:!!id&&!seen.has(id)};
  });
  rows.sort((a,b)=>(b.lifer-a.lifer)||(a.km-b.km));
  const lifers=rows.filter(r=>r.lifer).length;
  const body=el(`<div>
    <p class="tiny" style="margin:0 0 10px">${rows.length} species reported within ${NEARBY_KM} km of the map centre in the last ${NEARBY_DAYS} days${lifers?` — <b>⭐ ${lifers} would be ${lifers===1?"a lifer":"lifers"}</b>`:""}.</p>
    <div id="nearbyList" style="display:flex;flex-direction:column;gap:6px"></div>
  </div>`);
  const wrap=body.querySelector("#nearbyList");
  if(!rows.length)wrap.appendChild(el(`<p class="tiny" style="padding:10px;text-align:center">Nothing reported near here in the last ${NEARBY_DAYS} days. Pan the map somewhere birdier and try again.</p>`));
  rows.forEach(r=>{
    const b=r.id?BIRDS[r.id]:null;
    const row=el(`<div class="spot-row">
      <span class="spot-dot" style="background:${r.lifer?"#e9c969":spotCol(b)}"></span>
      <div class="spot-row-info">
        <div class="spot-row-name">${r.lifer?"⭐ ":""}${esc(r.name)}${b&&seen.has(r.id)?' <span class="tiny">✓ seen</span>':""}</div>
        <div class="spot-row-meta">${r.km.toFixed(1)} km · ${esc(r.when)}${r.n>1?` · ${r.n} birds`:""}${r.loc?` · ${esc(r.loc)}`:""}</div>
      </div>
      <div class="spot-row-actions">
        ${b?'<button class="btn sm ghost" data-a="bird">Bird</button>':""}
        <button class="btn sm" data-a="map">📍 Map</button>
      </div></div>`);
    if(b)row.querySelector('[data-a="bird"]').onclick=()=>{closeModal();openBirdDetail(r.id);};
    row.querySelector('[data-a="map"]').onclick=()=>{

function initSpotMap(mount){
  // Guard the double-init race: two views.map visits before leaflet.js loads
  // both resolve ensureLeaflet() on the same mount. The first inits the map;
  // without this the second would wipe its panes and L.map() would throw
  // "Map container is already initialized".
  if(mount._leaflet_id)return;
  mount.innerHTML="";
  const m=L.map(mount);
  _spotMap=m;
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{
    maxZoom:19,crossOrigin:"anonymous",
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors'
  }).addTo(m);
  (state.spots||[]).forEach(addSpotMarker);
  // A neutral default only until the first GPS fix recenters on the user (the
  // map is meant to open on "you are here"). Spots stay plotted as markers.
  m.setView([54,-115],3); // AK + lower 48
  // wrap() folds longitude back into ±180 — without it, panning across the
  // date line (Attu / the western Aleutians — prime Alaska rarity turf) yields
  // lng values like -187 that the coordinate gate would reject.
  m.on("click",e=>{const w=e.latlng.wrap();addSpotDialog(w.lat,w.lng);});
  // Popup action buttons live inside the map container: delegate their clicks.
  mount.addEventListener("click",e=>{
    const sh=e.target.closest("[data-spot-share]");
    if(sh){const s=state.spots.find(x=>x.id===sh.dataset.spotShare);if(s)shareTextOut(spotShareText(s));return;}
    const bd=e.target.closest("[data-spot-bird]");
    if(bd){if(BIRDS[bd.dataset.spotBird])openBirdDetail(bd.dataset.spotBird);return;}
    const dl=e.target.closest("[data-spot-del]");
    if(dl){deleteSpot(dl.dataset.spotDel);return;}
    const sa=e.target.closest("[data-search-add]");
    if(sa&&_searchMarker){const ll=_searchMarker.getLatLng();addSpotDialog(ll.lat,ll.lng,{q:_searchMarker._birdQ||""});return;}
  });
  setTimeout(()=>{try{m.invalidateSize();}catch(e){}},60);
  startTracking(true);   // live tracking is on by default; first fix centers the map on the user
  // Arriving from a trip card's 🗺️ button: frame that trip's pins and pause
  // follow (via pauseFollow so the Recenter button appears) so the incoming
  // GPS fix doesn't immediately yank the view away from them.
  if(_pendingMapFocus){
    const tm=(state.spots||[]).filter(s=>s.tripId===_pendingMapFocus).map(s=>_spotMarkers[s.id]).filter(Boolean);
    if(tm.length){
      m.fitBounds(L.featureGroup(tm).getBounds().pad(0.3),{maxZoom:14});
      pauseFollow();
    }
    _pendingMapFocus=null;
  }
}

/* Stop live tracking + compass and drop the search pin. Called from render()
   before any navigation, so sensors never run against a torn-down map. */
function _teardownSpotMap(){
  try{stopTracking();}catch(e){}
  if(_searchMarker&&_spotMap){try{_spotMap.removeLayer(_searchMarker);}catch(e){}}
  _searchMarker=null;
}
window._teardownSpotMap=_teardownSpotMap;

    if(!mount){_pendingMapFocus=null;return;}

      _pendingMapFocus=null;
      mount.innerHTML='<div class="spot-map-fallback">🗺️ The map couldn\'t load (offline?). Your saved spots are listed below and will appear on the map next time you\'re online.</div>';
      return;
    }

  });
