/* ============================================================
   VIEW: FRIENDS — local-only friend list, no server. You and a friend swap
   "friend codes" (a text blob: name + life-list slugs, base64 so messengers
   can't mangle it) over any channel — Messages, email, carrier pigeon — and
   the app compares life lists offline. Codes are snapshots: re-paste a
   friend's newer code to update them.
   ============================================================ */
const FRIEND_CODE_TAG="BFC1.";
function b64EncodeUtf8(s){return btoa(unescape(encodeURIComponent(s)));}
function b64DecodeUtf8(s){return decodeURIComponent(escape(atob(s)));}
function friendCodeText(){
  const list=lifeListIds();
  const name=(state.profileName||"A birder").trim().slice(0,40);
  const payload=b64EncodeUtf8(JSON.stringify({v:1,n:name,d:Date.now(),l:list}));
  return `🐦 Birdomania friend code — ${name} (${list.length} species)\n`+
         `Paste this whole message into Birdomania → Friends → Add a friend:\n`+
         FRIEND_CODE_TAG+payload;
}
/* Tolerant parser: finds the BFC1. tag anywhere in pasted text and reads the
   base64 that follows, ignoring whitespace/line breaks messengers insert.
   HARDENED against untrusted input: bounded sizes (a code is never big — the
   whole catalog is ~520 slugs), and trailing garbage (an appended signature
   like "Sent from my iPhone") is tolerated by trying successively shorter
   base64 prefixes until one yields a valid friend-code object. */
const FRIEND_MAX_TEXT=200000, FRIEND_MAX_B64=100000, FRIEND_MAX_LIST=2000;
function parseFriendCode(text){
  if(!text||text.length>FRIEND_MAX_TEXT)return null;
  const at=text.indexOf(FRIEND_CODE_TAG);
  if(at<0)return null;
  let b64="";
  for(let i=at+FRIEND_CODE_TAG.length;i<text.length&&b64.length<FRIEND_MAX_B64;i++){
    const c=text[i];
    if(c>='A'&&c<='Z'||c>='a'&&c<='z'||c>='0'&&c<='9'||c==='+'||c==='/'||c==='=')b64+=c;
    else if(c===' '||c==='\n'||c==='\r'||c==='\t')continue;   // messenger reflow
    else break;
  }
  const decodeOne=s=>{
    try{
      const o=JSON.parse(b64DecodeUtf8(s));
      if(!o||typeof o.n!=="string"||!Array.isArray(o.l)||o.l.length>FRIEND_MAX_LIST)return null;
      const list=[...new Set(o.l.filter(x=>typeof x==="string"&&/^[a-z0-9-]{1,60}$/.test(x)))];
      return {name:o.n.trim().slice(0,40)||"A birder",date:+o.d||Date.now(),list};
    }catch(e){return null;}
  };
  // valid base64 length is a multiple of 4; try the full string then peel
  // trailing (appended-signature) chars back to the nearest boundary.
  let len=b64.length-(b64.length%4);
  for(;len>=8;len-=4){
    const r=decodeOne(b64.slice(0,len));
    if(r)return r;
  }
  return null;
}
// Own-property check: a friend code is untrusted, and a slug like "constructor"
// passes the char filter yet resolves to Object.prototype.constructor via the
// chain — so a bracket lookup would inject a phantom bird. Always hasOwn-gate.
function realBird(id){return Object.prototype.hasOwnProperty.call(BIRDS,id);}
function friendCompare(f){
  const mine=new Set(lifeListIds());
  const theirs=new Set(f.list.filter(realBird));
  const both=[],onlyMe=[],onlyThem=[];
  mine.forEach(id=>{(theirs.has(id)?both:onlyMe).push(id);});
  theirs.forEach(id=>{if(!mine.has(id))onlyThem.push(id);});
  const byName=(a,b)=>BIRDS[a].name.localeCompare(BIRDS[b].name);
  return {both:both.sort(byName),onlyMe:onlyMe.sort(byName),onlyThem:onlyThem.sort(byName),
          unknown:f.list.filter(id=>!realBird(id)).length};
}
function compareFriendDialog(friendId){
  const f=state.friends.find(x=>x.id===friendId);if(!f)return;
  const c=friendCompare(f);
  function section(title,ids,hint){
    if(!ids.length)return `<div class="fld" style="margin:14px 0 4px">${title} (0)</div><p class="tiny">${hint}</p>`;
    return `<div class="fld" style="margin:14px 0 4px">${title} (${ids.length})</div>
      <div class="friend-cmp-list">${ids.map(id=>`<span class="chip friend-cmp-bird" data-bird="${esc(id)}">${esc(BIRDS[id].name)}</span>`).join("")}</div>`;
  }
  const body=el(`<div>
    ${section(`🎯 ${esc(f.name)} has, you don't`,c.onlyThem,"Nothing — your list covers theirs!")}
    ${section("🤝 You both have",c.both,"No overlap yet.")}
    ${section("💪 Only you have",c.onlyMe,"They've seen everything you have.")}
    ${c.unknown?`<p class="tiny" style="margin-top:10px">(${c.unknown} species in their code aren't in your catalog yet — update the app to see them.)</p>`:""}
  </div>`);
  body.querySelectorAll(".friend-cmp-bird").forEach(chip=>{
    chip.style.cursor="pointer";
    chip.onclick=()=>openBirdDetail(chip.dataset.bird);
  });
  openModal({title:`You vs ${f.name}`,body,wide:true,   // openModal esc()s titles
    foot:el(`<div><button class="btn" onclick="closeModal()">Done</button></div>`)});
}
function addFriendFromText(text,existingId){
  const parsed=parseFriendCode(text);
  if(!parsed){toast("That doesn't look like a Birdomania friend code");return false;}
  const pushNew=()=>{
    state.friends.push({id:uid(),name:parsed.name,list:parsed.list,addedAt:Date.now(),updatedAt:Date.now()});
    save();render();toast(`${parsed.name} added — tap Compare to see your lists side by side`);
  };
  const applyTo=f=>{f.name=parsed.name;f.list=parsed.list;f.updatedAt=Date.now();save();render();toast(`${f.name} updated`);};
  // Explicit update (the ↻ button) targets a specific friend by id.
  if(existingId){
    const f=state.friends.find(x=>x.id===existingId);
    if(f){applyTo(f);return true;}
  }
  // A same-name friend already exists: don't silently overwrite (two real
  // friends can share a display name) — let the user choose.
  const dup=state.friends.find(x=>x.name.toLowerCase()===parsed.name.toLowerCase());
  if(dup){
    const body=el(`<p class="tiny">You already have a friend named <b>${esc(dup.name)}</b>. Update their bird list with this code, or add as a separate friend?</p>`);
    const foot=el(`<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn ghost" id="fSep">Add separate</button><button class="btn" id="fUpdName">Update ${esc(dup.name)}</button></div>`);
    openModal({title:"Update or add?",body,foot,onMount:ov=>{
      ov.querySelector("#fUpdName").onclick=()=>{applyTo(dup);closeModal();};
      ov.querySelector("#fSep").onclick=()=>{pushNew();closeModal();};
    }});
    return true;
  }
  pushNew();
  return true;
}
function updateFriendDialog(friendId){
  const f=state.friends.find(x=>x.id===friendId);if(!f)return;
  const body=el(`<div><p class="tiny" style="margin:0 0 8px">Paste ${esc(f.name)}'s newer friend code:</p>
    <textarea id="fUpd" rows="5" style="width:100%"></textarea></div>`);
  openModal({title:`Update ${f.name}`,body,   // openModal esc()s titles
    foot:el(`<div><button class="btn" id="fUpdGo">Update</button></div>`),
    onMount:ov=>{ov.querySelector("#fUpdGo").onclick=()=>{if(addFriendFromText(ov.querySelector("#fUpd").value,friendId))closeModal();};}});
}

  root.appendChild(add);
  // --- friend rows ---
  root.appendChild(el(`<h3 style="margin:18px 0 6px">Your friends ${state.friends.length?`<span class="tiny">(${state.friends.length})</span>`:""}</h3>`));
  if(!state.friends.length){
    root.appendChild(el(`<p class="tiny" style="padding:14px;text-align:center">No friends yet. Share your code, and paste theirs above.</p>`));
    return;
  }
  const wrap=el(`<div class="friend-list"></div>`);
  state.friends.slice().sort((a,b)=>b.updatedAt-a.updatedAt).forEach(f=>{
    const c=friendCompare(f);
    const row=el(`<div class="friend-row">
      <div class="friend-info">
        <div class="friend-name">${esc(f.name)}</div>
        <div class="tiny">${f.list.length} species · 🎯 ${c.onlyThem.length} you need · 🤝 ${c.both.length} shared · updated ${fmtDate(f.updatedAt)}</div>
      </div>
      <div class="friend-actions">
        <button class="btn sm" data-a="cmp">Compare</button>
        <button class="btn ghost sm" data-a="upd" title="Paste a newer code">↻</button>
        <button class="btn ghost sm" data-a="del" title="Remove">✕</button>
      </div>
    </div>`);
    row.querySelector('[data-a="cmp"]').onclick=()=>compareFriendDialog(f.id);
    row.querySelector('[data-a="upd"]').onclick=()=>updateFriendDialog(f.id);
    row.querySelector('[data-a="del"]').onclick=()=>confirmDialog("Remove this friend?",`${f.name} and their list snapshot will be removed. You can re-add them with a new code anytime.`,()=>{
      state.friends=state.friends.filter(x=>x.id!==f.id);save();render();toast("Friend removed");
    },"Remove");
    wrap.appendChild(row);
  });
  root.appendChild(wrap);
};

  </div>`);
  openModal({title:"Settings",body,onMount:ov=>{
    ov.querySelector("#setDark").onchange=e=>{
      state.prefs.theme=e.target.checked?"dark":"light";
      save();applyTheme();
    };
    ov.querySelectorAll("#setNameMode button").forEach(btn=>{
      btn.onclick=()=>{
        state.prefs.nameMode=btn.dataset.mode;
        save();
        ov.querySelectorAll("#setNameMode button").forEach(b=>b.classList.toggle("active",b===btn));
        render();
      };
    });
    ov.querySelector("#setEbirdSave").onclick=()=>{
      const k=ov.querySelector("#setEbird").value.trim();
      state.prefs.ebirdKey=k;save();
      toast(k?"eBird key saved":"eBird key removed");
    };
    ov.querySelector("#setReset").onclick=confirmResetAll;
  }});
}
function confirmResetAll(){
  confirmDialog(
    "Reset all data?",
    "This permanently deletes every sighting, trip, list, photo, stat and preference. There is no way to recover it. Make sure you've exported a backup first if you want to keep anything.",
    resetAllData,
    "Reset everything"
  );
}
async function resetAllData(){
  // wipe IndexedDB-stored images, then localStorage, then in-memory state
  try{
    const db=await idb();
    await new Promise(res=>{const tx=db.transaction("imgs","readwrite");tx.objectStore("imgs").clear();tx.oncomplete=res;tx.onerror=res;});
  }catch(e){}
  for(const k of Object.keys(_objUrls)){try{URL.revokeObjectURL(_objUrls[k]);}catch(e){}delete _objUrls[k];}
  try{localStorage.removeItem(LS_KEY);}catch(e){}
  state=structuredClone(DEFAULT_STATE);
  save();
  closeModal();
  applyTheme();
  currentTab="home";
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab==="home"));
  render();
  toast("All data has been reset");
}
document.getElementById("btnSettings").onclick=openSettings;
function setupPWA(){
  // Inject a web-app manifest at runtime so the single file is installable ("Add to Home Screen").
  try{
    const icon="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%232f4a3c'/%3E%3Cpath d='M18 40c6-2 9-6 13-12 2-3 5-6 9-6 3 0 5 2 5 5 0 5-4 9-9 11-4 1.6-8 2-12 2l-3 2 1-4z' fill='%23e9c969'/%3E%3C/svg%3E";
    const manifest={name:"Birdmania",short_name:"Birdmania",start_url:".",display:"standalone",background_color:"#f4ecd8",theme_color:"#2f4a3c",icons:[{src:icon,sizes:"any",type:"image/svg+xml"}]};
    const url=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/json"}));
    const link=document.createElement("link");link.rel="manifest";link.href=url;document.head.appendChild(link);
  }catch(e){}
}

// self-heal: drop stale failed wiki-cache entries for birds that now have a `wiki` title override
Object.keys(BIRDS).forEach(id=>{
  if(BIRDS[id].wiki&&state.wikiCache[id]&&!state.wikiCache[id].ok)delete state.wikiCache[id];
});
save();
// Milestones: silently reconcile at EVERY boot so the badge set always matches
// the current life list — existing users, restores, and imports all get their
// earned badges recorded without a retroactive confetti storm. Only milestones
// crossed live during a session celebrate.
if(!state.milestones)state.milestones={};
checkMilestones(true);
applyTheme();
setupPWA();
// keep sticky search bars anchored just beneath the sticky header (whose height
// changes as the nav tabs wrap at different viewport widths)
function syncHeaderHeight(){
  const h=document.querySelector("header.app");
  if(h)document.documentElement.style.setProperty("--header-h",h.offsetHeight+"px");
}
syncHeaderHeight();
window.addEventListener("resize",syncHeaderHeight);
// "back to top" button — appears once you've scrolled deep into a list
(function(){
  const btn=document.getElementById("toTop");
  if(!btn)return;
  const SHOW_AT=600; // px scrolled before it appears
  function update(){btn.classList.toggle("show",(window.scrollY||document.documentElement.scrollTop)>SHOW_AT);}
  window.addEventListener("scroll",update,{passive:true});
  btn.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));
  update();
})();
render();
// warm a few images for the default region so the first view looks alive
state.loadedRegions.slice(0,1).forEach(c=>regionBirds(c).slice(0,8).forEach(id=>fetchWiki(id)));
</script>
