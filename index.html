"thick-billed-murre":{name:"Thick-billed Murre",sci:"Uria lomvia",fam:"Auks",r:"Common",sz:"18 in",sea:["Summer"],reg:["AK","PA"],col:"#1a1a1a",feat:"Like Common Murre but blacker above with a shorter, thicker bill marked by a thin white gape-line. Shares the same towering sea-cliff colonies.",voice:"A low, hoarse croaking at the colony."},
"crested-auklet":{name:"Crested Auklet",sci:"Aethia cristatella",fam:"Auks",r:"Uncommon",sz:"10 in",sea:["Summer"],reg:["AK"],col:"#2a2a2a",feat:"A sooty-gray little auk with a forward-curling crest of black plumes and a stubby orange bill; smells faintly of tangerines. Gathers in huge, swirling flocks.",voice:"Honking, barking and grunting choruses at the colony."},
"least-auklet":{name:"Least Auklet",sci:"Aethia pusilla",fam:"Auks",r:"Common",sz:"6 in",sea:["Summer"],reg:["AK"],col:"#3a3a3a",feat:"The smallest auk, sparrow-sized, dark above and variably mottled below with a tiny red-tipped bill; nests in scree slopes in enormous numbers.",voice:"A high, chattering twitter at the colony."},
"parakeet-auklet":{name:"Parakeet Auklet",sci:"Aethia psittacula",fam:"Auks",r:"Uncommon",sz:"10 in",sea:["Summer"],reg:["AK"],col:"#2a2a2a",feat:"A round-headed auk, dark above and white below, with a stubby, upturned orange bill and a thin white plume behind the eye.",voice:"A rising, quavering, whinnying call."},
"horned-puffin":{name:"Horned Puffin",sci:"Fratercula corniculata",fam:"Auks",r:"Uncommon",sz:"15 in",sea:["Summer"],reg:["AK"],col:"#1a1a1a",feat:"A stocky black-and-white seabird with a white face and a huge triangular yellow-and-red bill; a small fleshy 'horn' rises above each eye in breeding season.",voice:"Low growls and moans at the nesting colony."},
"snowy-owl":{name:"Snowy Owl",sci:"Bubo scandiacus",fam:"Owls",r:"Rare",sz:"23 in",sea:["Winter","Year-round"],reg:["AK","PA"],col:"#f0ece0",feat:"A massive, round-headed white owl, the males nearly pure white and females flecked with dark bars; hunts by day over open tundra and shorelines.",voice:"A deep, booming hoot and harsh barks near the nest."},
"gyrfalcon":{name:"Gyrfalcon",sci:"Falco rusticolus",fam:"Falcons",r:"Rare",sz:"22 in",sea:["Year-round"],reg:["AK","PA"],col:"#8a8a8a",feat:"The largest falcon, broad-winged and heavy-chested, ranging from near-white to dark gray; a powerful predator of ptarmigan over the arctic.",voice:"A harsh, chattering 'kak-kak-kak' near the eyrie."},
"bluethroat":{name:"Bluethroat",sci:"Luscinia svecica",fam:"Old World Flycatchers",r:"Rare",sz:"5.5 in",sea:["Summer"],reg:["AK"],col:"#2a5ca5",feat:"A skulking, robin-shaped songbird; the breeding male flashes a brilliant blue throat with a chestnut central spot, bordered below by black and rust. An Old World species that breeds in western Alaska.",voice:"A rich, varied, far-carrying song delivered in song-flight, often with mimicry."},
"northern-wheatear":{name:"Northern Wheatear",sci:"Oenanthe oenanthe",fam:"Wheatears",r:"Rare",sz:"6 in",sea:["Summer"],reg:["AK","PA"],col:"#c2a878",feat:"A perky, upright songbird of open stony ground; flashes a white rump and an inverted black 'T' on the tail. Breeders cross from Alaska to winter in Africa.",voice:"A hard, pebbly 'chack' and a scratchy, warbling song."},
"arctic-warbler":{name:"Arctic Warbler",sci:"Phylloscopus borealis",fam:"Leaf Warblers",r:"Rare",sz:"5 in",sea:["Summer"],reg:["AK"],col:"#8a9a6a",feat:"A plain greenish leaf-warbler with a long pale eyebrow and a single faint wing bar; an Old World species that breeds in Alaskan willow and birch scrub.",voice:"A fast, dry, buzzy trill on one pitch, preceded by a sharp 'dzik'."},
"eastern-yellow-wagtail":{name:"Eastern Yellow Wagtail",sci:"Motacilla tschutschensis",fam:"Wagtails & Pipits",r:"Uncommon",sz:"6.5 in",sea:["Summer"],reg:["AK"],col:"#e0c83a",feat:"A slim, long-tailed bird of wet tundra that bobs its tail constantly; olive above and bright yellow below, with a pale eyebrow. Breeds across western Alaska.",voice:"A buzzy, ringing 'tsweep' given in bounding flight."},
"white-wagtail":{name:"White Wagtail",sci:"Motacilla alba",fam:"Wagtails & Pipits",r:"Rare",sz:"7 in",sea:["Summer"],reg:["AK"],col:"#d8d8d8",feat:"A crisp gray, black and white bird with a long, constantly wagging tail; a scarce Old World species that nests locally on Bering Sea coasts.",voice:"A sharp, disyllabic 'chizzick' in flight."},
"red-throated-pipit":{name:"Red-throated Pipit",sci:"Anthus cervinus",fam:"Wagtails & Pipits",r:"Rare",sz:"6 in",sea:["Summer"],reg:["AK"],col:"#b06a4a",feat:"A heavily streaked pipit with a boldly striped back; breeding birds show a rich pinkish-red face and throat. An Old World species breeding in western Alaska.",voice:"A high, drawn-out, explosive 'pssseee'."},
"lapland-longspur":{name:"Lapland Longspur",sci:"Calcarius lapponicus",fam:"Longspurs & Snow Buntings",r:"Common",sz:"6 in",sea:["Summer"],reg:["AK","PA"],col:"#9a6a3a",feat:"The most abundant songbird of the tundra; breeding males have a black face and bib, a chestnut nape and a yellow bill. Sings in fluttering song-flights.",voice:"A musical, jingling, tumbling song; a dry rattle and 'tew' in flight."},
"hoary-redpoll":{name:"Hoary Redpoll",sci:"Acanthis hornemanni",fam:"Finches",r:"Uncommon",sz:"5.5 in",sea:["Winter","Year-round"],reg:["AK"],col:"#e0d8c8",feat:"A frosty, very pale redpoll with a tiny bill, an unstreaked white rump and only a small red forecrown; haunts the high arctic with Common Redpolls.",voice:"A buzzy 'dzee' and dry, rattling 'chit-chit-chit'."},
"gray-crowned-rosy-finch":{name:"Gray-crowned Rosy-Finch",sci:"Leucosticte tephrocotis",fam:"Finches",r:"Uncommon",sz:"6 in",sea:["Year-round"],reg:["AK","PA"],col:"#8a5a4a",feat:"A hardy finch of bleak, high, rocky country; rich brown with a gray crown-patch and a rosy wash on the wings, belly and rump.",voice:"A husky, descending 'cheew' and buzzy chatter."},
"mckays-bunting":{name:"McKay's Bunting",sci:"Plectrophenax hyperboreus",fam:"Longspurs & Snow Buntings",r:"Rare",sz:"7 in",sea:["Winter"],reg:["AK"],col:"#f0ece0",feat:"A nearly all-white bunting with only limited black in the wings and tail; breeds almost solely on remote Bering Sea islands and winters on western Alaskan coasts.",voice:"A sweet, warbling song much like a Snow Bunting's."},
"snow-goose":{name:"Snow Goose",sci:"Anser caerulescens",fam:"Ducks & Geese",r:"Common",sz:"28 in",sea:["Spring","Fall"],reg:["AK","WA","NY","PA","CA","TX","MA"],col:"#f0ece0",feat:"A medium goose, usually snow-white with black wingtips and a pink bill marked by a dark 'grin patch'; a darker blue morph also occurs. Migrates in huge, clamorous flocks.",voice:"A high, nasal, barking 'whouk' given constantly in flight."},
"cackling-goose":{name:"Cackling Goose",sci:"Branta hutchinsii",fam:"Ducks & Geese",r:"Common",sz:"25 in",sea:["Spring","Summer","Fall"],reg:["AK","WA","CA","TX","MA","PA"],col:"#4a4a42",feat:"Like a small, compact Canada Goose with a stubby bill and short neck; black head and neck with a white chinstrap. Breeds across the western Alaskan tundra.",voice:"A high-pitched, yelping 'luk-luk' — squeakier than a Canada Goose's honk."},
"gadwall":{name:"Gadwall",sci:"Mareca strepera",fam:"Ducks & Geese",r:"Uncommon",sz:"20 in",sea:["Spring","Summer","Fall"],reg:["AK","WA","CA","TX","NY","PA","MA"],col:"#6b6258",feat:"A subtly handsome dabbler; the male is finely vermiculated gray with a black rear end, the female mottled brown. Both show a small white wing patch in flight.",voice:"The male a low, croaking 'rrrep'; the female a Mallard-like quack."},
"eurasian-wigeon":{name:"Eurasian Wigeon",sci:"Mareca penelope",fam:"Ducks & Geese",r:"Rare",sz:"20 in",sea:["Spring","Fall"],reg:["AK","CA","WA","MA","PA"],col:"#9c5a33",feat:"A regular Asian visitor to Alaska; the male has a rufous head with a creamy-yellow forehead and a gray body. Often found among flocks of American Wigeon.",voice:"The male a distinctive, whistled, two-note 'wheee-oo'."},
"canvasback":{name:"Canvasback",sci:"Aythya valisineria",fam:"Ducks & Geese",r:"Uncommon",sz:"21 in",sea:["Spring","Fall"],reg:["AK","WA","CA","TX","NY","PA","MA"],col:"#8a3a2a",feat:"A large diving duck with a sloping forehead and long black bill; the male has a chestnut head, black breast and pale, canvas-white back.",voice:"Mostly silent; courting males give a soft cooing, females a low growl."},
"greater-scaup":{name:"Greater Scaup",sci:"Aythya marila",fam:"Ducks & Geese",r:"Common",sz:"18 in",sea:["Spring","Fall","Winter"],reg:["AK","WA","NY","PA","CA","MA"],col:"#3a3a40",feat:"A rounded diving duck; the male has a dark green-glossed head, black breast, white sides and a pale gray back. Favours large coastal waters.",voice:"Mostly silent; soft, fast 'scaup-scaup' notes in display."},
"lesser-scaup":{name:"Lesser Scaup",sci:"Aythya affinis",fam:"Ducks & Geese",r:"Common",sz:"17 in",sea:["Spring","Fall","Winter"],reg:["AK","WA","CA","TX","NY","PA","MA"],col:"#3a3a40",feat:"Very like Greater Scaup but slightly smaller, with a peaked rather than rounded crown and a purple gloss to the head. Abundant on inland lakes and ponds.",voice:"Generally silent away from the breeding grounds."},
"stellers-eider":{name:"Steller's Eider",sci:"Polysticta stelleri",fam:"Ducks & Geese",r:"Rare",sz:"18 in",sea:["Spring","Summer","Winter"],reg:["AK"],col:"#b89a4a",feat:"The smallest eider; the breeding male has a white head with a green tuft, a black eye-ring and warm cinnamon-buff underparts. A threatened Beringian specialty.",voice:"Mostly silent; soft crooning and growls in display."},
"spectacled-eider":{name:"Spectacled Eider",sci:"Somateria fischeri",fam:"Ducks & Geese",r:"Rare",sz:"21 in",sea:["Spring","Summer"],reg:["AK"],col:"#6b8a5a",feat:"A scarce, sought-after sea duck; the male has a pale green head with bold white 'spectacles' around the eyes. Breeds on wet coastal tundra.",voice:"Largely silent; weak crooning notes in courtship."},
"black-scoter":{name:"Black Scoter",sci:"Melanitta americana",fam:"Ducks & Geese",r:"Uncommon",sz:"19 in",sea:["Spring","Fall","Winter"],reg:["AK","WA","MA","NY","PA","CA"],col:"#1c1c1c",feat:"A chunky sea duck; the male is entirely glossy black with a swollen orange-yellow knob at the base of the bill. Rides the surf in bobbing flocks.",voice:"A far-carrying, mournful, whistled 'cooo-ee' — unusually musical for a duck."},
"arctic-loon":{name:"Arctic Loon",sci:"Gavia arctica",fam:"Loons",r:"Rare",sz:"28 in",sea:["Spring","Summer"],reg:["AK"],col:"#4a4a52",feat:"A scarce loon of western Alaska; breeding birds have a pale gray nape, black throat and a white flank patch that shows above the waterline. Very like Pacific Loon.",voice:"A wailing, yodeling call and harsh croaks on the breeding lakes."},
"black-bellied-plover":{name:"Black-bellied Plover",sci:"Pluvialis squatarola",fam:"Plovers",r:"Uncommon",sz:"11 in",sea:["Spring","Fall"],reg:["AK","WA","MA","NY","PA","CA","TX","FL"],col:"#6b6b6b",feat:"The largest plover; breeding birds are spangled silver above with a jet-black face and belly. Shows black 'wingpits' (axillaries) in flight.",voice:"A plaintive, far-carrying, three-note whistle: 'pee-oo-wee'."},
"american-golden-plover":{name:"American Golden-Plover",sci:"Pluvialis dominica",fam:"Plovers",r:"Uncommon",sz:"10 in",sea:["Spring","Fall"],reg:["AK","NY","PA","MA"],col:"#b8a04a",feat:"A slim, elegant plover spangled gold and black above, with a black face and belly bordered by a bold white stripe. A long-distance migrant nesting on dry tundra.",voice:"A plaintive, whistled 'queedle' or 'klu-ee'."},
"lesser-sand-plover":{name:"Lesser Sand-Plover",sci:"Charadrius mongolus",fam:"Plovers",r:"Rare",sz:"7 in",sea:["Spring","Summer"],reg:["AK"],col:"#b5683a",feat:"A compact Asian plover that breeds sparingly in western Alaska; breeding males show a rich rusty-orange breast band and a black mask.",voice:"A short, hard 'chitik' or trilled 'drrt'."},
"eurasian-dotterel":{name:"Eurasian Dotterel",sci:"Eudromias morinellus",fam:"Plovers",r:"Rare",sz:"8 in",sea:["Summer"],reg:["AK"],col:"#9c7a4a",feat:"A tame, rare plover of high, dry tundra; breeding birds have a bold white eyebrow, a gray breast and a rusty belly bordered above by a narrow white band.",voice:"A soft, trilling 'pjur-pjur' and a mellow 'kt-kt'."},
"solitary-sandpiper":{name:"Solitary Sandpiper",sci:"Tringa solitaria",fam:"Sandpipers",r:"Uncommon",sz:"9 in",sea:["Spring","Summer","Fall"],reg:["AK","WA","MA","NY","PA","TX"],col:"#5a5247",feat:"A dark, slender sandpiper with a bold white eye-ring and dark, olive-spotted upperparts; bobs as it forages alone along wooded pond edges.",voice:"A high, sharp, rising 'peet-weet' — higher than a Spotted Sandpiper's."},
"gray-tailed-tattler":{name:"Gray-tailed Tattler",sci:"Tringa brevipes",fam:"Sandpipers",r:"Rare",sz:"10 in",sea:["Spring","Summer"],reg:["AK"],col:"#8f8f8f",feat:"An Asian tattler that strays to western Alaska; plain smoky-gray above with barred underparts in breeding plumage. Very like Wandering Tattler but paler.",voice:"A clear, rising, two-note whistle 'tu-weet'."},
"bristle-thighed-curlew":{name:"Bristle-thighed Curlew",sci:"Numenius tahitiensis",fam:"Sandpipers",r:"Rare",sz:"17 in",sea:["Spring","Summer"],reg:["AK"],col:"#b59a6a",feat:"A rare curlew with a long decurved bill, buffy-cinnamon rump and stiff thigh bristles; nests only in two small areas of western Alaska before a remarkable Pacific migration.",voice:"A loud, whistled 'chiu-it', recalling a human wolf-whistle."},
"ruddy-turnstone":{name:"Ruddy Turnstone",sci:"Arenaria interpres",fam:"Sandpipers",r:"Uncommon",sz:"9 in",sea:["Spring","Fall"],reg:["AK","WA","MA","NY","PA","CA","FL"],col:"#a83a2a",feat:"A stocky shorebird with a bold harlequin pattern of rusty, black and white, short orange legs and a slightly upturned bill used to flip stones and weed.",voice:"A low, staccato, rattling 'tuk-a-tuk' chatter."},
"surfbird":{name:"Surfbird",sci:"Calidris virgata",fam:"Sandpipers",r:"Uncommon",sz:"10 in",sea:["Spring","Summer"],reg:["AK","WA","CA","PA"],col:"#6b6b6b",feat:"A chunky, gray rock-loving shorebird with yellow-green legs and a stout dark bill with a yellow base; breeds on Alaskan mountain tundra, winters on rocky surf-pounded shores.",voice:"A shrill, whistled 'kee-wee' and soft chatter."},
"red-knot":{name:"Red Knot",sci:"Calidris canutus",fam:"Sandpipers",r:"Uncommon",sz:"10 in",sea:["Spring","Fall"],reg:["AK","MA","NY","PA","TX","FL"],col:"#b5683a",feat:"A medium, dumpy sandpiper; in breeding dress the face and underparts glow brick-red, the back scaled gray and rufous. A famed long-distance migrant.",voice:"A soft, low 'knut' and a mellow 'kikkik' in flight."},
"semipalmated-sandpiper":{name:"Semipalmated Sandpiper",sci:"Calidris pusilla",fam:"Sandpipers",r:"Common",sz:"6 in",sea:["Spring","Summer","Fall"],reg:["AK","MA","NY","PA","TX"],col:"#8a8278",feat:"A small, gray-brown 'peep' with a short, straight, blunt-tipped black bill and black legs; partially webbed toes give it its name. Gathers in large flocks.",voice:"A short, husky 'cherk' or 'chrup'."},
"red-necked-stint":{name:"Red-necked Stint",sci:"Calidris ruficollis",fam:"Sandpipers",r:"Rare",sz:"6 in",sea:["Spring","Summer"],reg:["AK"],col:"#b5683a",feat:"A tiny Asian peep that breeds sparingly in western Alaska; breeding birds show a brick-red face and throat. Easily overlooked among other small sandpipers.",voice:"A short, coarse 'chit' or 'kreep'."},
"bairds-sandpiper":{name:"Baird's Sandpiper",sci:"Calidris bairdii",fam:"Sandpipers",r:"Uncommon",sz:"7 in",sea:["Spring","Summer","Fall"],reg:["AK","WA","TX","NY","PA","MA"],col:"#b59a6a",feat:"A medium peep with a long-winged, attenuated look (wings extend past the tail), buffy scaly upperparts and a fine black bill. Favours drier ground than other peeps.",voice:"A low, raspy, rolling 'kreeep'."},
"pectoral-sandpiper":{name:"Pectoral Sandpiper",sci:"Calidris melanotos",fam:"Sandpipers",r:"Common",sz:"9 in",sea:["Spring","Summer","Fall"],reg:["AK","NY","PA","TX","MA"],col:"#8a6d4f",feat:"A medium sandpiper with dense breast streaking that ends sharply against a white belly, like a bib; legs yellowish. Displaying males inflate a fat throat sac.",voice:"A low, rich, reedy 'churk churk'."},
"long-billed-dowitcher":{name:"Long-billed Dowitcher",sci:"Limnodromus scolopaceus",fam:"Sandpipers",r:"Common",sz:"11 in",sea:["Spring","Summer","Fall"],reg:["AK","WA","CA","TX","MA","PA"],col:"#9c7a4a",feat:"A snipe-like shorebird with a very long straight bill, feeding with a sewing-machine motion; breeding birds are rich rufous below with barred flanks.",voice:"A high, sharp, single 'keek', often run into a series."},
"slaty-backed-gull":{name:"Slaty-backed Gull",sci:"Larus schistisagus",fam:"Gulls & Terns",r:"Rare",sz:"25 in",sea:["Spring","Summer","Winter"],reg:["AK","PA"],col:"#4a4a52",feat:"A large Asian gull, regular in western Alaska; adults have a very dark slate-gray back, broad white trailing edge to the wing and bright pink legs.",voice:"A deep, raucous laughing call, lower than a Herring Gull's."},
"pomarine-jaeger":{name:"Pomarine Jaeger",sci:"Stercorarius pomarinus",fam:"Skuas & Jaegers",r:"Uncommon",sz:"21 in",sea:["Spring","Fall"],reg:["AK","MA","PA"],col:"#4a4036",feat:"A heavy, barrel-chested jaeger; breeding adults show twisted, spoon-shaped central tail feathers. A piratical predator that harries gulls and terns for food.",voice:"Sharp 'which-yew' notes and harsh squeals near colonies."},
"long-tailed-jaeger":{name:"Long-tailed Jaeger",sci:"Stercorarius longicaudus",fam:"Skuas & Jaegers",r:"Uncommon",sz:"21 in",sea:["Spring","Summer"],reg:["AK","PA"],col:"#6b6258",feat:"The smallest, most graceful jaeger, tern-like in flight with extremely long, streaming central tail feathers; a clean gray back and crisp black cap. Hunts lemmings on the tundra.",voice:"A sharp 'kreee' and rattling calls on the breeding grounds."},
"black-guillemot":{name:"Black Guillemot",sci:"Cepphus grylle",fam:"Auks",r:"Uncommon",sz:"13 in",sea:["Spring","Summer"],reg:["AK","MA","NY","PA"],col:"#1c1c1c",feat:"A small alcid, sooty-black in summer with bold white wing patches and bright coral-red legs and mouth-lining. Stays near rocky inshore waters.",voice:"A thin, high, wheezy whistle and twittering."},
"kittlitz-murrelet":{name:"Kittlitz's Murrelet",sci:"Brachyramphus brevirostris",fam:"Auks",r:"Rare",sz:"9 in",sea:["Spring","Summer"],reg:["AK"],col:"#8a826a",feat:"A small, rare murrelet of glacier-fed waters; breeding birds are intricately mottled sandy-gold and brown for camouflage on bare mountain scree where they nest.",voice:"A low, groaning call; generally silent at sea."},
"western-wood-pewee":{name:"Western Wood-Pewee",sci:"Contopus sordidulus",fam:"Tyrant Flycatchers",r:"Uncommon",sz:"6 in",sea:["Summer"],reg:["AK","WA","CA","TX"],col:"#6b6258",feat:"A drab gray-brown flycatcher with faint wing bars and a slight crest; sits upright on exposed perches and sallies out after passing insects.",voice:"A burry, descending, nasal 'pee-eer'."},
"horned-lark":{name:"Horned Lark",sci:"Eremophila alpestris",fam:"Larks",r:"Uncommon",sz:"7 in",sea:["Spring","Summer","Fall"],reg:["AK","WA","CA","TX","NY","PA","MA"],col:"#b59a6a",feat:"A ground-dwelling lark of open tundra and barrens; sandy brown above with a black chest band, yellow-and-black face and tiny black 'horn' feather tufts.",voice:"A high, tinkling, glassy series of notes, often given in flight."},
"american-pipit":{name:"American Pipit",sci:"Anthus rubescens",fam:"Wagtails & Pipits",r:"Uncommon",sz:"6 in",sea:["Spring","Summer","Fall"],reg:["AK","WA","CA","NY","PA","MA"],col:"#8a7257",feat:"A slim, drab, ground-walking songbird that pumps its tail; grayish-brown with streaked underparts and white outer tail feathers. Nests on alpine and arctic tundra.",voice:"A sharp, repeated 'pi-pit' given in flight."},
"rusty-blackbird":{name:"Rusty Blackbird",sci:"Euphagus carolinus",fam:"Blackbirds & Orioles",r:"Uncommon",sz:"9 in",sea:["Spring","Fall"],reg:["AK","MA","NY","PA"],col:"#4a4036",feat:"A medium blackbird with a pale yellow eye; fall birds are heavily edged rusty-brown, breeding males glossy black. Haunts wet woods and bogs; a steeply declining species.",voice:"A creaky, rising 'koonk-a-lee', like a squeaky hinge."},
"short-tailed-shearwater":{name:"Short-tailed Shearwater",sci:"Ardenna tenuirostris",fam:"Shearwaters & Petrels",r:"Common",sz:"17 in",sea:["Summer","Fall"],reg:["AK"],col:"#4a4036",feat:"A dark, dusky-brown shearwater that streams past in vast numbers on stiff wings; very like Sooty Shearwater but with a shorter bill and rounded head. The classic Bering Sea seawatch bird.",voice:"Silent at sea; mewing and crooning notes at breeding colonies."},
"red-faced-cormorant":{name:"Red-faced Cormorant",sci:"Urile urile",fam:"Cormorants",r:"Uncommon",sz:"30 in",sea:["Year-round","Summer"],reg:["AK"],col:"#2a2a30",feat:"A glossy black sea-cormorant of the Bering Sea; breeding adults show bare bright-red facial skin and a pale bill. Nests on sheer sea cliffs and bird-rock ledges.",voice:"Low growls and groans at the colony; otherwise silent."},
"red-legged-kittiwake":{name:"Red-legged Kittiwake",sci:"Rissa brevirostris",fam:"Gulls & Terns",r:"Rare",sz:"15 in",sea:["Summer"],reg:["AK"],col:"#e8e4d8",feat:"A dainty Bering Sea kittiwake with a short bill, darker gray back than Black-legged and bright coral-red legs. Breeds at only a handful of island colonies.",voice:"A higher, more nasal call than the Black-legged Kittiwake's."},
"ancient-murrelet":{name:"Ancient Murrelet",sci:"Synthliboramphus antiquus",fam:"Auks",r:"Uncommon",sz:"10 in",sea:["Spring","Summer"],reg:["AK","PA"],col:"#4a4a52",feat:"A small, neat alcid with a black cap and throat, gray back and a short pale bill; breeding birds show fine white 'ancient' plumes over the head. Often in tight rafts offshore.",voice:"A high, chirping whistle, mostly given at night near colonies."},
"rosss-gull":{name:"Ross's Gull",sci:"Rhodostethia rosea",fam:"Gulls & Terns",r:"Rare",sz:"13 in",sea:["Spring","Fall"],reg:["AK","PA"],col:"#f0d8d8",feat:"A small, exquisite High Arctic gull with a wedge-shaped tail, a thin black neck-ring in breeding plumage and a rosy-pink flush to the underparts. A coveted sighting.",voice:"A soft, melodious 'a-wo' and tern-like notes."},
"ivory-gull":{name:"Ivory Gull",sci:"Pagophila eburnea",fam:"Gulls & Terns",r:"Rare",sz:"17 in",sea:["Fall","Winter"],reg:["AK"],col:"#f4f1e8",feat:"A pure-white gull of the pack ice with black legs, a blue-gray bill tipped yellow and dark eyes; pigeon-like as it walks. A rare visitor from the high Arctic.",voice:"A harsh, tern-like 'keeer'."},
"common-ringed-plover":{name:"Common Ringed Plover",sci:"Charadrius hiaticula",fam:"Plovers",r:"Rare",sz:"7 in",sea:["Spring","Summer"],reg:["AK"],col:"#9c7a4a",feat:"A small brown-backed plover with a complete black breast band and orange legs; an Old World species that breeds sparingly in westernmost Alaska. Very like Semipalmated Plover.",voice:"A soft, fluting, rising 'too-li'."},
"sharp-tailed-sandpiper":{name:"Sharp-tailed Sandpiper",sci:"Calidris acuminata",fam:"Sandpipers",r:"Uncommon",sz:"8 in",sea:["Fall"],reg:["AK"],col:"#b5683a",feat:"A Pectoral-like Asian sandpiper; juveniles, the usual fall visitors, are bright with a rich rufous cap, bold white eyebrow and warm buff breast lacking sharp streaking.",voice:"A soft, twittering 'wheep-wheep'."},
"long-toed-stint":{name:"Long-toed Stint",sci:"Calidris subminuta",fam:"Sandpipers",r:"Rare",sz:"6 in",sea:["Spring","Summer"],reg:["AK"],col:"#9c7a4a",feat:"A tiny, dark, long-necked Asian stint with pale-yellow legs and conspicuously long toes; stands tall and upright, recalling a miniature Least Sandpiper.",voice:"A soft, trilled 'prrt' or 'chrup'."},
"temmincks-stint":{name:"Temminck's Stint",sci:"Calidris temminckii",fam:"Sandpipers",r:"Rare",sz:"6 in",sea:["Spring","Summer"],reg:["AK"],col:"#8a8278",feat:"A small, plain, gray-brown stint with pale legs and white outer tail feathers; crouches low and towers up in a distinctive high, fluttering flight when flushed.",voice:"A dry, rattling, cricket-like trill."},
"ruff":{name:"Ruff",sci:"Calidris pugnax",fam:"Sandpipers",r:"Rare",sz:"11 in",sea:["Spring","Fall"],reg:["AK","PA"],col:"#b59a6a",feat:"A medium shorebird with a small head, scaly buff upperparts and a pot-bellied look; breeding males grow extravagant ruffs and ear-tufts. Females ('reeves') are much smaller.",voice:"Generally silent away from the breeding grounds.",wiki:"Ruff (bird)"},
"wood-sandpiper":{name:"Wood Sandpiper",sci:"Tringa glareola",fam:"Sandpipers",r:"Rare",sz:"8 in",sea:["Spring","Summer"],reg:["AK"],col:"#6b6258",feat:"A slim, elegant Tringa, brown above and finely spangled white, with a bold pale eyebrow and yellowish legs; an Old World species that breeds rarely in western Alaska.",voice:"A sharp, excited 'chiff-iff-iff' in flight."},
"common-greenshank":{name:"Common Greenshank",sci:"Tringa nebularia",fam:"Sandpipers",r:"Rare",sz:"13 in",sea:["Spring","Fall"],reg:["AK"],col:"#8f8f8f",feat:"A tall, pale gray Asian shank with long greenish legs and a slightly upturned bill; a white wedge runs up the back in flight. A scarce Bering Strait migrant.",voice:"A ringing, far-carrying, three-note 'tew-tew-tew'."},
"terek-sandpiper":{name:"Terek Sandpiper",sci:"Xenus cinereus",fam:"Sandpipers",r:"Rare",sz:"9 in",sea:["Spring","Summer"],reg:["AK"],col:"#8a8278",feat:"A distinctive shorebird with a long, upturned bill and short orange-yellow legs; runs about actively, bobbing, and shows a white trailing edge to the wing in flight.",voice:"A rippling, fluty 'du-du-du-du'."},
"common-sandpiper":{name:"Common Sandpiper",sci:"Actitis hypoleucos",fam:"Sandpipers",r:"Rare",sz:"8 in",sea:["Spring","Summer"],reg:["AK"],col:"#6b6258",feat:"The Old World counterpart of the Spotted Sandpiper; brown above and white below with a white wedge before the wing, teetering constantly and flying low on stiff, bowed wings.",voice:"A shrill, piping 'twee-wee-wee'."},
"common-snipe":{name:"Common Snipe",sci:"Gallinago gallinago",fam:"Sandpipers",r:"Rare",sz:"11 in",sea:["Spring","Fall"],reg:["AK"],col:"#8a6d4f",feat:"The Old World snipe; very like Wilson's but showing a broad white trailing edge to the wing and paler underwing. A regular spring overshoot at western islands.",voice:"A rasping 'scaap' when flushed; a winnowing display flight."},
"common-cuckoo":{name:"Common Cuckoo",sci:"Cuculus canorus",fam:"Cuckoos",r:"Rare",sz:"13 in",sea:["Spring","Summer"],reg:["AK"],col:"#8f8f8f",feat:"A slim, long-tailed, gray bird with barred underparts and a falcon-like flight; one of two near-identical Asian cuckoos that appear at Gambell. Best told by voice.",voice:"The famous, far-carrying 'cuc-koo' of the male."},
"oriental-cuckoo":{name:"Oriental Cuckoo",sci:"Cuculus optatus",fam:"Cuckoos",r:"Rare",sz:"13 in",sea:["Spring","Summer"],reg:["AK"],col:"#8f8f8f",feat:"Nearly identical to Common Cuckoo — gray with barred underparts — but averages buffier below with broader barring; safely separated only by its hollow, hooting call.",voice:"A low, resonant, hollow 'hoop-hoop-hoop'."},
"red-flanked-bluetail":{name:"Red-flanked Bluetail",sci:"Tarsiger cyanurus",fam:"Old World Flycatchers",r:"Rare",sz:"6 in",sea:["Spring","Fall"],reg:["AK"],col:"#3a6ea5",feat:"A small chat with a blue tail and rump, white throat and bright orange flanks; males show more blue above. A jewel-like Asian vagrant that perches low and flicks its tail.",voice:"A soft, dry 'tk-tk' and a quiet whistled note."},
"siberian-rubythroat":{name:"Siberian Rubythroat",sci:"Calliope calliope",fam:"Old World Flycatchers",r:"Rare",sz:"6 in",sea:["Spring","Fall"],reg:["AK"],col:"#9c3a2f",feat:"A robust, skulking chat; the male has a brilliant ruby-red throat set off by white eyebrow and moustache stripes. A prized Gambell vagrant that creeps through low vegetation.",voice:"A rich, varied warble; a low 'tschk' call."},
"taiga-flycatcher":{name:"Taiga Flycatcher",sci:"Ficedula albicilla",fam:"Old World Flycatchers",r:"Rare",sz:"5 in",sea:["Spring","Fall"],reg:["AK"],col:"#8a8278",feat:"A small, big-eyed gray-brown flycatcher that flicks its black, white-sided tail upward; breeding males show an orange-red throat. An Asian stray to the Bering islands.",voice:"A dry, rattling 'trrrt' call."},
"eyebrowed-thrush":{name:"Eyebrowed Thrush",sci:"Turdus obscurus",fam:"Thrushes",r:"Rare",sz:"9 in",sea:["Spring","Fall"],reg:["AK"],col:"#8a6d4f",feat:"A trim Asian thrush with a gray head, bold white eyebrow and white crescent below the eye, and warm orange-buff flanks. One of the more regular Gambell vagrants.",voice:"A thin 'tseep' and soft chuckling notes."},
"dusky-thrush":{name:"Dusky Thrush",sci:"Turdus eunomus",fam:"Thrushes",r:"Rare",sz:"9 in",sea:["Spring","Fall"],reg:["AK"],col:"#9c5a33",feat:"A boldly marked Asian thrush with a strong white eyebrow, blackish breast and flank scaling and rufous wing panels. A striking and sought-after stray.",voice:"A wheezy 'shack-shack' and thin whistles."},
"dusky-warbler":{name:"Dusky Warbler",sci:"Phylloscopus fuscatus",fam:"Leaf Warblers",r:"Rare",sz:"5 in",sea:["Fall"],reg:["AK"],col:"#6b6258",feat:"A drab, dark brown leaf-warbler with a long buffy eyebrow and no wing bars; skulks low in vegetation, often near the ground, flicking its wings. An almost-annual fall vagrant.",voice:"A hard, distinctive 'tack', like stones tapped together."},
"willow-warbler":{name:"Willow Warbler",sci:"Phylloscopus trochilus",fam:"Leaf Warblers",r:"Rare",sz:"4 in",sea:["Fall"],reg:["AK"],col:"#8a9a5a",feat:"A small, pale, greenish-and-yellow leaf-warbler with a clean face and pale legs; an Old World migrant that has reached Gambell in fall. Very like Arctic Warbler but neater.",voice:"A soft, disyllabic 'hoo-eet'."},
"gray-wagtail":{name:"Gray Wagtail",sci:"Motacilla cinerea",fam:"Wagtails & Pipits",r:"Rare",sz:"8 in",sea:["Spring","Fall"],reg:["AK"],col:"#e8c33a",feat:"The longest-tailed wagtail, blue-gray above with a lemon-yellow rump and undertail; constantly pumps its very long tail. An elegant Asian stray to western Alaska.",voice:"A sharp, metallic 'tzit-tzit' in flight."},
"pechora-pipit":{name:"Pechora Pipit",sci:"Anthus gustavi",fam:"Wagtails & Pipits",r:"Rare",sz:"6 in",sea:["Fall"],reg:["AK"],col:"#8a7257",feat:"A compact, skulking, heavily streaked pipit with two pale 'braces' down the back and pink legs; secretive and easily overlooked. A classic Gambell fall vagrant.",voice:"A hard, distinctive 'pwit' or 'dzep', often given once."},
"olive-backed-pipit":{name:"Olive-backed Pipit",sci:"Anthus hodgsoni",fam:"Wagtails & Pipits",r:"Rare",sz:"6 in",sea:["Spring","Fall"],reg:["AK"],col:"#6b7a4a",feat:"A neat pipit with a greenish, faintly streaked back, a bold buff-and-white eyebrow and a black-and-white spot on the rear of the cheek. Tree-loving, but waifs land at Gambell.",voice:"A thin, buzzy 'tseez' or 'speez'."},
"brambling":{name:"Brambling",sci:"Fringilla montifringilla",fam:"Finches",r:"Rare",sz:"6 in",sea:["Spring","Fall"],reg:["AK","PA"],col:"#e8631a",feat:"A boldly patterned finch with orange shoulders and breast, a white rump and (in males) a black head; an Old World species that is one of the more frequent Bering vagrants.",voice:"A harsh, nasal 'tcheww' and a dry flight 'chuck'."},
"common-rosefinch":{name:"Common Rosefinch",sci:"Carpodacus erythrinus",fam:"Finches",r:"Rare",sz:"6 in",sea:["Spring","Summer"],reg:["AK"],col:"#9c3a2f",feat:"A stocky finch with a stubby bill and beady black eye; adult males are washed rose-red on the head and breast, females and immatures plain streaky brown. An Asian stray.",voice:"A clear, rising, whistled 'tooee-tooee'."},
"rustic-bunting":{name:"Rustic Bunting",sci:"Emberiza rustica",fam:"Old World Buntings",r:"Rare",sz:"6 in",sea:["Spring","Fall"],reg:["AK"],col:"#a83a2a",feat:"A handsome Old World bunting with a small crest, white underparts marked by a rusty breast band and flank streaks, and a rufous nape. A regular Gambell vagrant.",voice:"A sharp, hard 'tsip' call."},
"little-bunting":{name:"Little Bunting",sci:"Emberiza pusilla",fam:"Old World Buntings",r:"Rare",sz:"5 in",sea:["Fall"],reg:["AK"],col:"#9c5a33",feat:"A tiny, finely streaked bunting with a chestnut face framed by black lateral crown stripes and a pale eye-ring; the smallest of the Asian buntings to reach Alaska.",voice:"A short, sharp 'tick'."},
"pallas-bunting":{name:"Pallas's Bunting",sci:"Emberiza pallasi",fam:"Old World Buntings",r:"Rare",sz:"5 in",sea:["Spring","Fall"],reg:["AK"],col:"#8a7257",feat:"A small, pale, reed-loving bunting; breeding males have a black head and bib with a white collar, females are pale sandy and streaked. A scarce western-Alaska stray.",voice:"A distinctive, descending 'cheelp' or 'dzleep'."},
"eurasian-skylark":{name:"Eurasian Skylark",sci:"Alauda arvensis",fam:"Larks",r:"Rare",sz:"7 in",sea:["Spring","Fall"],reg:["AK"],col:"#b59a6a",feat:"A streaky brown lark with a short crest, white outer tail feathers and a white trailing edge to the wing; an Old World species that reaches the western islands.",voice:"A rich, sustained warbling song, often given high in display; a liquid 'chirrup' call."},
"sooty-grouse":{name:"Sooty Grouse",sci:"Dendragapus fuliginosus",fam:"Grouse",r:"Uncommon",sz:"20 in",sea:["Year-round"],reg:["AK"],col:"#4a4a52",feat:"A large, dark sooty-gray grouse of coastal rainforest; displaying males inflate bare yellow neck sacs and give deep hoots from high in conifers.",voice:"A series of very low, ventriloquial hoots — 'whoop… whoop… whoop' — felt as much as heard."},
"fork-tailed-storm-petrel":{name:"Fork-tailed Storm-Petrel",sci:"Hydrobates furcatus",fam:"Storm-Petrels",r:"Uncommon",sz:"8 in",sea:["Summer"],reg:["AK"],col:"#8f9aa5",feat:"A small, pale blue-gray seabird with a forked tail and dark eye patch; flutters and patters low over the water far from shore. Nests in island burrows.",voice:"Silent at sea; raspy purring and twitters from the nesting burrows at night."},
"double-crested-cormorant":{name:"Double-crested Cormorant",sci:"Nannopterum auritum",fam:"Cormorants",r:"Uncommon",sz:"33 in",sea:["Year-round","Summer"],reg:["AK","WA","CA","TX","FL","NY","PA","MA"],col:"#2a2a30",feat:"A large, all-dark cormorant with an orange-yellow throat pouch and a kinked neck in flight; the breeding 'double crest' is rarely obvious. Perches with wings spread to dry.",voice:"Low, pig-like grunts at the colony; otherwise silent."},
"killdeer":{name:"Killdeer",sci:"Charadrius vociferus",fam:"Plovers",r:"Common",sz:"10 in",sea:["Spring","Summer","Fall"],reg:["AK","WA","CA","TX","FL","NY","PA","MA"],col:"#8a6d4f",feat:"A large, noisy plover of gravel and lawns with two bold black breast bands and a rusty rump; feigns a broken wing to lure intruders from its nest.",voice:"A loud, insistent, ringing 'kill-deer, kill-deer' and trilled alarm notes."},
"short-billed-dowitcher":{name:"Short-billed Dowitcher",sci:"Limnodromus griseus",fam:"Sandpipers",r:"Uncommon",sz:"11 in",sea:["Spring","Summer","Fall"],reg:["AK","WA","CA","TX","FL","NY","PA","MA"],col:"#9c7a4a",feat:"A snipe-like shorebird with a long straight bill; very like Long-billed Dowitcher but favours tidal flats and gives a different call. Feeds with a sewing-machine motion.",voice:"A mellow, rapid 'tu-tu-tu', softer than the Long-billed's sharp keek."},
"bonapartes-gull":{name:"Bonaparte's Gull",sci:"Chroicocephalus philadelphia",fam:"Gulls & Terns",r:"Common",sz:"13 in",sea:["Spring","Summer","Fall"],reg:["AK","WA","CA","NY","PA","MA"],col:"#e8e4d8",feat:"A small, buoyant, tern-like gull; breeding adults have a neat black hood and show a white wedge in the outer wing. Unusually for a gull, it nests in spruce trees.",voice:"A soft, nasal, buzzy 'cheer' or 'ehrr'."},
"rhinoceros-auklet":{name:"Rhinoceros Auklet",sci:"Cerorhinca monocerata",fam:"Auks",r:"Uncommon",sz:"15 in",sea:["Spring","Summer"],reg:["AK","WA","CA"],col:"#4a4036",feat:"A stocky, dark gray-brown alcid, really a puffin relative; breeding birds have a pale upturned horn at the base of the bill and two white facial plumes.",voice:"Moaning, barking calls given at the colony after dark."},
"western-screech-owl":{name:"Western Screech-Owl",sci:"Megascops kennicottii",fam:"Owls",r:"Uncommon",sz:"8 in",sea:["Year-round"],reg:["AK","WA","CA","TX"],col:"#6b6258",feat:"A small, stocky, gray-brown owl with short ear tufts and a finely streaked breast; strictly nocturnal, roosting by day in tree cavities of coastal woods.",voice:"An accelerating series of mellow whistles on one pitch — the 'bouncing-ball' song."},
"northern-saw-whet-owl":{name:"Northern Saw-whet Owl",sci:"Aegolius acadicus",fam:"Owls",r:"Uncommon",sz:"8 in",sea:["Year-round"],reg:["AK","WA","CA","NY","PA","MA"],col:"#8a6d4f",feat:"A tiny, big-headed owl with a round, tuftless face, white-streaked forehead and bright yellow eyes; tame and easily overlooked roosting in dense conifers.",voice:"A monotonous, mechanical, whistled 'too-too-too' repeated for minutes on end."},
"red-breasted-sapsucker":{name:"Red-breasted Sapsucker",sci:"Sphyrapicus ruber",fam:"Woodpeckers",r:"Uncommon",sz:"8 in",sea:["Year-round","Summer"],reg:["AK","WA","CA"],col:"#9c3a2f",feat:"A handsome woodpecker with an entirely red head and breast, a black-and-white back and a bold white wing patch; drills neat rows of sap wells in coastal trees.",voice:"A nasal, mewing 'waah' and an irregular, stuttering drum."},
"pacific-slope-flycatcher":{name:"Pacific-slope Flycatcher",sci:"Empidonax difficilis",fam:"Tyrant Flycatchers",r:"Uncommon",sz:"5 in",sea:["Summer"],reg:["AK","WA","CA","PA"],col:"#8a9a5a",feat:"A small olive flycatcher with a teardrop-shaped white eye-ring and yellowish underparts; a shade-loving bird of damp coastal forest, best identified by voice.",voice:"A sharp, rising 'pseet' or 'su-weet'."},
"barn-swallow":{name:"Barn Swallow",sci:"Hirundo rustica",fam:"Swallows",r:"Common",sz:"7 in",sea:["Spring","Summer"],reg:["AK","WA","CA","TX","FL","NY","PA","MA"],col:"#3a6ea5",feat:"The classic swallow, glossy steel-blue above with a rusty throat and forehead and long, deeply forked tail streamers; swoops low over fields and water.",voice:"A cheerful, liquid twittering ending in a dry, mechanical rattle."},
"red-breasted-nuthatch":{name:"Red-breasted Nuthatch",sci:"Sitta canadensis",fam:"Nuthatches",r:"Common",sz:"5 in",sea:["Year-round"],reg:["AK","WA","CA","NY","PA","MA"],col:"#6b7a8f",feat:"A small, compact nuthatch with a black cap, white eyebrow, black eyeline and rusty underparts; creeps head-first down conifer trunks. Smears pitch around its nest hole.",voice:"A tinny, nasal, repeated 'yank-yank', like a toy horn."},
"brown-creeper":{name:"Brown Creeper",sci:"Certhia americana",fam:"Treecreepers",r:"Uncommon",sz:"5 in",sea:["Year-round"],reg:["AK","WA","CA","NY","PA","MA"],col:"#8a7257",feat:"A tiny, cryptic, bark-brown bird with a thin decurved bill and stiff tail; spirals up tree trunks searching crevices, then drops to the base of the next tree.",voice:"A very high, thin, sibilant 'sees' and a softer, warbled song."},
"macgillivrays-warbler":{name:"MacGillivray's Warbler",sci:"Geothlypis tolmiei",fam:"New World Warblers",r:"Uncommon",sz:"5 in",sea:["Summer"],reg:["AK","WA","CA","PA"],col:"#8a9a5a",feat:"A skulking warbler of dense thickets; olive above and yellow below with a gray hood and bold white crescents above and below the eye. Stays low in tangled undergrowth.",voice:"A rolling, two-part song: a churry trill dropping at the end."},
"red-crossbill":{name:"Red Crossbill",sci:"Loxia curvirostra",fam:"Finches",r:"Uncommon",sz:"6 in",sea:["Year-round"],reg:["AK","WA","CA","NY","PA","MA"],col:"#a83a2a",feat:"A chunky finch with crossed mandibles for prying open conifer cones; males are brick-red, females olive-yellow. Wanders nomadically in noisy flocks chasing cone crops.",voice:"A hard, repeated 'jip-jip-jip' given in flight."},
"black-backed-woodpecker":{name:"Black-backed Woodpecker",sci:"Picoides arcticus",fam:"Woodpeckers",r:"Uncommon",sz:"9 in",sea:["Year-round"],reg:["AK","WA","CA","PA"],col:"#1c1c1c",feat:"A solid-black-backed woodpecker with barred white flanks; the male has a yellow crown. A fire specialist that flakes bark from burned and beetle-killed spruce.",voice:"A single sharp 'pik' and a fast, rattling scream; a slow, accelerating drum."},
"american-kestrel":{name:"American Kestrel",sci:"Falco sparverius",fam:"Falcons",r:"Uncommon",sz:"9 in",sea:["Spring","Summer","Fall"],reg:["AK","WA","CA","TX","FL","NY","PA","MA"],col:"#9c5a33",feat:"The smallest North American falcon; the male has blue-gray wings, a rusty back and tail and bold black facial marks. Hovers over open ground hunting voles and insects.",voice:"A shrill, excited 'klee-klee-klee'."},
"hudsonian-godwit":{name:"Hudsonian Godwit",sci:"Limosa haemastica",fam:"Sandpipers",r:"Rare",sz:"15 in",sea:["Spring","Fall"],reg:["AK","MA","PA"],col:"#9c5a33",feat:"A large, elegant godwit with a long, slightly upturned bill; breeding birds are deep brick-red below, and a bold black-and-white tail and black wing-linings flash in flight. A regular spring stopover at Anchorage's mudflats.",voice:"A high, soft 'toe-wit' or 'ta-it'."},
"townsends-solitaire":{name:"Townsend's Solitaire",sci:"Myadestes townsendi",fam:"Thrushes",r:"Uncommon",sz:"9 in",sea:["Year-round","Summer"],reg:["AK","WA","CA","PA"],col:"#8f8f8f",feat:"A slim, upright gray thrush with a white eye-ring, buffy wing patch and white outer tail feathers; perches conspicuously and defends juniper berry patches in winter.",voice:"A long, rich, rambling warble; a single eerie, whistled 'heeh' call."},
"vega-gull":{name:"Vega Gull",sci:"Larus vegae",fam:"Gulls & Terns",r:"Rare",sz:"24 in",sea:["Spring","Summer","Fall"],reg:["AK","PA"],col:"#8f8f8f",feat:"The East Asian form of the Herring Gull complex; a large gray-backed gull with deep pink legs, a darker mantle than American Herring Gull and extensive dusky head streaking in winter.",voice:"A loud, bugling long-call, like a Herring Gull's."},
"taiga-bean-goose":{name:"Taiga Bean-Goose",sci:"Anser fabalis",fam:"Ducks & Geese",r:"Rare",sz:"32 in",sea:["Spring","Fall"],reg:["AK"],col:"#6b5a47",feat:"A large, long-necked brown goose with orange legs and a long black bill marked by an orange band; an Asian stray to the western islands, slimmer-billed than Tundra Bean-Goose.",voice:"A loud, reedy, two- or three-note honking 'ung- unk'."},
"tundra-bean-goose":{name:"Tundra Bean-Goose",sci:"Anser serrirostris",fam:"Ducks & Geese",r:"Rare",sz:"28 in",sea:["Spring","Fall"],reg:["AK","PA"],col:"#6b5a47",feat:"A stocky, dark brown goose with orange legs and a short, deep-based black bill showing a narrow orange band; a scarce Asian visitor, chunkier than Taiga Bean-Goose.",voice:"A nasal, honking 'kayak-kayak'."},
"whooper-swan":{name:"Whooper Swan",sci:"Cygnus cygnus",fam:"Ducks & Geese",r:"Rare",sz:"60 in",sea:["Spring","Fall","Winter"],reg:["AK","PA"],col:"#f0ece0",feat:"A large all-white swan holding its neck stiffly erect; the bill is black with a big wedge of yellow extending forward past the nostril. An Asian species that winters sparingly in the western Aleutians and strays to Gambell.",voice:"A loud, bugling, trumpet-like 'whoop-whoop'."},
"baikal-teal":{name:"Baikal Teal",sci:"Sibirionetta formosa",fam:"Ducks & Geese",r:"Rare",sz:"16 in",sea:["Spring","Fall"],reg:["AK"],col:"#6b8a5a",feat:"A small, dabbling Asian duck; the male's face bears an ornate harlequin pattern of green, buff, black and white, with long drooping flank plumes. A coveted Bering Strait vagrant.",voice:"A deep, clucking 'wot-wot' from the male."},
"garganey":{name:"Garganey",sci:"Spatula querquedula",fam:"Ducks & Geese",r:"Rare",sz:"15 in",sea:["Spring","Summer"],reg:["AK","PA"],col:"#8a6d4f",feat:"A small Old World dabbling duck; the breeding male has a broad white crescent sweeping back over the eye and a pale blue-gray forewing. A regular spring overshoot to western Alaska.",voice:"A dry, rattling, crackling call from the male in display."},
"falcated-duck":{name:"Falcated Duck",sci:"Mareca falcata",fam:"Ducks & Geese",r:"Rare",sz:"19 in",sea:["Spring","Fall"],reg:["AK"],col:"#3f6b5a",feat:"A handsome Asian dabbler; the male has a glossy bronze-green head with a maned nape and long sickle-shaped tertials draped over the tail. A casual spring vagrant to the Bering Sea islands.",voice:"A low whistle and a soft wheezy trill from the male."},
"tufted-duck":{name:"Tufted Duck",sci:"Aythya fuligula",fam:"Ducks & Geese",r:"Rare",sz:"17 in",sea:["Spring","Fall"],reg:["AK","PA"],col:"#1a1a22",feat:"A compact Old World diving duck; the male is glossy black with clean white flanks and a drooping wispy crest off the back of the head. A regular spring vagrant to western Alaska.",voice:"Mostly silent; a soft growl in display."},
"smew":{name:"Smew",sci:"Mergellus albellus",fam:"Ducks & Geese",r:"Rare",sz:"16 in",sea:["Spring","Fall"],reg:["AK"],col:"#e8e8ee",feat:"A small Eurasian merganser; the male is striking white with fine black 'cracked-ice' markings and a black eye-patch. A casual vagrant to the Bering Sea region.",voice:"Largely silent away from breeding grounds."},
"laysan-albatross":{name:"Laysan Albatross",sci:"Phoebastria immutabilis",fam:"Shearwaters & Petrels",r:"Rare",sz:"32 in",sea:["Summer","Fall"],reg:["AK"],col:"#3a3a44",feat:"A large white-bodied albatross with blackish upperwings and a dark smudge around the eye. Ranges into the northern Bering Sea in small numbers in summer.",voice:"Silent at sea; bill-clattering and groans at colonies."},
"short-tailed-albatross":{name:"Short-tailed Albatross",sci:"Phoebastria albatrus",fam:"Shearwaters & Petrels",r:"Rare",sz:"36 in",sea:["Summer","Fall"],reg:["AK"],col:"#d8cba0",feat:"A huge albatross with a massive pink bill; adults show a golden wash on the head. A rare but recovering visitor to Alaskan waters near St. Lawrence Island.",voice:"Silent at sea."},
"mottled-petrel":{name:"Mottled Petrel",sci:"Pterodroma inexpectata",fam:"Shearwaters & Petrels",r:"Rare",sz:"14 in",sea:["Summer","Fall"],reg:["AK"],col:"#6b7280",feat:"A fast-flying gadfly petrel with a gray belly patch contrasting white underparts and a bold black underwing bar. Occurs offshore in the Bering Sea.",voice:"Silent at sea."},
"leachs-storm-petrel":{name:"Leach's Storm-Petrel",sci:"Hydrobates leucorhous",fam:"Storm-Petrels",r:"Rare",sz:"8 in",sea:["Summer","Fall"],reg:["AK","PA"],col:"#3a3a40",feat:"A dark storm-petrel with a forked tail, a divided white rump, and bounding, nighthawk-like flight. Casual in the northern Bering Sea.",voice:"Silent at sea; purring and chattering calls at colonies."},
"european-golden-plover":{name:"European Golden-Plover",sci:"Pluvialis apricaria",fam:"Plovers",r:"Rare",sz:"11 in",sea:["Spring","Fall"],reg:["AK"],col:"#b89a3a",feat:"A spangled golden plover with white underwings (unlike the gray underwings of Pacific/American). A casual spring vagrant to St. Lawrence Island.",voice:"A clear, mournful single-note whistle."},
"black-tailed-godwit":{name:"Black-tailed Godwit",sci:"Limosa limosa",fam:"Sandpipers",r:"Rare",sz:"16 in",sea:["Spring","Fall"],reg:["AK","PA"],col:"#b0703f",feat:"A tall, long-legged godwit with a straight bill, a broad black tail band, and a bold white wing-stripe. A casual spring vagrant to western Alaska.",voice:"A nasal 'wicka-wicka-wicka' in display."},
