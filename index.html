"ring-necked-duck":{name:"Ring-necked Duck",sci:"Aythya collaris",fam:"Ducks & Geese",r:"Common",sz:"17 in",sea:["Fall","Winter","Spring"],reg:["MA","NY","PA","CA","FL"],col:"#2a2a33",feat:"A diving duck of wooded ponds; the male is black with gray flanks, a peaked head, and a boldly white-ringed bill. The namesake neck-ring is rarely visible.",voice:"Mostly silent; a low, purring growl."},
"hooded-merganser":{name:"Hooded Merganser",sci:"Lophodytes cucullatus",fam:"Ducks & Geese",r:"Uncommon",sz:"18 in",sea:["Year-round","Winter"],reg:["MA","NY","PA","CA","FL"],col:"#2a2a2a",feat:"A small merganser; the male raises a striking fan-shaped white crest bordered in black and shows chestnut flanks. A cavity-nester of wooded waters.",voice:"A low, rolling, frog-like croak in display."},
"ruddy-duck":{name:"Ruddy Duck",sci:"Oxyura jamaicensis",fam:"Ducks & Geese",r:"Uncommon",sz:"15 in",sea:["Fall","Winter","Spring"],reg:["MA","NY","PA","CA","TX","FL"],col:"#8a4f33",feat:"A small, chunky stiff-tailed diver; breeding males are chestnut with a black cap, white cheeks, and a bright sky-blue bill, often holding the tail cocked up.",voice:"Mostly silent; males make a bubbling, ticking display sound."},
"mute-swan":{name:"Mute Swan",sci:"Cygnus olor",fam:"Ducks & Geese",r:"Uncommon",sz:"60 in",sea:["Year-round"],reg:["MA","NY","PA"],col:"#f2efe6",feat:"A large, introduced swan with an orange bill and a black basal knob, holding its neck in a graceful S-curve with wings often arched over the back.",voice:"Largely silent; hisses and snorts, plus a throbbing wingbeat in flight."},
"pied-billed-grebe":{name:"Pied-billed Grebe",sci:"Podilymbus podiceps",fam:"Grebes",r:"Uncommon",sz:"13 in",sea:["Year-round","Migration"],reg:["MA","NY","PA","CA","TX","FL"],col:"#6b5a47",feat:"A small, stocky brown grebe with a stubby pale bill ringed black in breeding plumage. Dives and sinks quietly out of sight when alarmed.",voice:"A loud, whooping 'kuk-kuk-kuk-cow-cow-cowp'."},
"rock-pigeon":{name:"Rock Pigeon",sci:"Columba livia",fam:"Pigeons & Doves",r:"Very Common",sz:"12.5 in",sea:["Year-round"],reg:["MA","NY","PA","CA","TX","FL"],col:"#6b6b7a",feat:"The familiar city pigeon; highly variable but typically blue-gray with two black wing-bars and a glossy green-purple neck. Ubiquitous around buildings and bridges.",voice:"A soft, throaty 'coo-roo-coo'."},
"chimney-swift":{name:"Chimney Swift",sci:"Chaetura pelagica",fam:"Swifts",r:"Common",sz:"5.25 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#4a4a4a",feat:"A sooty, cigar-shaped bird that twitters overhead on stiff, fluttering wings; never perches in the open, roosting in chimneys. A summer breeder.",voice:"A rapid, chittering twitter given in flight."},
"ruby-throated-hummingbird":{name:"Ruby-throated Hummingbird",sci:"Archilochus colubris",fam:"Hummingbirds",r:"Common",sz:"3.75 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#3a8a4f",feat:"The only breeding hummingbird in the East; emerald-green above, the male has a brilliant ruby gorget that flashes black at the wrong angle.",voice:"A rapid series of soft 'chip' notes; wings hum in flight."},
"great-cormorant":{name:"Great Cormorant",sci:"Phalacrocorax carbo",fam:"Cormorants",r:"Uncommon",sz:"36 in",sea:["Winter","Fall","Spring"],reg:["MA","NY","PA"],col:"#2a2a2a",feat:"A big, heavy cormorant of rocky coasts; larger than Double-crested, with a white throat patch and (in breeding plumage) white flank patches. A winter visitor.",voice:"Low, guttural grunts at roosts; silent otherwise."},
"northern-gannet":{name:"Northern Gannet",sci:"Morus bassanus",fam:"Gannets",r:"Common",sz:"37 in",sea:["Fall","Winter","Spring"],reg:["MA","NY","PA"],col:"#f0ece0",feat:"A large, cigar-shaped white seabird with black wingtips and a golden-buff head, plunge-diving spectacularly from height. A signature seawatch bird off the coast.",voice:"Silent at sea away from colonies."},
"great-egret":{name:"Great Egret",sci:"Ardea alba",fam:"Herons",r:"Uncommon",sz:"39 in",sea:["Summer","Fall"],reg:["MA","NY","PA","CA","TX","FL"],col:"#f5f5f0",feat:"A tall, all-white heron with a heavy yellow bill and black legs and feet; grows long, lacy plumes when breeding. Stalks fish in marshes and tidal flats.",voice:"A low, hoarse croak when disturbed."},
"snowy-egret":{name:"Snowy Egret",sci:"Egretta thula",fam:"Herons",r:"Uncommon",sz:"24 in",sea:["Summer","Fall"],reg:["MA","NY","PA","CA","TX","FL"],col:"#f7f7f2",feat:"A dainty white egret with a slender black bill, black legs, and bright golden-yellow feet; shuffles its feet to flush prey. Wears wispy recurved plumes when breeding.",voice:"A harsh, bubbling 'wulla-wulla' at colonies."},
"little-blue-heron":{name:"Little Blue Heron",sci:"Egretta caerulea",fam:"Herons",r:"Uncommon",sz:"24 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#5a5a7a",feat:"A slender, slate-blue heron with a maroon-purple neck and a gray, black-tipped bill; immatures are white. A post-breeding visitor to coastal marshes.",voice:"A low croak when flushed."},
"green-heron":{name:"Green Heron",sci:"Butorides virescens",fam:"Herons",r:"Uncommon",sz:"18 in",sea:["Summer"],reg:["MA","NY","PA","CA","TX","FL"],col:"#3a4a3a",feat:"A small, crouched, dark heron with a chestnut neck, greenish back, and orange legs; sometimes drops bait on the water to lure fish. A summer breeder.",voice:"An explosive, sharp 'skeow' as it flushes."},
"black-crowned-night-heron":{name:"Black-crowned Night-Heron",sci:"Nycticorax nycticorax",fam:"Herons",r:"Uncommon",sz:"25 in",sea:["Summer","Year-round"],reg:["MA","NY","PA","CA","TX","FL"],col:"#3a3a4a",feat:"A stocky, short-necked heron with a black crown and back, pale gray wings, and red eyes; most active at dusk. Roosts colonially in waterside trees by day.",voice:"A loud, barking 'quawk' given at night and in flight."},
"glossy-ibis":{name:"Glossy Ibis",sci:"Plegadis falcinellus",fam:"Ibises & Spoonbills",r:"Uncommon",sz:"23 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#5a3a3a",feat:"A dark, long-legged wader with a down-curved bill; deep chestnut with iridescent green-and-purple wings that glint in sunlight. Feeds in coastal marshes.",voice:"A low, grunting 'grru' at colonies."},
"turkey-vulture":{name:"Turkey Vulture",sci:"Cathartes aura",fam:"New World Vultures",r:"Common",sz:"26 in",sea:["Year-round","Summer"],reg:["MA","NY","PA","CA","TX","FL"],col:"#3a2a2a",feat:"A large, dark soaring bird with a small red head and two-toned underwings, holding its wings in a shallow V and rocking as it rides thermals.",voice:"Nearly silent; hisses and grunts at roosts."},
"black-vulture":{name:"Black Vulture",sci:"Coragyps atratus",fam:"New World Vultures",r:"Uncommon",sz:"25 in",sea:["Year-round"],reg:["MA","NY","PA","TX","FL"],col:"#2a2a2a",feat:"A compact, black soaring bird with a bare gray head and bold white patches at the wingtips; flaps more often than Turkey Vulture with stiffer wingbeats. Expanding northward.",voice:"Silent apart from grunts and hisses."},
"coopers-hawk":{name:"Cooper's Hawk",sci:"Astur cooperii",fam:"Hawks & Eagles",r:"Common",sz:"16.5 in",sea:["Year-round"],reg:["MA","NY","PA","CA","TX","FL"],col:"#6b5a4a",feat:"A medium accipiter with a capped dark crown, rusty-barred underparts, and a long rounded tail; hunts songbirds in wooded suburbs. Larger and bigger-headed than a Sharp-shinned.",voice:"A rapid, nasal 'cak-cak-cak' near the nest."},
"red-shouldered-hawk":{name:"Red-shouldered Hawk",sci:"Buteo lineatus",fam:"Hawks & Eagles",r:"Uncommon",sz:"17 in",sea:["Year-round"],reg:["MA","NY","PA","CA","TX","FL"],col:"#9c5a3a",feat:"A colorful woodland buteo with rufous shoulders and barred orange underparts; in flight shows translucent crescents near the wingtips. Favors wet woodlands.",voice:"A loud, repeated 'kee-yer', often mimicked by Blue Jays."},
"broad-winged-hawk":{name:"Broad-winged Hawk",sci:"Buteo platypterus",fam:"Hawks & Eagles",r:"Uncommon",sz:"15 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#7a5a44",feat:"A small, compact buteo with broad black-and-white tail bands and pointed wingtips; gathers in spectacular swirling 'kettles' of thousands during fall migration.",voice:"A high, thin, whistled 'pee-weeee'."},
"eastern-screech-owl":{name:"Eastern Screech-Owl",sci:"Megascops asio",fam:"Owls",r:"Uncommon",sz:"8.5 in",sea:["Year-round"],reg:["MA","NY","PA","TX","FL"],col:"#7a6a55",feat:"A small, eared owl in red or gray morphs, superbly camouflaged against bark; roosts in cavities and nest boxes. Strictly nocturnal and easily overlooked.",voice:"A descending, whinnying horse-like trill and an even, monotone trill."},
"barred-owl":{name:"Barred Owl",sci:"Strix varia",fam:"Owls",r:"Uncommon",sz:"21 in",sea:["Year-round"],reg:["MA","NY","PA","TX","FL"],col:"#6b6258",feat:"A large, round-headed owl with dark eyes, vertical brown belly streaks, and a barred chest; hunts mature wet woodlands. The most vocal of the Northeast's owls.",voice:"A rhythmic, hooting 'who-cooks-for-you, who-cooks-for-you-all'."},
"piping-plover":{name:"Piping Plover",sci:"Charadrius melodus",fam:"Plovers",r:"Uncommon",sz:"7 in",sea:["Summer"],reg:["MA","NY","PA"],col:"#d8cdb8",feat:"A small, pale sandy plover the color of dry beach sand, with orange legs and a single black breast-band when breeding. A threatened species nesting on protected beaches.",voice:"A clear, plaintive 'peep-lo' whistle."},
"american-oystercatcher":{name:"American Oystercatcher",sci:"Haematopus palliatus",fam:"Oystercatchers",r:"Uncommon",sz:"18.5 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#2a2a2a",feat:"A large, unmistakable shorebird with a black head, brown back, white belly, and a long, heavy orange-red bill used to pry open shellfish. Nests on coastal beaches.",voice:"A loud, piercing 'wheep!' and an accelerating piping series."},
"willet":{name:"Willet",sci:"Tringa semipalmata",fam:"Sandpipers",r:"Uncommon",sz:"15 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#9a8f7d",feat:"A large, plain gray shorebird that erupts into a flashy black-and-white wing pattern in flight. Breeds noisily in coastal saltmarshes.",voice:"A ringing, insistent 'pill-will-willet'."},
"american-woodcock":{name:"American Woodcock",sci:"Scolopax minor",fam:"Sandpipers",r:"Uncommon",sz:"11 in",sea:["Year-round","Spring"],reg:["MA","NY","PA","TX","FL"],col:"#8a6a4a",feat:"A plump, cryptic woodland shorebird with a long bill, huge eyes set far back, and dead-leaf camouflage; famous for its spiraling springtime sky-dance.",voice:"A nasal, buzzy 'peent' from the ground; twittering wings in display flight."},
"ring-billed-gull":{name:"Ring-billed Gull",sci:"Larus delawarensis",fam:"Gulls & Terns",r:"Common",sz:"17.5 in",sea:["Year-round","Winter"],reg:["MA","NY","PA","CA","TX","FL"],col:"#b8bcc2",feat:"A clean, medium gull with a pale gray back, yellow legs, and a yellow bill encircled by a neat black ring. Abundant in parking lots, fields, and shorelines.",voice:"A high, squealing 'kee-yow' and shorter yelps."},
"great-black-backed-gull":{name:"Great Black-backed Gull",sci:"Larus marinus",fam:"Gulls & Terns",r:"Common",sz:"30 in",sea:["Year-round"],reg:["MA","NY","PA"],col:"#2a2a2a",feat:"The world's largest gull; massive, with a slaty-black back, pink legs, and a heavy yellow bill. A dominant predator and scavenger of the coast.",voice:"A deep, gruff 'kowk', lower than other gulls."},
"laughing-gull":{name:"Laughing Gull",sci:"Leucophaeus atricilla",fam:"Gulls & Terns",r:"Common",sz:"16.5 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#3a3a44",feat:"A medium gull; breeding adults have a jet-black hood, dark gray back, and drooping red bill. A noisy summer visitor to beaches and harbors.",voice:"A loud, strident, laughing 'ha-ha-ha-haah-haah'."},
"roseate-tern":{name:"Roseate Tern",sci:"Sterna dougallii",fam:"Gulls & Terns",r:"Uncommon",sz:"15.5 in",sea:["Summer"],reg:["MA","NY","PA"],col:"#e8e8ee",feat:"A pale, very long-tailed tern with a mostly black bill and a faint rosy breast-blush when breeding. An endangered species nesting on a few protected coastal islands.",voice:"A distinctive, soft, two-note 'chu-ick' and a rasping alarm."},
"least-tern":{name:"Least Tern",sci:"Sternula antillarum",fam:"Gulls & Terns",r:"Uncommon",sz:"9 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#e0e4ea",feat:"The smallest North American tern, with a yellow bill, a black-capped white forehead, and hurried, fluttering flight. Nests in small colonies on open beaches.",voice:"A sharp, high 'kip-kip-kip' and a buzzy 'zreep'."},
"razorbill":{name:"Razorbill",sci:"Alca torda",fam:"Auks",r:"Uncommon",sz:"17 in",sea:["Winter"],reg:["MA","NY"],col:"#2a2a2a",feat:"A stocky black-and-white alcid with a deep, blunt, vertically flattened black bill marked by a white line. The default wintering auk off Massachusetts beaches.",voice:"Silent away from breeding colonies."},
"dovekie":{name:"Dovekie",sci:"Alle alle",fam:"Auks",r:"Uncommon",sz:"8.25 in",sea:["Winter"],reg:["MA","NY","PA"],col:"#2a2a2a",feat:"A tiny, neckless, starling-sized auk, black above and white below with a stubby bill; whirs low over the water. Appears in winter, sometimes in big seawatch flights.",voice:"Silent at sea in winter."},
"red-bellied-woodpecker":{name:"Red-bellied Woodpecker",sci:"Melanerpes carolinus",fam:"Woodpeckers",r:"Common",sz:"9.25 in",sea:["Year-round"],reg:["MA","NY","PA","TX","FL"],col:"#b8483a",feat:"A pale, zebra-backed woodpecker with a red nape and crown (males to the bill); the faint reddish belly is rarely seen. A common feeder bird, expanding northward.",voice:"A rolling, churring 'quirrr' and a sharp 'cha-cha-cha'."},
"yellow-bellied-sapsucker":{name:"Yellow-bellied Sapsucker",sci:"Sphyrapicus varius",fam:"Woodpeckers",r:"Uncommon",sz:"8.5 in",sea:["Migration","Winter","Summer"],reg:["MA","NY","PA"],col:"#3a3a3a",feat:"A boldly marked woodpecker with a red forehead (and throat in males), a long white wing-stripe, and a pale yellow wash below; drills neat rows of sap wells in tree bark.",voice:"A nasal, cat-like 'mew' and a slow, irregular drumming."},
"eastern-wood-pewee":{name:"Eastern Wood-Pewee",sci:"Contopus virens",fam:"Tyrant Flycatchers",r:"Common",sz:"6.25 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#6b6258",feat:"A drab gray-olive flycatcher with two whitish wing-bars and no eye-ring, perching upright on dead limbs to sally for insects. Heard far more often than seen.",voice:"A clear, plaintive, slurred 'pee-a-wee... pee-yer'."},
"eastern-phoebe":{name:"Eastern Phoebe",sci:"Sayornis phoebe",fam:"Tyrant Flycatchers",r:"Common",sz:"7 in",sea:["Summer","Spring"],reg:["MA","NY","PA","TX","FL"],col:"#6b6258",feat:"A plain gray-brown flycatcher with a dark head and no wing-bars or eye-ring, persistently wagging its tail down and up. Nests on ledges and under bridges; an early-spring arrival.",voice:"A raspy, emphatic 'fee-bee', the second note buzzy."},
"willow-flycatcher":{name:"Willow Flycatcher",sci:"Empidonax traillii",fam:"Tyrant Flycatchers",r:"Uncommon",sz:"5.75 in",sea:["Summer"],reg:["MA","NY","PA","CA","TX"],col:"#7a7058",feat:"A drab Empidonax with a faint eye-ring and two wing-bars, separable from its kin mainly by voice. Breeds in wet shrubby thickets and willow tangles.",voice:"A sneezy, burry 'fitz-bew'."},
"least-flycatcher":{name:"Least Flycatcher",sci:"Empidonax minimus",fam:"Tyrant Flycatchers",r:"Uncommon",sz:"5.25 in",sea:["Summer"],reg:["MA","NY","PA"],col:"#7a7058",feat:"A tiny, big-headed Empidonax with a bold white eye-ring and crisp wing-bars; the smallest eastern flycatcher. Quick and twitchy, flicking wings and tail.",voice:"A dry, snappy, repeated 'che-bek!'."},
"great-crested-flycatcher":{name:"Great Crested Flycatcher",sci:"Myiarchus crinitus",fam:"Tyrant Flycatchers",r:"Common",sz:"8.5 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#8a7a4a",feat:"A large, bushy-crested flycatcher with a gray throat, lemon-yellow belly, and rufous flashes in the wings and tail. A cavity-nesting bird of the forest canopy.",voice:"A loud, rising, whistled 'wheeep!' and a rolling 'prrrreet'."},
"eastern-kingbird":{name:"Eastern Kingbird",sci:"Tyrannus tyrannus",fam:"Tyrant Flycatchers",r:"Common",sz:"8.5 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#3a3a3a",feat:"A bold blackish-and-white flycatcher with a white-tipped tail like a dipped paintbrush; aggressively chases crows and hawks from its open-country nesting territory.",voice:"A sputtering series of sharp, electric 'kip' and buzzy 'dzee-dzee' notes."},
"white-eyed-vireo":{name:"White-eyed Vireo",sci:"Vireo griseus",fam:"Vireos",r:"Uncommon",sz:"5 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#8a8a4a",feat:"A skulking vireo of dense thickets with yellow 'spectacles', two wing-bars, and a staring white eye in adults. Heard far more than seen.",voice:"An emphatic, jumbled 'chick-per-weeoo-chick' with sharp introductory notes."},
"blue-headed-vireo":{name:"Blue-headed Vireo",sci:"Vireo solitarius",fam:"Vireos",r:"Uncommon",sz:"5.5 in",sea:["Summer","Migration"],reg:["MA","NY","PA"],col:"#5a6a7a",feat:"A crisp vireo with a blue-gray head, bold white spectacles, white throat, and yellow-washed flanks. Breeds in mixed northern woods; a hardy early and late migrant.",voice:"A slow series of sweet, slurred, paired phrases with long pauses."},
"warbling-vireo":{name:"Warbling Vireo",sci:"Vireo gilvus",fam:"Vireos",r:"Uncommon",sz:"5.5 in",sea:["Summer"],reg:["MA","NY","PA","CA","TX"],col:"#8a8a6a",feat:"A plain, pale gray-olive vireo with a faint pale eyebrow and no wing-bars. Drab in looks but a persistent singer high in shade trees and riverside groves.",voice:"A rambling, finch-like warble ending on an upward note."},
"red-eyed-vireo":{name:"Red-eyed Vireo",sci:"Vireo olivaceus",fam:"Vireos",r:"Common",sz:"6 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#6a7a5a",feat:"An olive-backed vireo with a gray cap, a black-bordered white eyebrow, and a ruby eye in adults. One of the most abundant breeding birds of eastern deciduous forest.",voice:"An endless series of short, robin-like phrases, as if asking and answering."},
"house-wren":{name:"House Wren",wiki:"Northern house wren",sci:"Troglodytes aedon",fam:"Wrens",r:"Common",sz:"4.75 in",sea:["Summer"],reg:["MA","NY","PA","CA","TX"],col:"#7a6248",feat:"A small, plain brown wren with a finely barred tail, often cocked. Bold and energetic around gardens and nest boxes, stuffing cavities with twigs.",voice:"A bubbling, churning cascade of musical trills and chatter."},
"carolina-wren":{name:"Carolina Wren",sci:"Thryothorus ludovicianus",fam:"Wrens",r:"Common",sz:"5.5 in",sea:["Year-round"],reg:["MA","NY","PA","TX","FL"],col:"#9a5f3a",feat:"A warm rusty-brown wren with a bold white eyebrow and a buff belly, often holding its tail cocked. A loud year-round resident, expanding northward in mild winters.",voice:"A rolling, repeated 'teakettle-teakettle-teakettle'."},
"marsh-wren":{name:"Marsh Wren",sci:"Cistothorus palustris",fam:"Wrens",r:"Uncommon",sz:"5 in",sea:["Summer"],reg:["MA","NY","PA","CA","TX"],col:"#7a5f44",feat:"A small, secretive wren of cattail and reed marshes, with bold white back-streaks and a white eyebrow; clings sideways to stems. Males build many dummy nests.",voice:"A reedy, mechanical, rattling gurgle."},
"blue-gray-gnatcatcher":{name:"Blue-gray Gnatcatcher",sci:"Polioptila caerulea",fam:"Gnatcatchers",r:"Uncommon",sz:"4.25 in",sea:["Summer"],reg:["MA","NY","PA","CA","TX","FL"],col:"#8a96a8",feat:"A tiny, slender, blue-gray bird with a white eye-ring and a long, white-edged tail it flicks constantly. Forages actively in the canopy with a wheezy voice.",voice:"A thin, wheezy, nasal 'spee' or 'pwee', often repeated."},
"wood-thrush":{name:"Wood Thrush",sci:"Hylocichla mustelina",fam:"Thrushes",r:"Uncommon",sz:"7.75 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#9a5f3a",feat:"A plump woodland thrush, warm rufous above (brightest on the head) with bold round black spots on a white breast. A bird of moist mature deciduous forest.",voice:"An ethereal, flute-like 'ee-oh-lay' with a final reedy trill."},
"veery":{name:"Veery",sci:"Catharus fuscescens",fam:"Thrushes",r:"Uncommon",sz:"7 in",sea:["Summer"],reg:["MA","NY","PA"],col:"#a06a44",feat:"A warm cinnamon-brown thrush with only faint, blurry spotting on a washed buff breast. Breeds in damp, shrubby deciduous woods; shy and ground-loving.",voice:"A breezy, downward-spiraling cascade of 'veer-veer-veer' notes."},
"brown-thrasher":{name:"Brown Thrasher",sci:"Toxostoma rufum",fam:"Mockingbirds & Thrashers",r:"Uncommon",sz:"11.5 in",sea:["Summer","Year-round"],reg:["MA","NY","PA","TX","FL"],col:"#9a5a33",feat:"A large, rusty-brown mimic with bold dark streaking below, a long tail, and a yellow eye. Skulks in dense thickets and hedgerows, foraging on the ground.",voice:"A long series of musical phrases, each typically repeated twice."},
"eastern-towhee":{name:"Eastern Towhee",sci:"Pipilo erythrophthalmus",fam:"New World Sparrows",r:"Common",sz:"8.5 in",sea:["Summer","Year-round"],reg:["MA","NY","PA","TX","FL"],col:"#3a2a2a",feat:"A large, boldly patterned sparrow; the male has a black hood and back, rufous sides, and a white belly, with a red eye. Rummages noisily in leaf litter at brushy edges.",voice:"A ringing 'drink-your-teeeea' and an emphatic 'chewink!' call."},
"chipping-sparrow":{name:"Chipping Sparrow",sci:"Spizella passerina",fam:"New World Sparrows",r:"Common",sz:"5.5 in",sea:["Summer"],reg:["MA","NY","PA","CA","TX","FL"],col:"#9a6a4a",feat:"A small, slim sparrow with a bright rufous cap, a white eyebrow, and a black eye-line in breeding plumage. A common bird of lawns, parks, and conifer edges.",voice:"A dry, mechanical trill on one pitch."},
"field-sparrow":{name:"Field Sparrow",sci:"Spizella pusilla",fam:"New World Sparrows",r:"Uncommon",sz:"5.75 in",sea:["Summer","Year-round"],reg:["MA","NY","PA","TX"],col:"#a06a4a",feat:"A small, plain sparrow with a rusty cap, a bold white eye-ring, and a pink bill, giving it a gentle expression. Favors overgrown fields and brushy pastures.",voice:"A series of clear, sweet whistles accelerating like a bouncing ball."},
"swamp-sparrow":{name:"Swamp Sparrow",sci:"Melospiza georgiana",fam:"New World Sparrows",r:"Uncommon",sz:"5.75 in",sea:["Summer","Migration"],reg:["MA","NY","PA"],col:"#7a5a3a",feat:"A dark, richly colored sparrow with a rusty cap and wings, gray face and breast, and a white throat. Skulks in cattail marshes and wet shrubby edges.",voice:"A slow, musical trill, sweeter and slower than a Chipping Sparrow's."},
"white-throated-sparrow":{name:"White-throated Sparrow",sci:"Zonotrichia albicollis",fam:"New World Sparrows",r:"Common",sz:"6.75 in",sea:["Winter","Migration","Year-round"],reg:["MA","NY","PA"],col:"#7a6a55",feat:"A crisp sparrow with a bright white throat, black-and-white (or tan) head stripes, and a yellow spot before the eye. An abundant winter feeder bird in the Northeast.",voice:"A clear, wavering whistle: 'oh-sweet-canada-canada' or 'old-Sam-Peabody'."},
"saltmarsh-sparrow":{name:"Saltmarsh Sparrow",sci:"Ammospiza caudacuta",fam:"New World Sparrows",r:"Uncommon",sz:"5 in",sea:["Summer"],reg:["MA","NY","PA"],col:"#9a7a4a",feat:"A secretive sparrow with a bright orange face triangle framing gray cheeks, and fine streaks below. Restricted to tidal saltmarshes; a globally vulnerable species.",voice:"A faint, wheezy, hissing 'tshhhh', easily missed."},
"seaside-sparrow":{name:"Seaside Sparrow",sci:"Ammospiza maritima",fam:"New World Sparrows",r:"Uncommon",sz:"6 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#6a6a55",feat:"A dingy, dark gray saltmarsh sparrow with a yellow spot before the eye and a long, spike-like bill. Clings to spartina stems in coastal marshes.",voice:"A buzzy, wheezing 'tup-tup-zhreeeee', like a distant Red-winged Blackbird."},
"bobolink":{name:"Bobolink",sci:"Dolichonyx oryzivorus",fam:"Blackbirds & Orioles",r:"Uncommon",sz:"7 in",sea:["Summer"],reg:["MA","NY","PA"],col:"#2a2a2a",feat:"A grassland blackbird; the breeding male is black below with a buff nape and white back and rump, looking like a bird in a backwards tuxedo. Nests in hayfields.",voice:"A bubbling, tumbling, metallic jangle given in display flight."},
"eastern-meadowlark":{name:"Eastern Meadowlark",sci:"Sturnella magna",fam:"Blackbirds & Orioles",r:"Uncommon",sz:"9.5 in",sea:["Year-round","Summer"],reg:["MA","NY","PA","TX","FL"],col:"#d4b020",feat:"A chunky grassland bird with a bright yellow breast crossed by a bold black V, and white outer tail feathers that flash in flight. Sings from fenceposts in open meadows.",voice:"A clear, plaintive, slurred whistle: 'spring-of-the-yeeear'."},
"common-grackle":{name:"Common Grackle",sci:"Quiscalus quiscula",fam:"Blackbirds & Orioles",r:"Common",sz:"12.5 in",sea:["Year-round","Summer"],reg:["MA","NY","PA","TX","FL"],col:"#2a3a3a",feat:"A long-tailed blackbird with a glossy iridescent head, a pale staring eye, and a keel-shaped tail in flight. Forages boldly in flocks on lawns and farm fields.",voice:"A harsh, rising, rusty-hinge 'readle-eak' and sharp 'chuck' notes."},
"brown-headed-cowbird":{name:"Brown-headed Cowbird",sci:"Molothrus ater",fam:"Blackbirds & Orioles",r:"Common",sz:"7.5 in",sea:["Year-round","Summer"],reg:["MA","NY","PA","CA","TX","FL"],col:"#3a2a2a",feat:"A small, stout-billed blackbird; the male is glossy black with a brown head, the female plain gray-brown. A brood parasite that lays its eggs in other birds' nests.",voice:"A liquid, gurgling 'glug-glug-glee' and high, whistled flight notes."},
"orchard-oriole":{name:"Orchard Oriole",sci:"Icterus spurius",fam:"Blackbirds & Orioles",r:"Uncommon",sz:"7.25 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#8a3a22",feat:"A small oriole; the adult male is deep brick-chestnut and black rather than orange. Favors open woodlands, orchards, and shade trees near water.",voice:"A fast, rich, downslurred warble ending in a buzzy note."},
"scarlet-tanager":{name:"Scarlet Tanager",sci:"Piranga olivacea",fam:"Cardinals & Allies",r:"Uncommon",sz:"7 in",sea:["Summer"],reg:["MA","NY","PA","TX"],col:"#d42a1a",feat:"A bird of the forest canopy; the breeding male is brilliant scarlet with jet-black wings and tail. A stunning but easily overlooked treetop dweller.",voice:"A burry, robin-like song; a distinctive 'chick-burr' call."},
"indigo-bunting":{name:"Indigo Bunting",sci:"Passerina cyanea",fam:"Cardinals & Allies",r:"Uncommon",sz:"5.5 in",sea:["Summer"],reg:["MA","NY","PA","TX","FL"],col:"#2a4a9a",feat:"A small finch-like songbird; the breeding male is entirely brilliant blue, while the female is plain warm brown. Sings from wires and treetops at woodland edges.",voice:"A bright, paired warble: 'sweet-sweet, where-where, here-here'."},
"purple-finch":{name:"Purple Finch",sci:"Haemorhous purpureus",fam:"Finches",r:"Uncommon",sz:"6 in",sea:["Year-round","Winter","Migration"],reg:["MA","NY","PA"],col:"#a03a55",feat:"A stocky finch; the male is washed in raspberry-red over the head, back, and breast, 'like a sparrow dipped in wine'. Breeds in conifers, irrupting to feeders in winter.",voice:"A rich, warbling, bubbly song; a sharp metallic 'tick' in flight."},
"american-redstart":{name:"American Redstart",sci:"Setophaga ruticilla",fam:"New World Warblers",r:"Common",sz:"5.25 in",sea:["Summer"],reg:["MA","NY","PA","TX"],col:"#e06a1a",feat:"An active warbler that fans its tail and droops its wings to flush insects; the male is black with brilliant orange patches on the wings, tail, and sides.",voice:"A high, variable series of sweet notes, often ending with a downslur."},
"common-yellowthroat":{name:"Common Yellowthroat",sci:"Geothlypis trichas",fam:"New World Warblers",r:"Common",sz:"5 in",sea:["Summer"],reg:["MA","NY","PA","CA","TX","FL"],col:"#d4b020",feat:"A skulking warbler of marshes and brushy fields; the male wears a broad black mask and a bright yellow throat. Bounces through dense low cover.",voice:"A rolling, repeated 'witchety-witchety-witchety'."},
"black-and-white-warbler":{name:"Black-and-white Warbler",sci:"Mniotilta varia",fam:"New World Warblers",r:"Common",sz:"5.25 in",sea:["Summer","Migration"],reg:["MA","NY","PA","TX","FL"],col:"#2a2a2a",feat:"A boldly black-and-white striped warbler that creeps along trunks and branches like a nuthatch. One of the earliest warblers to return in spring.",voice:"A high, thin, squeaky 'weesy-weesy-weesy', like a turning wheel."},
"ovenbird":{name:"Ovenbird",sci:"Seiurus aurocapilla",fam:"New World Warblers",r:"Common",sz:"6 in",sea:["Summer"],reg:["MA","NY","PA","TX"],col:"#6a7a4a",feat:"A plump, ground-walking warbler with an orange crown stripe bordered in black, a white eye-ring, and a spotted breast. Walks deliberately on the leaf-littered forest floor.",voice:"A ringing, accelerating 'teacher-TEACHER-TEACHER'."},
"black-throated-green-warbler":{name:"Black-throated Green Warbler",sci:"Setophaga virens",fam:"New World Warblers",r:"Uncommon",sz:"5 in",sea:["Summer","Migration"],reg:["MA","NY","PA"],col:"#3a5a2a",feat:"A warbler with a bright yellow face, an olive-green crown, and a black throat and bib. Forages high in conifers and mixed woods.",voice:"A buzzy, drawling 'zee-zee-zee-zoo-zee'."},
"black-throated-blue-warbler":{name:"Black-throated Blue Warbler",sci:"Setophaga caerulescens",fam:"New World Warblers",r:"Uncommon",sz:"5.25 in",sea:["Summer","Migration"],reg:["MA","NY","PA"],col:"#2a3a7a",feat:"A striking warbler; the male is deep blue above with a black face and flanks and a white belly, plus a small white wing-square. Breeds in shrubby understory of northern forests.",voice:"A husky, rising 'zur-zur-zur-zree'."},
"magnolia-warbler":{name:"Magnolia Warbler",sci:"Setophaga magnolia",fam:"New World Warblers",r:"Uncommon",sz:"5 in",sea:["Summer","Migration"],reg:["MA","NY","PA"],col:"#d4b020",feat:"A handsome warbler with a yellow underside heavily streaked in black ('necklace'), gray hood, and a broad white tail-band. Common in spruce-fir and as a migrant.",voice:"A short, sweet 'weety-weety-weeteo'."},
"chestnut-sided-warbler":{name:"Chestnut-sided Warbler",sci:"Setophaga pensylvanica",fam:"New World Warblers",r:"Uncommon",sz:"5 in",sea:["Summer"],reg:["MA","NY","PA"],col:"#9a5a33",feat:"A warbler with a lime-yellow cap, white underparts, and bold chestnut flanks in breeding males. Favors second-growth and shrubby clearings.",voice:"A bright 'pleased-pleased-pleased-to-MEET-cha'."},
"northern-parula":{name:"Northern Parula",sci:"Setophaga americana",fam:"New World Warblers",r:"Uncommon",sz:"4.5 in",sea:["Summer","Migration"],reg:["MA","NY","PA","TX","FL"],col:"#5a7a9a",feat:"A tiny, short-tailed warbler, blue-gray above with a yellow-green back patch, two white wing-bars, and a yellow throat crossed by a rusty band. Nests in mossy, lichen-draped trees.",voice:"A rising, buzzy trill that snaps over at the end: 'zeeeeee-up'."},
"pine-warbler":{name:"Pine Warbler",sci:"Setophaga pinus",fam:"New World Warblers",r:"Uncommon",sz:"5.5 in",sea:["Summer","Year-round"],reg:["MA","NY","PA","TX","FL"],col:"#8a9a4a",feat:"A plain, sturdy yellow-and-olive warbler with two white wing-bars and a faint streaked breast. True to its name, it stays in pines and visits feeders in cold weather.",voice:"A musical, even trill, sweeter and slower than a Chipping Sparrow's."},
"prairie-warbler":{name:"Prairie Warbler",sci:"Setophaga discolor",fam:"New World Warblers",r:"Uncommon",sz:"4.75 in",sea:["Summer"],reg:["MA","NY","PA","FL"],col:"#d4b020",feat:"A small yellow warbler with black face crescents and bold black streaks along the sides, often bobbing its tail. Favors scrubby old fields and pine barrens.",voice:"A rising series of buzzy 'zee' notes climbing the scale."},
"canada-warbler":{name:"Canada Warbler",sci:"Cardellina canadensis",fam:"New World Warblers",r:"Uncommon",sz:"5.25 in",sea:["Summer","Migration"],reg:["MA","NY","PA"],col:"#5a6a7a",feat:"A gray-backed warbler with a bright yellow breast crossed by a 'necklace' of black streaks, plus bold white spectacles. Breeds in wet, shrubby forest understory.",voice:"A sharp 'chip' followed by a rich, sputtering jumble of notes."},
"acadian-flycatcher":{name:"Acadian Flycatcher",sci:"Empidonax virescens",fam:"Tyrant Flycatchers",r:"Common",sz:"6 in",sea:["Summer"],reg:["PA"],col:"#8a9a5b",feat:"Small olive-green Empidonax with a whitish throat, bold buffy-white eyering, and broad yellowish wingbars; greener-backed and longer-billed than similar empids, favoring shady forest understory near streams.",voice:"An explosive, sneezy 'peet-sah' given from the mid-canopy."},
"american-avocet":{name:"American Avocet",sci:"Recurvirostra americana",fam:"Stilts & Avocets",r:"Rare",sz:"18 in",sea:["Spring","Fall"],reg:["PA"],col:"#c68642",feat:"Tall, elegant shorebird with a long, thin upturned bill and bold black-and-white wing pattern; breeding birds show a rusty-cinnamon head and neck, nonbreeding birds pale gray. Long bluish legs.",voice:"A loud, sharp 'wheet' or 'kleet' repeated when agitated."},
"american-barn-owl":{name:"American Barn Owl",sci:"Tyto furcata",fam:"Owls",r:"Uncommon",sz:"16 in",sea:["Year-round"],reg:["PA"],col:"#e8d8b0",feat:"Pale, long-legged owl with a white heart-shaped facial disk, golden-buff upperparts flecked with gray, and unmarked whitish underparts; ghostly in flight with no ear tufts.",voice:"A harsh, drawn-out raspy shriek rather than a hoot."},
"american-bittern":{name:"American Bittern",sci:"Botaurus lentiginosus",fam:"Herons",r:"Uncommon",sz:"28 in",sea:["Spring","Summer","Fall"],reg:["PA"],col:"#a07d4b",feat:"Stocky, secretive brown heron of dense marshes; streaked buff-and-brown body with a black neck stripe; often freezes with bill pointed skyward to blend with the reeds.",voice:"A deep, resonant pumping 'oonk-a-lunk', like a distant water pump."},
"american-coot":{name:"American Coot",sci:"Fulica americana",fam:"Rails, Gallinules & Coots",r:"Common",sz:"15 in",sea:["Fall","Winter","Spring"],reg:["PA"],col:"#3a3a3a",feat:"Slate-gray, duck-like waterbird with a chalky-white bill and forehead shield; swims and dives in open water, pumping its head, and shows lobed greenish toes on land.",voice:"A variety of clucks, cackles, and grunting 'kuk-kuk' notes."},
"american-white-pelican":{name:"American White Pelican",sci:"Pelecanus erythrorhynchos",fam:"Pelicans",r:"Rare",sz:"62 in",sea:["Spring","Fall"],reg:["PA"],col:"#f2efe9",feat:"Huge white bird with black flight feathers and an enormous orange-yellow bill; soars in flocks on broad wings and feeds by dipping while swimming, never plunge-diving.",voice:"Largely silent away from colonies; adults give low grunts."},
"black-tern":{name:"Black Tern",sci:"Chlidonias niger",fam:"Gulls & Terns",r:"Uncommon",sz:"10 in",sea:["Spring","Fall"],reg:["PA"],col:"#4a4f55",feat:"Small marsh tern; breeding adults have a black head and body with gray wings and white undertail, while migrants are pale below with a dark cap and shoulder smudge. Buoyant, dipping flight over water.",voice:"A sharp, high 'kip' or 'kik'."},
"black-bellied-whistling-duck":{name:"Black-bellied Whistling-Duck",sci:"Dendrocygna autumnalis",fam:"Ducks & Geese",r:"Rare",sz:"20 in",sea:["Spring","Summer","Fall"],reg:["PA"],col:"#a94b32",feat:"Long-legged, goose-like duck with a bright coral-pink bill, chestnut breast and back, black belly, and a bold white wing patch obvious in flight; often perches in trees.",voice:"A high, whistled 'pe-che-che-ne' given in flight."},
"black-billed-cuckoo":{name:"Black-billed Cuckoo",sci:"Coccyzus erythropthalmus",fam:"Cuckoos",r:"Uncommon",sz:"12 in",sea:["Summer"],reg:["PA"],col:"#9c8a6a",feat:"Slim, long-tailed cuckoo, brown above and white below, with an all-dark bill, a narrow red eyering, and only small white tail-tip spots; skulks in dense foliage.",voice:"A soft, rhythmic 'cu-cu-cu' in groups of three or four notes."},
"black-necked-stilt":{name:"Black-necked Stilt",sci:"Himantopus mexicanus",fam:"Stilts & Avocets",r:"Rare",sz:"14 in",sea:["Spring","Summer"],reg:["PA"],col:"#222222",feat:"Striking wader with glossy black upperparts, clean white underparts, and extremely long, thin pink-red legs; needle-like straight black bill.",voice:"A loud, insistent yapping 'kek-kek-kek'."},
"blackburnian-warbler":{name:"Blackburnian Warbler",sci:"Setophaga fusca",fam:"New World Warblers",r:"Common",sz:"5 in",sea:["Spring","Summer","Fall"],reg:["PA"],col:"#ff6a1a",feat:"Breeding male has a blazing flame-orange throat and face framed in black, with white wing patches; females and fall birds paler yellow-orange but keep the dark cheek triangle and pale back stripes.",voice:"A very high, thin, rising 'zip-zip-titi-tseeee' near the limit of hearing."},
"blue-grosbeak":{name:"Blue Grosbeak",sci:"Passerina caerulea",fam:"Cardinals & Allies",r:"Uncommon",sz:"7 in",sea:["Summer"],reg:["PA"],col:"#2a4b8d",feat:"Chunky, large-billed bird; male deep blue with two rusty-brown wingbars, female warm cinnamon-brown with similar wingbars. Often twitches and spreads its tail.",voice:"A rich, warbling series of rising-and-falling phrases; call a loud metallic 'chink'."},
"blue-winged-warbler":{name:"Blue-winged Warbler",sci:"Vermivora cyanoptera",fam:"New World Warblers",r:"Uncommon",sz:"5 in",sea:["Summer"],reg:["PA"],col:"#e6d24a",feat:"Bright yellow warbler with blue-gray wings crossed by two white wingbars and a thin black line through the eye; sings from shrubby old fields and forest edges.",voice:"A buzzy, insect-like two-parted 'beee-bzzz', the second note lower and raspier."},
"barnacle-goose":{name:"Barnacle Goose",sci:"Branta leucopsis",fam:"Ducks & Geese",r:"Rare",sz:"27 in",sea:["Fall","Winter","Spring"],reg:["PA"],col:"#c8cacc",feat:"Small, boldly marked goose with a creamy-white face, black crown, neck and breast, and silvery barred gray back; usually found among flocks of Canada Geese.",voice:"Short, barking notes, higher-pitched than a Canada Goose."},
"cape-may-warbler":{name:"Cape May Warbler",sci:"Setophaga tigrina",fam:"New World Warblers",r:"Uncommon",sz:"5 in",sea:["Spring","Fall"],reg:["PA"],col:"#e0b23a",feat:"Breeding male has a chestnut cheek patch, yellow neck and heavily streaked yellow underparts, and a white wing patch; females and fall birds duller but keep fine breast streaking and a yellowish neck patch. Thin, slightly downcurved bill.",voice:"An extremely high, thin, even 'seet-seet-seet-seet'."},
"carolina-chickadee":{name:"Carolina Chickadee",sci:"Poecile carolinensis",fam:"Tits & Chickadees",r:"Common",sz:"5 in",sea:["Year-round"],reg:["PA"],col:"#4d4d4d",feat:"Small gray songbird with a black cap and bib and white cheeks; very like Black-capped Chickadee but slightly smaller, with cleaner gray wings lacking bold white feather edging, and found across southern PA.",voice:"A higher, faster four-note 'fee-bee-fee-bay' and a rapid 'chick-a-dee-dee-dee'."},
"caspian-tern":{name:"Caspian Tern",sci:"Hydroprogne caspia",fam:"Gulls & Terns",r:"Uncommon",sz:"21 in",sea:["Spring","Fall"],reg:["PA"],col:"#c0392b",feat:"Largest tern, gull-sized, with a massive blood-red bill, black cap, pale gray back, and dark wingtips visible from below; cap streaked in nonbreeding plumage.",voice:"A loud, harsh, low 'kraaah', deeper than other terns."},
"cerulean-warbler":{name:"Cerulean Warbler",sci:"Setophaga cerulea",fam:"New World Warblers",r:"Uncommon",sz:"5 in",sea:["Summer"],reg:["PA"],col:"#6fa8dc",feat:"Small, short-tailed warbler; male sky-blue above and white below with a thin blue-black breast band and two white wingbars, female bluish-green with a pale eyebrow. Forages high in mature deciduous canopy.",voice:"A buzzy, rising series 'zray-zray-zray-zreeee' ending on a high trill."},
"chuck-wills-widow":{name:"Chuck-will's-widow",sci:"Antrostomus carolinensis",fam:"Nightjars & Allies",r:"Rare",sz:"12 in",sea:["Summer"],reg:["PA"],col:"#7a6247",feat:"Large, cryptically mottled brown nightjar of southern woodland edges; bigger and warmer buff-brown than Whip-poor-will, with a buffy throat; nocturnal and best detected by voice.",voice:"A rhythmic, whistled 'chuck-will's-WIDow' repeated at night."},
"clay-colored-sparrow":{name:"Clay-colored Sparrow",sci:"Spizella pallida",fam:"New World Sparrows",r:"Rare",sz:"5.5 in",sea:["Spring","Fall"],reg:["PA"],col:"#c2a878",feat:"Small, crisp pale sparrow with a striped crown split by a pale central stripe, a brown ear patch outlined in black, and an unstreaked buffy-gray nape and breast.",voice:"A series of low, flat, insect-like buzzes, 'bzzz bzzz bzzz'."},
"common-gallinule":{name:"Common Gallinule",sci:"Gallinula galeata",fam:"Rails, Gallinules & Coots",r:"Uncommon",sz:"14 in",sea:["Spring","Summer","Fall"],reg:["PA"],col:"#33403f",feat:"Slate-gray marsh bird with a brownish back, bold white flank stripe and white undertail, and a bright red bill with a yellow tip; long yellow-green legs. Swims and walks over floating vegetation.",voice:"A loud, laughing, chicken-like series of clucks and squawks."},
"common-nighthawk":{name:"Common Nighthawk",sci:"Chordeiles minor",fam:"Nightjars & Allies",r:"Uncommon",sz:"9 in",sea:["Summer","Fall"],reg:["PA"],col:"#5c5346",feat:"Slim, long-winged aerial bird, mottled gray-brown, with a bold white bar across each pointed wing; flies erratically at dawn, dusk, and over lit areas catching insects.",voice:"A nasal, buzzy 'peent' in flight; display dives end in a hollow wing-boom."},
"connecticut-warbler":{name:"Connecticut Warbler",sci:"Oporornis agilis",fam:"New World Warblers",r:"Rare",sz:"5.5 in",sea:["Fall","Spring"],reg:["PA"],col:"#96a07c",feat:"Chunky, long-undertailed warbler with a complete bold white eyering, a gray hood (brownish in females and immatures), olive back, and yellow belly; walks deliberately on the ground in dense cover.",voice:"A loud, ringing, repeated 'chippy-chippy-chippy'."},
"dickcissel":{name:"Dickcissel",sci:"Spiza americana",fam:"Cardinals & Allies",r:"Uncommon",sz:"6 in",sea:["Summer"],reg:["PA"],col:"#d9b93f",feat:"Sparrow-like grassland bird resembling a tiny meadowlark; male has a gray head, yellow breast with a black V-shaped bib, and a rusty shoulder patch; females duller with a yellow wash. Heavy pale bill.",voice:"A dry, buzzy, stuttering 'dick-dick-cissel' from a weed stalk."},
"eared-grebe":{name:"Eared Grebe",sci:"Podiceps nigricollis",fam:"Grebes",r:"Rare",sz:"13 in",sea:["Fall","Winter","Spring"],reg:["PA"],col:"#333333",feat:"Small grebe with a thin uptilted bill, peaked forehead, and a high fluffy rear; nonbreeding birds are dusky with a grubby gray neck, white ear patch, and red eyes. Breeding birds show golden ear tufts.",voice:"A rising, mellow 'poo-eee' whistle; mostly silent in migration."},
"eastern-whip-poor-will":{name:"Eastern Whip-poor-will",sci:"Antrostomus vociferus",fam:"Nightjars & Allies",r:"Uncommon",sz:"9.5 in",sea:["Summer"],reg:["PA"],col:"#6b5a44",feat:"Cryptically mottled gray-brown nightjar of dry woodlands; rounded wings and a long rounded tail with white corners in the male. Nocturnal, usually heard not seen; eyes shine red in a light.",voice:"An endlessly repeated, whistled 'whip-poor-WILL' at dusk and through the night."},
"eurasian-collared-dove":{name:"Eurasian Collared-Dove",sci:"Streptopelia decaocto",fam:"Pigeons & Doves",r:"Rare",sz:"13 in",sea:["Year-round"],reg:["PA"],col:"#c9bfb0",feat:"Pale sandy-gray dove, larger and chunkier than a Mourning Dove, with a squared-off tail and a thin black half-collar across the back of the neck; broad white tail corners flash in flight.",voice:"A repetitive three-note 'coo-COO-cook' and a nasal 'hwaah' in flight."},
"evening-grosbeak":{name:"Evening Grosbeak",sci:"Hesperiphona vespertina",fam:"Finches",r:"Uncommon",sz:"8 in",sea:["Winter","Migration"],reg:["PA"],col:"#E8B923",feat:"Large, stocky finch with a massive pale greenish bill. Male is golden yellow with a dark head, bold yellow brow, and big white wing patches; female is grayer with white wing markings.",voice:"Loud, ringing 'cleer' or 'peer' call notes; no true song, often a burry chatter."},
"fish-crow":{name:"Fish Crow",sci:"Corvus ossifragus",fam:"Crows & Jays",r:"Common",sz:"15 in",sea:["Year-round"],reg:["PA"],col:"#1C1C1C",feat:"Nearly identical to American Crow but slightly smaller and glossier; best told by voice. Found along rivers, coasts, and in towns.",voice:"A short, nasal 'uh-uh' or muffled 'caw,' often double-noted, unlike the clear caw of American Crow."},
"forsters-tern":{name:"Forster's Tern",sci:"Sterna forsteri",fam:"Gulls & Terns",r:"Uncommon",sz:"13 in",sea:["Migration","Fall"],reg:["PA"],col:"#D9DEE3",feat:"Pale gray-and-white tern with a black cap and orange bill tipped black in breeding plumage; non-breeders show a distinctive isolated black eye patch. Silvery primaries and a deeply forked tail.",voice:"A harsh, low nasal 'kyarr,' grating and lower than Common Tern."},
"franklins-gull":{name:"Franklin's Gull",sci:"Leucophaeus pipixcan",fam:"Gulls & Terns",r:"Rare",sz:"14 in",sea:["Migration","Fall"],reg:["PA"],col:"#808A96",feat:"Small hooded gull with a black head, bold white eye-arcs, and a gray back; in flight a white band separates the gray wing from white-tipped black wingtips. Non-breeders keep a dark half-hood.",voice:"A shrill, laughing 'kruk-kruk' and softer mewing notes."},
"golden-winged-warbler":{name:"Golden-winged Warbler",sci:"Vermivora chrysoptera",fam:"New World Warblers",r:"Uncommon",sz:"4.75 in",sea:["Spring","Summer","Migration"],reg:["PA"],col:"#C7B24A",feat:"Gray warbler with a yellow crown and yellow wing patch; male has a black throat and mask bordered by white. Female shows a paler gray face pattern.",voice:"A buzzy 'zee-bee-bee-bee,' the first note higher than the trailing buzzes."},
"grasshopper-sparrow":{name:"Grasshopper Sparrow",sci:"Ammodramus savannarum",fam:"New World Sparrows",r:"Uncommon",sz:"5 in",sea:["Spring","Summer"],reg:["PA"],col:"#B99A6B",feat:"Small, flat-headed, short-tailed grassland sparrow with a plain buffy breast, streaked back, and a pale central crown stripe; often a yellow-orange spot before the eye.",voice:"An insect-like, buzzy 'tik-tik-tzeeeee' resembling a grasshopper."},
"harriss-sparrow":{name:"Harris's Sparrow",sci:"Zonotrichia querula",fam:"New World Sparrows",r:"Rare",sz:"7.5 in",sea:["Winter"],reg:["PA"],col:"#7A6A55",feat:"Large sparrow with a black crown, face, and bib set off by a gray face and pink bill; winter birds show a buffier face and reduced black. Rusty-brown upperparts and streaked flanks.",voice:"A series of clear, quavering whistles on one pitch; call a sharp 'wink.'"},
"henslows-sparrow":{name:"Henslow's Sparrow",sci:"Centronyx henslowii",fam:"New World Sparrows",r:"Rare",sz:"5 in",sea:["Spring","Summer"],reg:["PA"],col:"#7E7A4E",feat:"Secretive grassland sparrow with a flat olive-green head, rusty wings, and fine dark streaks on a buffy breast; large pale bill.",voice:"A short, feeble, hiccup-like 'tse-lick,' among the least musical of bird songs."},

/* ---------- Build region -> bird list from each bird's reg array ---------- */
const ALL_REGION_BIRDS = {};
Object.keys(REGION_NAMES).forEach(code=>ALL_REGION_BIRDS[code]=[]);
Object.entries(BIRDS).forEach(([id,b])=>{ (b.reg||[]).forEach(code=>{ if(ALL_REGION_BIRDS[code]) ALL_REGION_BIRDS[code].push(id); }); });
// keep alphabetical by name within each region
Object.keys(ALL_REGION_BIRDS).forEach(code=>ALL_REGION_BIRDS[code].sort((a,b)=>BIRDS[a].name.localeCompare(BIRDS[b].name)));

/* ---------- Size & colour classification (for the Lists filters) ---------- */
const SIZE_BUCKETS=["Tiny (under 5 in)","Small (5–8 in)","Medium (8–14 in)","Large (14–24 in)","Very large (24 in +)"];
function sizeBucket(b){
  const n=parseFloat(String(b.sz||"").replace(/[^0-9.]/g,""));
  if(!isFinite(n)||!n)return null;
  if(n<5)return SIZE_BUCKETS[0];
  if(n<8)return SIZE_BUCKETS[1];
  if(n<14)return SIZE_BUCKETS[2];
  if(n<24)return SIZE_BUCKETS[3];
  return SIZE_BUCKETS[4];
}
const COLOR_OPTIONS=["Red","Orange","Yellow","Green","Blue","Purple","Brown","Gray","Black","White"];
function colorName(hex){
  const m=/^#?([0-9a-f]{6})$/i.exec(String(hex||""));
  if(!m)return null;
  const num=parseInt(m[1],16),r=(num>>16)/255,g=((num>>8)&255)/255,bl=(num&255)/255;
  const max=Math.max(r,g,bl),min=Math.min(r,g,bl),l=(max+min)/2,d=max-min;
  if(l>0.82&&d<0.12)return "White";
  if(l<0.16)return "Black";
  const s=d===0?0:d/(1-Math.abs(2*l-1));
  if(s<0.15)return "Gray";
  let h;
  if(d===0)h=0;
  else if(max===r)h=60*(((g-bl)/d)%6);
  else if(max===g)h=60*(((bl-r)/d)+2);
  else h=60*(((r-g)/d)+4);
  if(h<0)h+=360;
  if((h<45)&&l<0.45)return "Brown";
  if(h<15||h>=345)return "Red";
  if(h<45)return "Orange";
  if(h<70)return "Yellow";
  if(h<165)return "Green";
  if(h<255)return "Blue";
  if(h<290)return "Purple";
  if(h<345)return l<0.5?"Purple":"Red";
  return null;
}

/* ---------- Interactive US map box for the Lists tab ----------
   onPick(stateCode) is called when a state with a checklist is clicked. */
function buildUsMap(activeStateCode,onPick){
  const box=el(`<div class="us-map-box">
    <div class="us-map-head">
      <div><h3>Explore by state</h3><p class="tiny">Tap a highlighted state to open its checklist.</p></div>
      <div class="us-map-legend">
        <span><i class="sw loaded"></i> Tracking</span>
        <span><i class="sw avail"></i> Available</span>
        <span><i class="sw none"></i> No list yet</span>
      </div>
    </div>
    <div class="us-map-wrap">
      <svg class="us-map" viewBox="${US_MAP_VIEWBOX}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Map of the United States"></svg>
    </div>
  </div>`);
  const svg=box.querySelector(".us-map");
  Object.keys(US_STATE_PATHS).forEach(code=>{
    const hasList=!!(REGION_NAMES[code]||state.customRegions[code]);
    const loaded=state.loadedRegions.includes(code);
    const cls="st"+(hasList?(loaded?" loaded":" avail"):" none")+(code===activeStateCode?" active":"");
    const title=(REGION_NAMES[code]||code)+(hasList?(loaded?" — tracking":" — available"):" — no checklist yet");
    const p=document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d",US_STATE_PATHS[code]);
    p.setAttribute("class",cls);
    p.setAttribute("data-state",code);
    p.innerHTML=`<title>${esc(title)}</title>`;
    svg.appendChild(p);
  });
  svg.addEventListener("click",e=>{
    const p=e.target.closest("path[data-state]");if(!p)return;
    const code=p.getAttribute("data-state");
    if(REGION_NAMES[code]||state.customRegions[code]){onPick(code);}
    else{toast(`No checklist available for ${REGION_NAMES[code]||code} yet`);}
  });
  return box;
}

/* ============================================================
   IndexedDB — full-resolution images (Blobs)
   ============================================================ */
let _db=null;
function idb(){
  return new Promise((res,rej)=>{
    if(_db)return res(_db);
    const rq=indexedDB.open("birdmania_images",1);
    rq.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains("imgs"))db.createObjectStore("imgs");};
    rq.onsuccess=e=>{_db=e.target.result;res(_db);};
    rq.onerror=e=>rej(e);
  });
}
async function imgPut(blob){const id=uid();const db=await idb();return new Promise((res,rej)=>{const tx=db.transaction("imgs","readwrite");tx.objectStore("imgs").put(blob,id);tx.oncomplete=()=>res(id);tx.onerror=rej;});}
async function imgGet(id){const db=await idb();return new Promise((res,rej)=>{const tx=db.transaction("imgs","readonly");const r=tx.objectStore("imgs").get(id);r.onsuccess=()=>res(r.result||null);r.onerror=rej;});}
async function imgDel(id){if(!id)return;if(_objUrls[id]){URL.revokeObjectURL(_objUrls[id]);delete _objUrls[id];}const db=await idb();return new Promise((res)=>{const tx=db.transaction("imgs","readwrite");tx.objectStore("imgs").delete(id);tx.oncomplete=()=>res();tx.onerror=()=>res();});}
const _objUrls={};
async function imgUrl(id){
  if(!id)return null;
  if(_objUrls[id])return _objUrls[id];
  const blob=await imgGet(id);if(!blob)return null;
  const url=URL.createObjectURL(blob);_objUrls[id]=url;return url;
}

// Returns an <img>/<svg> markup string for a bird; tries user photo, then wiki cache, else svg.
function birdImageHTML(id,cls=""){
  const t=state.birdThumb&&state.birdThumb[id];
  if(t){
    if(t.kind==="svg")return birdSVG(id);
    if(t.kind==="user"&&t.ref)return `<img class="${cls}" data-userphoto="${t.ref}" alt="${esc(BIRDS[id].name)}" />`;
    if(t.kind==="url"&&t.src)return `<img class="${cls}" src="${esc(t.src)}" alt="${esc(BIRDS[id].name)}" onerror="this.outerHTML=birdSVG('${id}')"/>`;
  }
  const ph=state.birdPhotos[id];
  if(ph){return `<img class="${cls}" data-userphoto="${ph}" alt="${esc(BIRDS[id].name)}" />`;}
  const wc=state.wikiCache[id];
  if(wc&&wc.ok&&wc.thumb){return `<img class="${cls}" src="${esc(wc.thumb)}" alt="${esc(BIRDS[id].name)}" onerror="this.outerHTML=birdSVG('${id}')"/>`;}
  // unknown yet — render svg now, attempt async fetch to upgrade later
  fetchWiki(id);
  return birdSVG(id);
}

async function hydrateUserPhotos(root=document){
  const imgs=root.querySelectorAll('img[data-userphoto]');

}
// Fetch Wikipedia thumbnail (CORS-enabled REST API), cache result, re-render current view
const _wikiPending={};
async function fetchWiki(id){
  if(state.wikiCache[id]||_wikiPending[id])return;
  _wikiPending[id]=true;
  // some common names hit Wikipedia disambiguation pages (e.g. "Brant"); an optional `wiki` field overrides the lookup title
  const title=encodeURIComponent((BIRDS[id].wiki||BIRDS[id].name).replace(/ /g,"_"));
  try{
    const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${title}`,{headers:{Accept:"application/json"}});
    if(r.ok){
      const j=await r.json();
      const thumb=(j.originalimage&&j.originalimage.source)||(j.thumbnail&&j.thumbnail.source)||null;
      state.wikiCache[id]={thumb,page:j.content_urls&&j.content_urls.desktop?j.content_urls.desktop.page:null,ok:!!thumb};
    }else{state.wikiCache[id]={ok:false};}
  }catch(e){state.wikiCache[id]={ok:false};}
  save();
  // soft refresh of any visible card images for this bird
  upgradeBirdImages(id);
}
function upgradeBirdImages(id){
  const wc=state.wikiCache[id];if(!wc||!wc.ok||!wc.thumb)return;
  document.querySelectorAll(`[data-birdimg="${id}"]`).forEach(el=>{
    if(state.birdPhotos[id]||(state.birdThumb&&state.birdThumb[id]))return; // user photo / chosen thumbnail wins
    el.innerHTML=`<img src="${esc(wc.thumb)}" alt="${esc(BIRDS[id].name)}" onerror="this.outerHTML=birdSVG('${id}')"/>`;
  });
}

/* ---- Multiple identification photos from Wikimedia Commons (freely licensed) ----
   Captions (sex / age / plumage) are derived from each image's file title, which on
   Commons very often encodes this info (e.g. "Mallard male.jpg", "...juvenile..."). */
function captionFromTitle(title,birdName){
  const t=" "+title.toLowerCase().replace(/[._-]/g," ")+" ";
  const parts=[];
  let sex="";
  if(/[ (]male\b|♂|\bdrake\b|\bcock\b/.test(t))sex="Male";
  else if(/[ (]female\b|♀|\bhen\b/.test(t))sex="Female";
  let age="";
  if(/\bjuvenile|\bjuv\b|\bfledgling|\bchick|\bnestling/.test(t))age="Juvenile";
  else if(/\bimmature|\bimm\b|\bsubadult|\b1st (winter|year)|\bfirst (winter|year)|\byearling/.test(t))age="Immature";
  else if(/\badult\b|\bad\b/.test(t))age="Adult";
  let plum="";
  if(/non[- ]?breeding|\bwinter\b|\bnonbreeding|\beclipse\b/.test(t))plum="non-breeding";
  else if(/\bbreeding\b|\bsummer\b|\bnuptial\b|\balternate\b/.test(t))plum="breeding";
  if(sex)parts.push(sex);
  if(age&&!(sex&&age==="Adult"))parts.push(age.toLowerCase());
  else if(age==="Adult"&&!sex)parts.push("Adult");
  if(plum)parts.push(plum+" plumage");
  if(parts.length===0)return "Identification photo";
  let cap=parts.join(", ");
  return cap.charAt(0).toUpperCase()+cap.slice(1);
}
const _galPending={};
async function fetchBirdImages(id){
  if((state.galleryCache[id]&&state.galleryCache[id].ok)||_galPending[id])return state.galleryCache[id];
  _galPending[id]=true;
  const b=BIRDS[id];
  const api="https://commons.wikimedia.org/w/api.php?origin=*&format=json&action=query"
    +"&generator=search&gsrnamespace=6&gsrlimit=20&gsrsearch="+encodeURIComponent('"'+b.sci+'"')
    +"&prop=imageinfo&iiprop=url|extmetadata&iiurlwidth=480";
  try{
    const r=await fetch(api,{headers:{Accept:"application/json"}});
    if(r.ok){
      const j=await r.json();
      const pages=(j.query&&j.query.pages)?Object.values(j.query.pages):[];
      const bad=/(map|range|distribution|locator|\begg|nest$|nestbox|stamp|coin|skull|skeleton|bone|feather detail|diagram|chart|sound|spectrogram|\.svg|\.ogg|\.oga|\.wav|\.webm|\.gif)/i;
      const seen=new Set();
      const photos=[];
      pages.sort((a,b)=>(a.index||0)-(b.index||0)).forEach(p=>{
        const ii=p.imageinfo&&p.imageinfo[0];if(!ii)return;
        const title=(p.title||"").replace(/^File:/,"");
        if(bad.test(title))return;
        if(!/\.(jpe?g|png)$/i.test(title))return;
        const src=ii.thumburl||ii.url;const full=ii.url;
        if(!src||seen.has(src))return;seen.add(src);
        const em=ii.extmetadata||{};
        const credit=(em.Artist&&em.Artist.value||"").replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim().slice(0,80);
        photos.push({src,full,caption:captionFromTitle(title,b.name),credit,page:ii.descriptionurl||null});
      });
      state.galleryCache[id]={ok:photos.length>0,photos:photos.slice(0,8)};
    }else{state.galleryCache[id]={ok:false,photos:[]};}
  }catch(e){state.galleryCache[id]={ok:false,photos:[]};}
  delete _galPending[id];
  save();
  return state.galleryCache[id];
}

function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));}
function el(html){const t=document.createElement("template");t.innerHTML=html.trim();return t.content.firstElementChild;}
function fmtDate(ts){return new Date(ts).toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"});}
function fmtDur(ms){const s=Math.floor(ms/1000);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return (h?h+":":"")+String(m).padStart(h?2:1,"0")+":"+String(sec).padStart(2,"0");}
function toast(msg){const r=document.getElementById("toast-root");const t=el(`<div class="toast">${esc(msg)}</div>`);r.appendChild(t);setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity .3s";setTimeout(()=>t.remove(),300);},2200);}

function openLightbox(src,title,desc,nav){
  const lb=el(`<div class="lightbox"><button class="lb-close" aria-label="Close">&times;</button>
    <img src="${esc(src)}" alt="${esc(title||"")}"/>
    <div class="lb-cap"${(title||desc)?"":' style="display:none"'}>${title?`<h3>${esc(title)}</h3>`:""}${desc?`<p>${esc(desc)}</p>`:""}</div></div>`);
  lb.querySelector(".lb-close").onclick=closeLightbox;
  lb.addEventListener("mousedown",e=>{if(e.target===lb)closeLightbox();});
  document.getElementById("modal-root").appendChild(lb);
  // optional navigation / deletion across an ordered list of images (e.g. the portfolio)
  if(nav&&nav.items&&nav.items.length&&typeof nav.resolve==="function"){
    const imgEl=lb.querySelector("img"),capEl=lb.querySelector(".lb-cap");
    const canDelete=typeof nav.onDelete==="function";
    let idx=nav.index||0,token=0;
    const count=el(`<div class="lb-count"></div>`);lb.appendChild(count);
    function paint(){count.textContent=nav.items.length>1?`${idx+1} / ${nav.items.length}`:"";}
    async function show(i){
      if(!nav.items.length){closeLightbox();return;}
      idx=(i%nav.items.length+nav.items.length)%nav.items.length;
      const my=++token;paint();
      const r=await nav.resolve(nav.items[idx]);
      if(my!==token||!document.body.contains(lb)||!r)return;   // a newer request superseded this one
      if(r.src){imgEl.src=r.src;imgEl.alt=r.title||"";}
      const has=r.title||r.desc;
      capEl.innerHTML=`${r.title?`<h3>${esc(r.title)}</h3>`:""}${r.desc?`<p>${esc(r.desc)}</p>`:""}`;
      capEl.style.display=has?"":"none";
    }
    // prev / next (only meaningful with more than one image)
    const prev=el(`<button class="lb-nav prev" aria-label="Previous photo">&lsaquo;</button>`);
    const next=el(`<button class="lb-nav next" aria-label="Next photo">&rsaquo;</button>`);
    prev.onclick=e=>{e.stopPropagation();show(idx-1);};
    next.onclick=e=>{e.stopPropagation();show(idx+1);};
    lb.appendChild(prev);lb.appendChild(next);
    const syncNav=()=>{const m=nav.items.length>1;prev.style.display=m?"":"none";next.style.display=m?"":"none";};
    syncNav();
    // delete (inline confirm — confirmDialog can't be used here: its overlay sits below the lightbox and closeModal would wipe it)
    let confirmBar=null;
    if(canDelete){
      const del=el(`<button class="lb-del" aria-label="Delete photo" title="Delete photo">🗑</button>`);
      del.onclick=e=>{
        e.stopPropagation();
        if(confirmBar)return;
        confirmBar=el(`<div class="lb-confirm"><span>Delete this photo?</span><button class="no">Cancel</button><button class="yes">Delete</button></div>`);
        confirmBar.querySelector(".no").onclick=ev=>{ev.stopPropagation();confirmBar.remove();confirmBar=null;};
        confirmBar.querySelector(".yes").onclick=async ev=>{
          ev.stopPropagation();
          const it=nav.items[idx];
          confirmBar.remove();confirmBar=null;
          try{await nav.onDelete(it);}catch(err){}   // removes from state + storage, refreshes the grid behind
          nav.items.splice(idx,1);
          if(!nav.items.length){closeLightbox();return;}
          syncNav();
          show(idx);   // show() re-mods idx into the new range
        };
        lb.appendChild(confirmBar);
      };
      lb.appendChild(del);
    }
    lb._navKey=function(e){
      if(confirmBar){if(e.key==="Escape"){e.preventDefault();confirmBar.remove();confirmBar=null;}return;}
      if(e.key==="ArrowRight"||e.key==="ArrowDown"){e.preventDefault();show(idx+1);}
      else if(e.key==="ArrowLeft"||e.key==="ArrowUp"){e.preventDefault();show(idx-1);}
      else if(e.key==="Escape"){closeLightbox();}
    };
    document.addEventListener("keydown",lb._navKey);
    paint();
  }
}
function closeLightbox(){document.querySelectorAll(".lightbox").forEach(l=>{if(l._navKey){document.removeEventListener("keydown",l._navKey);l._navKey=null;}l.remove();});}

/* progress ring svg */
function ring(pct,size=66){
  const r=(size-8)/2,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<svg class="ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#e0d4b4" stroke-width="6"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#2f4a3c" stroke-width="6"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"
      transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="50%" text-anchor="middle" dy="0.35em" font-family="Georgia, 'Iowan Old Style', serif" font-size="15" font-weight="700" fill="#2f4a3c">${pct}%</text>
  </svg>`;
}

  const universe=new Set();loaded.forEach(c=>regionBirds(c).forEach(id=>universe.add(id)));
  const identifiedInUniverse=[...allIdentified].filter(id=>universe.has(id)).length;
  const totalTrips=state.trips.length;

  root.appendChild(el(`<div class="view-head">

  // Bird of the day — deterministic per calendar day, drawn from loaded regions

      </div>
    </div>`);
    botd.onclick=()=>openBirdDetail(botdId);
    root.appendChild(botd);

  root.appendChild(el(`<div class="home-hero">
    <div class="stat"><span class="big">${identifiedInUniverse}</span><small>Birds identified</small></div>
    <div class="home-divider"></div>
    <div class="stat"><span class="big">${Math.max(universe.size-identifiedInUniverse,0)}</span><small>Left to find</small></div>
    <div class="home-divider"></div>
    <div class="stat"><span class="big">${totalTrips}</span><small>Trips logged</small></div>

  </div>`));

  // Streak pill — only when a streak is alive, so it never adds clutter at zero
  const st=streakStats();
  if(st.cur>=2){
    root.appendChild(el(`<div style="text-align:center;margin:-4px 0 14px"><span class="pill" style="background:rgba(233,201,105,.25);color:var(--ink)">🔥 ${st.cur}-day birding streak${st.today?"":" — log a bird today to keep it alive"}</span></div>`));
  }

  root.appendChild(el(`<div class="view-head" style="margin:8px 0 14px"><h3 style="font-size:19px;color:var(--ink)">By region</h3></div>`));

  if(loaded.length===0){
    root.appendChild(emptyState("🗺️","No regions yet","Add a region from the Lists tab to start tracking your progress.","Go to Lists",()=>switchTab("lists")));
    return;
  }

      <div class="rc-body">

        <div style="margin-top:10px"><button class="btn ghost sm" data-go="${code}">Browse list →</button></div>
      </div></div>`);

    grid.appendChild(card);
  });
  root.appendChild(grid);
};

// Deterministic "bird of the day": same bird all day, drawn from loaded regions (falls back to all).
function birdOfTheDay(){
  const pool=new Set();
  (state.loadedRegions.length?state.loadedRegions:Object.keys(REGION_NAMES)).forEach(c=>regionBirds(c).forEach(id=>{if(BIRDS[id])pool.add(id);}));
  const arr=[...pool];if(!arr.length)return null;
  const now=new Date();
  const seed=now.getFullYear()*1000+Math.floor((now-new Date(now.getFullYear(),0,0))/86400000); // year + day-of-year
  return arr[seed%arr.length];
}

  if(btnLabel&&btnFn)e.querySelector("button").onclick=btnFn;
  return e;
}

  hydrateUserPhotos(card);
  return card;
}

/* Epoch ms -> "YYYY-MM-DDTHH:mm" in LOCAL time, for <input type="datetime-local">. */
function tsToLocal(ts){const d=new Date(ts),p=n=>String(n).padStart(2,"0");return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;}

function editTripDialog(tripId){
  const t=state.trips.find(x=>x.id===tripId);if(!t)return;
  // Always include the trip's own region even if the user stopped tracking it.
  const regions=[...new Set([...(state.loadedRegions.length?state.loadedRegions:Object.keys(REGION_NAMES)),t.region])];
  const body=el(`<div>
    <div class="form-row"><label class="fld">Trip name</label>
      <input type="text" id="etName" value="${esc(t.name)}" style="width:100%"></div>
    <div class="form-row"><label class="fld">Geographic region</label>
      <select id="etRegion" style="width:100%">${regions.map(c=>`<option value="${c}" ${t.region===c?"selected":""}>${regionIcon(c)} ${esc(regionName(c))}</option>`).join("")}</select></div>
    <div class="form-row"><label class="fld">Started</label>
      <input type="datetime-local" id="etStart" value="${tsToLocal(t.startedAt)}" style="width:100%"></div>
    ${t.active?"":`<div class="form-row"><label class="fld">Ended</label>
      <input type="datetime-local" id="etEnd" value="${tsToLocal(t.endedAt||t.startedAt)}" style="width:100%"></div>`}
    <p class="tiny">Renaming the trip or changing its region also updates the sightings recorded on it.</p>
  </div>`);
  const foot=el(`<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn ghost" id="etCancel">Cancel</button><button class="btn ghost" id="etBirds">🐦 Edit birds…</button><button class="btn" id="etSave">Save changes</button></div>`);
  openModal({title:"Edit trip",body,foot,onMount:ov=>{
    // Validate + write the dialog's fields onto the trip. Returns false (with
    // a toast) when a field is invalid. Shared by Save and "Edit birds…".
    function applyEdits(){
      const name=ov.querySelector("#etName").value.trim()||t.name;
      const region=ov.querySelector("#etRegion").value||t.region;
      const startRaw=ov.querySelector("#etStart").value;
      const start=new Date(startRaw).getTime();
      if(!isFinite(start)){toast("That start time doesn't look valid");return false;}
      if(start>Date.now()){toast("The trip can't start in the future");return false;}
      const startChanged=startRaw!==tsToLocal(t.startedAt);
      let end=t.endedAt,endChanged=false;
      if(!t.active){
        const endRaw=ov.querySelector("#etEnd").value;
        end=new Date(endRaw).getTime();
        if(!isFinite(end)){toast("That end time doesn't look valid");return false;}
        if(end<start){toast("The trip can't end before it starts");return false;}
        endChanged=endRaw!==tsToLocal(t.endedAt||t.startedAt);
      }
      t.name=name;t.region=region;
      // Only touch timestamps the user actually edited: datetime-local drops
      // seconds, so blindly re-writing would shift times by up to 59s (and
      // visibly change the trip duration) on a plain rename.
      if(startChanged)t.startedAt=start;
      if(!t.active&&(startChanged||endChanged)){
        if(endChanged)t.endedAt=end;
        t.durationMs=t.endedAt-t.startedAt;
      }
      // Keep the denormalised copies on this trip's sightings in step.
      state.sightings.forEach(s=>{if(s.tripId===t.id){s.tripName=name;s.region=region;}});
      save();
      return true;
    }
    ov.querySelector("#etCancel").onclick=closeModal;
    ov.querySelector("#etSave").onclick=()=>{
      if(!applyEdits())return;
      closeModal();render();toast("Trip updated");
    };
    // Add/remove this trip's birds — applies pending field edits first so a
    // typed-but-unsaved name isn't lost when the birds dialog replaces this one.
    ov.querySelector("#etBirds").onclick=()=>{
      if(!applyEdits())return;
      addBirdToTripDialog(t.id);
    };
  }});
}

function addBirdToTripDialog(tripId){

        <span class="pill rarity-${rsl(b.r)}">${b.r}</span></label>`);
      const ct=row.querySelector(".trip-ct");

/* Record a sighting; detect & celebrate a "lifer" (first-ever record of a species). */
function recordSighting({birdId,region,tripId,tripName,count,notes,date}){
  const isLifer=!state.sightings.some(s=>s.birdId===birdId);
  state.sightings.push({id:uid(),birdId,region,tripId:tripId||null,tripName:tripName||"",date:date||Date.now(),count:count>0?count:1,notes:notes||""});
  save();
  if(isLifer){
    celebrateLifer(birdId);
    checkMilestones(false);   // life count / region % only move on a new lifer
  }
  return isLifer;
}
function logBirdToTrip(tripId,birdId){
  const t=state.trips.find(x=>x.id===tripId);if(!t||t.birds.includes(birdId))return;
  t.birds.push(birdId);
  // Birds added to a FINISHED trip are dated to the trip, not to "now" —
  // otherwise a bird slotted into last month's outing pollutes this month's
  // year list and stats.
  recordSighting({birdId,region:t.region,tripId:t.id,tripName:t.name,
                  date:t.active?Date.now():(t.endedAt||t.startedAt)});
}
/* Count helpers for the trip-logging dialog's per-row number box. They target
   the newest sighting of that species on that trip. */
function tripSightingCount(tripId,birdId){
  const s=state.sightings.filter(x=>x.tripId===tripId&&x.birdId===birdId).pop();
  return s&&s.count>0?s.count:1;
}
function setTripSightingCount(tripId,birdId,count){
  const s=state.sightings.filter(x=>x.tripId===tripId&&x.birdId===birdId).pop();
  if(!s)return;
  s.count=count>0?count:1;
  save();
}

/* ---- Tally checklist: fast field logging for an active trip. Tap +1 each
   time you see one; the first tap logs the species. Rows redraw in place
   (modal-local draw(), no full render), so it's quick with cold fingers. ---- */
function tallyDialog(tripId){
  const t=state.trips.find(x=>x.id===tripId);if(!t)return;
  let q="";
  const body=el(`<div>
    <div class="search-wrap" style="max-width:none;margin-bottom:10px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5a4a37" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input type="search" id="tallyQ" placeholder="Search birds of ${esc(regionName(t.region))}…">
    </div>

    <p class="tiny" style="margin-top:10px">Tap <b>+1</b> each time you see one — the first tap logs the species. 📍 pins your current location for that bird.</p>
  </div>`);
  function draw(){
    const wrap=body.querySelector("#tallyList");wrap.innerHTML="";
    const base=[...new Set([...regionBirds(t.region),...t.birds.filter(x=>BIRDS[x])])];
    const filtered=base.filter(id=>{const b=BIRDS[id];return !q||b.name.toLowerCase().includes(q)||b.sci.toLowerCase().includes(q);});
    if(!filtered.length){wrap.appendChild(el(`<p class="tiny" style="padding:14px;text-align:center">No matches.</p>`));return;}
    filtered.forEach(id=>{
      const b=BIRDS[id];
      const logged=t.birds.includes(id);
      const n=logged?tripSightingCount(tripId,id):0;
      const row=el(`<div class="checkline tally-row${logged?" logged":""}">
        <span style="flex:1"><b>${esc(dispName(b))}</b>${dispSubInline(b)}</span>
        ${logged?`<button class="btn ghost sm" data-a="pin" title="Pin current location">📍</button><button class="btn ghost sm" data-a="minus" title="One fewer">−</button><span class="tally-n">×${n}</span>`:""}
        <button class="btn sm" data-a="plus" title="One more">+1</button>
      </div>`);
      row.querySelector('[data-a="plus"]').onclick=()=>{
        if(!t.birds.includes(id)){logBirdToTrip(tripId,id);toast(`${b.name} logged`);}
        else setTripSightingCount(tripId,id,tripSightingCount(tripId,id)+1);
        draw();

      wrap.appendChild(row);
    });

  draw();
  const foot=el(`<div><button class="btn" id="tallyDone">Done</button></div>`);
  openModal({title:`Checklist — ${esc(t.name)}`,body,foot,wide:true,onMount:ov=>{
    ov.querySelector("#tallyQ").oninput=e=>{q=e.target.value.trim().toLowerCase();draw();};
    ov.querySelector("#tallyDone").onclick=()=>{closeModal();render();if(state.trips.find(x=>x.active))startTimerTick();};
  }});
